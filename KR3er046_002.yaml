body:
  text: 卷之二雜症中風論竊嘗怪凡病皆以所感名之惟中風則以其象名之遂啓後人之惑也試觀夫中風者恆於密室中行住坐臥之頃卒然仆倒或痰涎上湧昏不知人或肢體痿廢足不任身或手足癱瘓身半不遂或口眼喎僻筋脈牽引斯時未嘗有風而何從中之即令虛邪賊風偶犯亦不過現六經之症侵冒肌膚已耳何至昏倒不省若斯之甚也然則中風究何從而名焉蓋人身譬猶樹也人之四肢猶樹之枝幹也人之七情五志猶天之疾風暴雨也人之飢飽勞逸猶樹之日剝月削也人之憂愁思慮猶樹之蠹蛀侵蝕也人之恣欲不節猶樹之斧斤砍伐也假令一樹也而剝之削之侵之蝕之砍之伐之即不待夫疾風暴雨而罔不傾僕矣偶遇大風拔木而咎之於風可乎人之中風不猶是乎河間謂五志過極言其因也東垣謂本氣自病言其本也丹溪謂濕熱生痰言其標也而究其根則在於腎元不足所致蓋腎元無虧五志過極即顯五志之證元氣不足即顯虛損之證濕熱生痰即顯痰熱之證惟根本既虧而五志乘之勞役乘之痰熱乘之而卒然仆倒遂莫之支爾斯時也逐其痰痰愈熾降其氣氣愈逆惟牙關緊閉者暫用稀涎散開之究無當於實際立齋用三生飲投人參一兩驅駕其邪而補助真氣真斬關奪門之將也河間立地黃飲子治舌喑不言足痿不行專固其本已頂門下一針矣余每臨斯症細求其故未有不從心腎不交而得蓋心不下交於腎則用歸脾湯養育心神為主而以八味丸為佐腎不上交於心則用地黃飲子補益真陰為主而以獨參湯為佐又必令病人卻七情絶幃幕輕者可復重者可延繼以歲月鮮不安痊若以風藥痰藥間之捨本求末安望其能生哉按中風肥人多見之而瘦者間有然肥人多氣虛氣虛則生痰苟根本不實猶樹之扶疏而中空則易於倒僕矣治之須大進參朮佐以痰藥後補其腎可也瘦人多血虛血虛則有火苟憂愁太過猶樹之枝枯而葉萎則無以滋養矣治之須培益真陰佐以開鬱後補其氣可也蓋脾肺腎肝既有陰陽氣血之殊自應分酌而治矧心為神機開發之本胃是穀氣充大之標苟心思不遂則飲食少用而無以益其血脈胃氣不充則五臟少資而無以灌其百骸則是心與胃又所宜講求者也噫中風一症大率膏粱者多出於逸樂則宜固其腎肝蓋腎主閉藏而肝主疏泄也藜藿者每見於縈愁則宜助其心脾蓋心主憂而脾主思慮也此孰非醫者之權衡所當潛心而體會哉不然一遇此症不求其因識淺技窮輒進牛黃丸幾曾見有用之而得生者不大可悟也夫一中風五絶之症如口開眼合手撒遺尿聲如齁睡者不治治之無益一中風喎僻癱瘓分左右之道路而大補氣血佐以舒筋豁痰十補勿一瀉之一中風痱痿不用宜八味十補還少等丹丸選用佐以補中六君歸脾等湯調之慎勿誤治以夭人命一中氣中寒中暑中食分別以治不可誤認作中風一例而看稀涎散江子仁六粒每粒分作兩半牙皂三錢細切明礬一兩先將礬熔開入二味攪勻待礬枯為末每用三分三生飲生南星一兩生川烏半兩去皮生附子半兩去皮木香二錢每用共一兩加人參一兩水煎地黃飲子懷熟地巴戟去心山茱萸去核肉蓯蓉酒淨附子制石菖蒲五味子杵茯苓麥門冬去心遠志肉去心甘草湯淨石斛鹽水焙紫肉桂各等分每服五錢入薄荷少許薑棗水煎虛損論虛損之症越人言之詳矣然有驟而損者有漸而損者驟而損者如大勞大病脫氣脫血之診其勢疾暴可畏然苟察陰陽偏勝而調之往往易於見功此無他形體雖壞而臟真未竭也漸而損者如勞役所傷陰虛火動之候其始若不經意其繼猶或強持日積月纍漸至於深入而不可救此無他臟真先虧而形體徐壞也夫然則虛損之要莫有過於陰陽而治之者有五失焉方其始也陽虛則惡寒陰虛則發熱醫者見其寒輒思解之見其熱輒思清之一失也其繼也陽虛宜補陽而反滋陰陰虛宜滋陰而反補陽則陰陽愈乖二失也且陽虛有火則甘溫之中不宜燥熱陽虛無火則甘溫之中不宜涼潤陰虛有火則壯水之中勿雜燥味陰虛無火則益火之中切禁苦寒治者不守大法三失也又有陽先病而溫之大過陰後病者陰先病而涼之太過陽後病者治者不知變計四失也況陽虛則陰無所統病在陰而仍宜治其陽陰虛則陽無所附病在陽而仍宜治其陰治者不窺原本五失也此其間緩急進退之法非可執一宜深思而熟計之不致變生而易轍斯善爾故治損之法惟越人為最精其曰損其肺者益其氣即勞役所傷而用補中益氣之類也損其心者調其榮衛即思慮過度而用濟生歸脾之類也損其脾者調其飲食適其寒溫即飲食失節而用四君六君人參理中之類也損其肝者緩其中即七情怫鬱而用加味逍遙之類也損其腎者益其精即真陰失守而用六味八味之類也矧腎受五臟六腑之精而藏之五臟盛乃能瀉脾運水穀之精而日生之以灌於臟腑可見先天之精早已易竭後天之精生之實難而不知節者又妄用而不恤於是精不能生氣氣不能生神而骨痿色悴勞瘵之形成矣雖有扁倉能不卻走哉按虛損之症未有不見於咳嗽而咳嗽之因則有多端如形寒飲冷則傷肺此時而即解之易易也然有忽視而任之者則邪內伏而正反虛有重視而屢發者則氣益虛而嗽彌甚於焉津液內亡肺氣不能自固而腎絶生化之源更加之以不謹而子母兩虧陰益亡而竭矣陰竭則火動火動則金愈傷燎原而不可遏求其不為怯也難矣於是療之者始議降火議清金不知苦寒又壞胃胃傷則脾亦傷更絶其肺之母而死亡迫矣故善治者肺虛則補其氣兼補其脾使土得以生金肺有火則補其腎使子不盜母之氣而水足制火火衰則補其火使不致金寒水冷而上泛為痰仲景謂陰虛咳嗽者用腎氣丸補而逐之東垣謂脾虛生痰者六君子補中益氣培而養之如憂慮而傷心脾歸脾湯主之鬱怒而傷肝脾加味逍遙歸脾主之氣血兩虛八珍人參養榮湯主之此皆治咳嗽之大法亙古而不可易者也奈何世之醫者一見咳嗽不求其因不顧其本嗽家藥品搜括無遺發散不效繼之消痰消痰不效繼之降氣降氣不效繼之清火清火不效待斃而已不亦重可哀哉血症凡症之可畏者莫甚於失血使不急有以止之則危亡隨焉然止之而不得止或屢止而屢發者何故良由世之治者執火載血上錯經妄行之説不求陰陽原委漫以寒涼投之設在火症偶爾獲效危亡者接踵矣褚齊賢有服寒涼百不一生之嘆豈過甚哉竊念人之一身內而臟腑外而皮膚而血潛行於中豈容有發越也哉惟傷於肺則血縷帶於痰中傷於脾則血散漫於痰涎傷於肝則血凝結而紫黑傷於腎則血隨咳唾而出傷於心與腎則血暴吐而成盂其間臟腑雖有氣血多少之別斷未有真陰足而妄動者亦未有元氣充而不攝者每見失血之人非有大損於臟腑則血不易以至一至焉則症不易以復從可識矣端賴求其原而療之或補其陽以固脾肺之氣如面色黃白而脈虛大空軟者是也或補其陰以固腎肝之氣如面赤口乾而脈虛細弦數者是也然補陽無論矣而補陰之中又有火衰者其症面青白而脈遲弱或服寒涼而脈反鼓指者皆當以導火歸元如八味丸以消陰翳是也不見立齋治張東谷遇勞則吐血一二口用補中益氣湯加門冬五味山藥熟地茯神遠志非補脾肺乎丹溪每用炮薑止血繆仲仁用四君六君加木香謂古人治血多以胃藥收功非補中焦乎養葵謂心主血脾裹血肝藏血歸脾湯三臟之藥畢具用之鮮不神效非補心脾乎余治一友汪子軼干應鄉試過勞及歸吐血屢發屢止遍服補陰藥逾年不效余見之面色白脈虛數無力體中未嘗畏熱余曰此不特脾肺虛而命門之火亦衰遂用歸脾湯加炮薑五味倍人參而血勢少衰偶加門冬則又如故繼以八味丸無間服之血遂止若八味少弛則血又復以後連獲二子應試如初非補命門乎乃知有形之血固於無形之氣無形之氣資於命門之火所謂精足則氣旺氣旺則神生神者血之華也不信然哉及觀古人治脫血必用大劑獨參湯以挽之豈血未至於脫而反不可用人參乎此亦余之所不解矣故余治失血症上必顧其脾肺下必滋其腎元切禁苦寒以伐之庶幾無愧於前哲而不遺人夭枉也按上治五臟法也胃多氣多血暴吐成碗成盂當火熾方盛時必用四生丸生地涼血荷葉柏葉破血假艾葉辛溫濟之則血不復滯而歸經矣胸中氣塞血成紫塊者此必血菀於上宜桃仁枳殼陳皮香附之屬破而降之則氣平而血止矣小便尿血心移熱於小腸清心蓮子加柏葉牛膝小薊主之大便下血元氣下陷補中益氣加槐花槐角地榆主之審其虛實而施治可也至鼻衄血沖清道四生丸為最妙虛則生脈散加黃耆芍藥以攝之牙宣出血六味丸加骨碎補虛寒者八味丸加骨碎補生脈散亦效此又豈法之所拘哉生地丹皮湯治脈數內熱咳嗽痰血者懷生地牡丹皮川貝母去心研麥門冬去心廣陳皮各一錢炙甘草三分沙參一錢如不止加阿膠一錢蛤粉炒成珠加焙扁柏葉一錢水煎服如吐血去門冬加荷葉艾葉或加藕節童便當歸止血湯治脈弦脅痛氣逆者當歸一錢香附一錢便制生地一錢白芍藥一錢酒炒牡丹皮一錢蘇子一錢炙甘草三分廣陳皮一錢加焙扁柏葉一錢水煎服白芨湯治內傷吐血白芨茜草生地丹皮牛膝廣皮歸尾各一錢加荷葉蒂五個水煎服補方見論內咳嗽咳嗽微疾也連綿不已則又痼疾也夫豈容渺視哉然咳則有聲無痰虛怯者恆見之或時咳一聲或連咳二三聲日以為常初不經意而尫羸已成矣蓋肺出氣腎納氣升降往來舒徐不迫惟縱欲以竭之以耗散之而真氣餒於是假咳而上達豈可久之道哉嗽則有聲有痰其因多端外則六淫內則七情咸足以致之經謂五臟六腑皆令人咳非獨肺也而肺為之總司然六淫之中風寒尤易犯以肺主皮毛而開竅於鼻形寒飲冷則傷之留而不去為寒為熱變遷不一須審其風則解之寒則散之中病即止若過於解散則腠理疏而邪復襲愈襲愈解愈解愈襲脾肺虛而元氣憊反變成他症而難療矣況乎暑濕七情等因又當隨感而施治者哉竊思痰者身之液也外充皮膚內滋臟腑氣為之化血為之輔相為灌溉而不可竭者若久嗽不已則腑腑精華肌肉血脈俱為耗引消竭於痰比之脫氣脫血何多遜焉獨不觀久嗽者始而色瘁繼而肉消繼而骨痿皆津液不能敷布乃至此夫豈容渺視哉故療之者乾咳用地黃丸峻補其腎兼進人參以滋化源痰嗽風則解以辛涼寒則散以辛溫暑則清之濕則燥之燥火則潤之七情則隨所因而調之而總以扶脾保肺為首務幸毋沾沾於逐痰也按痰又有酒濕而生者六君子加葛粉澤瀉之類有食積而生者枳朮加半夏曲陳皮甘草之類有痰火而生者二陳加栝蔞山梔黃芩之類有肺燥而生者二冬加貝母栝蔞百合之類有氣逆而生者二陳加蘇子桑皮杜仲之類此皆治標之治法隨症以投第不可過甚耳嘔吐凡病皆有虛實寒熱而嘔吐為尤甚良由治之者喜溫暖而利攻伐熱者熱之無遺火症臨之愈劇攻者攻之殆盡胃氣因而轉傷於是有嘔之不止而吐之勿絶其不至危殆者幾希蓋緣寒與實易辨而虛與熱易淆也寒與實者或內傷生冷或客寒犯胃或醉飽無度或飲食失節脈必沉緊弦滑而中焦脹滿不安不有以溫之則寒不除不有以攻之則滯不化宜乎藿香平胃之屬奏績易易也若夫寒鬱為熱經曰諸逆衝上皆屬於火諸嘔吐酸皆屬於熱人咸知之唯是不察其因而漫以止吐藥投之往往喜用香燥殊不知嘔屬少陽木中有火火性炎上肋之彌熾甚至嘔緑水或如菜葉者則膽中之汁也使不急與梔連降之則嘔逆何時而止耶每見驚傷膽者其病善嘔先哲立溫膽湯獨入竹茹降氣降火意可識矣況乎胃屬土畏木者也木邪凌土胃氣必傷水穀不納胃中之津液竭盡無餘而下焦之氣逆而上攻比比胸膈痞塞有似乎實醫者從而伐之則一線之氣立斷矣故凡遇久吐傷胃則必於清火中加人參以扶胃氣然後徐進米飲方能納也嘗見古人治虛寒吐逆用熱藥恐其捍格反入黃連童便為嚮導下安陰分矧在熱症而反以火濟火乎雖其間聲物俱出謂之吐有聲無物謂之嘔聲濁惡而長謂之噦或七情之拂鬱或六氣之交乘或水土之不和或關格之不利種種懸殊療非一致然苟能於虛實寒熱體勘精切亦可無遺蘊矣治驗一女子積勞後忽發寒熱嘔吐不止三日夜罔間凡用藿香二陳伏龍肝之類皆不效嘔至如菜葉青汁形神俱疲余急進山梔人參神麯茯苓一劑其嘔漸止後以人參調理而痊一女子因驚後胃脘作疼嘔逆不止亦越三日矣胸中時叫飢但不能納穀味耳且神昏譫妄面見癍疹及余按其脈則弦而重取則空弦者驚傷膽之脈也空者胃氣虛之診也癍疹者火炎上之象也余以遠志茯神棗仁安神養胃木香陳皮止痛平氣山梔童便降火稍入柴胡引經倍用鉤藤止驚一劑嘔止癍退神安思食再劑而愈二陳湯半夏茯苓廣皮各一錢甘草三分薑三片水煎如脈數煩熱嘔酸加黃芩山梔鉤藤甚則入黃連如停滯加厚朴萊蔔子枳實如畏寒加藿香木香如因驚加竹茹如中氣虛加人參石斛虛寒入炮薑熟附瘧疾瘧之為言虐也有如凌虐者然故云瘧也當其寒則戰栗鼓頷湯火不能溫及其熱則煩冤少氣冰水不能寒此無他陰陽相併邪正交爭也並之陰則寒並之陽則熱正虛則怯邪盛則肆一身之內有不聽令而任其摧殘者乎然則何經主之何藥制之曰仲景傷寒少陽一經寒熱往來用小柴胡湯可假之治也方中柴芩除表裡之熱薑半除表裡之寒參甘大棗和陰陽而扶正氣非瘧之的方乎余擴而充之寒多熱少則入藿香寒少熱多則入知母獨寒不熱則去黃芩獨熱不寒則去半夏氣虛則加苓朮血虛則加歸芍即此方而出入之鮮不應手取效以是知瘧之主少陽也明矣其作有早晏何也經曰衛氣一日夜大會於風府明日日下一節故其作也晏此客於脊膂凡二十五日下至骶骨二十六日其氣上行九日出於缺盆之中故作日益早邪在陽分輕陰分重引出於陽分則散其有日作間日作何也經曰邪入之淺則日作入之深則間作有三日作者邪愈甚而正益衰也有一日三四作十數作又何也此不可作瘧論而亦未始不可以瘧推之也陽虛則寒陰虛則熱陰陽虛則寒熱交作非大補氣血則寒熱不止也然經又言太陽之瘧腰痛頭重寒從背起少陽之瘧寒不甚熱不甚心惕惕然汗出陽明之瘧先寒灑淅久乃熱熱去汗出喜見日火光太陰之瘧好太息不嗜食多寒熱汗出善嘔少陰之瘧嘔吐熱多欲閉牖而處其病難已厥陰之瘧少腹滿如癃數便意恐懼則是六經又各有治法也雖然瘧之發也如火之熱如風雨不可當此時而欲止之良工不能必從未發時陰未並陽陽未並陰因而調之真氣乃安邪氣乃出此露薑飲所由設可推而通之也至於邪未盡早截之變必作豈若調其陰陽之為愈乎立齋治瘧發不止用人參一兩生薑五錢未發前服之瘧可立止則養正除邪勝著也豈能為瘧困哉按瘧有云是脾疾長夏暑熱所傷至秋新涼束之瘧乃作故其發也有候而一以理脾為主平胃散六君子補中益氣審虛實而施之可也不知脾畏木者也柴胡非疏肝乎脾喜甘者也人參甘草非補中州乎脾惡濕者也半夏非燥濕乎脾畏熱者也黃芩非清熱乎使果因風與食則疏之消之寒與熱則溫之清之虛則補之下陷則提之學者神而明焉又安得膠柱鼓瑟為也治驗一儒者季秋發瘧凡解表疏利之藥遍嘗勿效至四旬後肢體俱冷其汗如雨猶是覆密不敢見風此余診之六脈皆弱連進歸脾湯大倍參耆加熟附子五分數劑而痊繼以六君調理月餘一女子瘧疾煩熱嘔吐口乾飲水獨熱不寒有與和解不效余診之脈數且疾此疸瘧也得之肺素有熱用門冬知母黃芩山梔花粉厚朴陳皮甘草一劑而減二劑而愈一人年五旬余患痢半月痢止瘧作發則昏憒不支余診之脈空大無力以補中益氣湯倍人參加半夏二劑而愈小柴胡湯柴胡二錢黃芩人參半夏各一錢甘草五分薑棗水煎如口渴加葛粉一錢如右關有力胸膈不寬加厚朴萊蔔子各一錢煩渴去半夏脈不數去黃芩如氣虛同四君子或補中益氣用如陰虛則以六味湯繼之痢疾論大凡治瘧之法宜先緩而後急治痢之法宜先急而後緩何哉瘧之始發也其勢猛悍而遽欲以止之則邪不伏而反熾使及其既衰即須急以培焉除邪養正乃不至於遷延所謂避其來鋭擊其惰歸此一法也痢之始作也其來瀰漫而不急以奪之則浸淫而潰決即當其少緩尤須有以調焉邪盡氣和庶不成乎休息所謂及鋒而用善刀而藏此又一法也蓋痢古稱滯下又名腸澼分明指濕熱傷手太陽小腸手陽明大陽蘊釀而成丙火自焚庚金受囚化物傳道之令俱廢膿血稠黏後重逼迫滯而不舒也仲景用大黃湯滌之取其滋潤輕快一洗而空誠妙法也特恐元氣有不勝耳河間芍藥湯用芩連清火歸芍調血木香檳榔理氣止痛甘草和中或加肉桂為引所云調血則便血自愈理氣則後重自除無論赤白皆當遵此為法若夫虛寒一症腹痛頻迸下積純白或時兼赤滑而不禁脈微弱而畏寒則人參附子理中湯必不可少至於久痢元氣衰憊下痢不止肢體浮腫脈來虛微補中益氣倍參加桂附肉果粟殼又豈容須臾緩哉更有下多亡陰大腸不行收令虛坐弩責則於升提中兼以滋陰為主逮食積宜消感寒宜發暑濕宜清又在臨症變通難以執一見也治驗一徐太夫人六旬患痢噤口不食服開胃等藥轉劇六脈虛數余以人參二錢黃連一錢連進四五次遂能食而痢止一人年五旬向有冷積痛一日患痢初起便滑下積純白診其脈微細余即以人參理中湯連進而愈此不可以常格拘也一儒者場後患痢醫與解表消導清熱罔效餘切其脈軟弱兩尺倍甚以八味湯四劑漸減後以人參調理蓋痢未有不傷腎況年少不禁者乎芍藥湯芍藥一錢半當歸黃連黃芩各八分炙甘草三分檳榔一錢木香五分水煎服痛不止或加桂五分痢不減漸加大黃真人養臟湯治虛寒痢疾久而不愈人參三錢白朮一錢半土炒當歸一錢白芍藥一錢半木香八分炙甘草三分肉桂八分肉果麵裹煨粟殼醋炙訶子肉麵煨各一錢水煎服厚朴湯治飲食停滯下積者厚朴一錢薑製枳實一錢麩炒萊蔔子一錢焙研木香五分黃芩一錢廣皮一錢山楂一錢半豆豉一錢炙甘草三分柴胡七分檳榔一錢加砂仁末七分薑一片水煎泄瀉論泄瀉之因多端而要以脾胃為本脾胃者土也處於中州澆灌四旁清濁以分水穀以別皆藉此健運之能而升降開闔由之布化尚何瀝瀉之虞哉惟中氣稍弛風勝則飧瀉而完穀不化寒勝則洞瀉而澄徹清冷濕勝則濡瀉而糟粕不實熱勝則火瀉而暴注下迫更有食積痰飲則腹中或痛或不痛反得瀉而減也大瘕瀉則腹中有瘕時作時止也腎瀉則每於子後發余時則安也蓋土旺則能制水水旺亦足凌土濕鬱則能成熱熱鬱亦足助濕濁氣則能侵上清氣亦足陷下故治瀉之法不可一端而竟扶脾正也而有時乎平胃分利常也而有時乎升提溫補當也而有時乎清熱況於食積宜消痰積宜降瘕聚宜調腎虛宜補且有面色黃白似乎脾虛而補之不效者以濕熱之未清也亦有久瀉不止習以為恆而止之反劇者亦積熱之不解也苟執脾土喜溫惡寒喜燥惡濕之説而概以溫熱行之知常而不知變知經而不知權使遇中虛且寒者誠然得矣倘或蘊隆不解不且益其邪而成痼疾也哉至於治瀉九法士材言之詳矣余不及贅胃苓湯蒼朮米泔制厚朴薑製陳皮各一錢甘草三分炙白朮八分土炒茯苓澤瀉各一錢肉桂三分豬苓一錢加薑棗水煎或分用合用皆可薷苓湯治暑瀉香薷黃連薑汁炒厚朴薑製扁豆炒豬苓澤瀉白朮土炒茯苓各一錢甘草三分薑三片水煎四神丸治脾腎兩虛飲食不思子後泄瀉肉果麵煨二兩補骨脂胡桃制四兩五味子二兩吳茱萸浸炒一兩為末生薑八兩紅棗百枚煮熟丸霍亂論霍亂之候其來暴疾腹中絞痛擾亂不寧自吐瀉交作有吐而不瀉瀉而不吐有不得吐又不得瀉則邪有上下淺深之分而總以得吐為愈邪有入必有出鹽湯探吐上妙法門然後調其胃氣可也蓋霍亂每傷於胃雖風寒暑濕四氣相乘而中必先虛故邪入焉至飲食失和穢邪觸感者尤多胃氣一傷清濁相干邪不去則正不安所以攻邪尤要於扶正也即至肢冷脈伏轉筋聲啞亦必驅邪至盡蓋邪去則正安非比他症養正而邪自除也及大吐瀉後元氣既乏手足厥冷脈微欲脫者參附理中湯仍為吃緊若早投之則邪反固而難愈矣所以當其發時不可用米飲先哲諄諄戒之豈無謂哉觀於乾霍亂上不得吐下不得瀉亦因邪不能出所以為甚治者愈可思其故矣治驗一男子恣飲梅水吐瀉無度手足厥逆面色慘晦聲音不出而脈沉伏小水點滴不通服藥入口即吐醫告技窮余熟思半日忽悟及梅者果屬也其味酸主收故小便癃閉因思果得麝則敗酒得麝則壞二語且麝性香竄走竅乃取麝半入臍中半入鼻孔病者即以手拂其鼻曰此何物也少頃小水大下二三行忽如醉而醒夢而覺越日索粥漸安一女子大吐瀉後四肢厥逆六脈俱無頭面帶陽而反紅赤凡藥入口即吐余曰此陰盛格陽以仲景通脈四逆湯連劑脈出肢暖始愈藿香湯治霍亂吐利交作藿香紫厚朴薑製茯苓木瓜車前子焙研二錢澤瀉枳殼廣皮葛根各一錢加生薑三片有食加砂仁末一錢煩渴去藿香加紫蘇一錢麵食入萊蔔一錢著氣入青皮七分木香三分切戒米飲直待痛止覺飢方可與之膈噎論膈噎之症內經止有三陽結謂之膈一句子和從而釋之謂三陽者大小腸膀胱也結則二陰不利津液不行故逆反而上其言病機則得矣而三陽所以致結之故則未始推及至張雞峰云是神思間病惟內觀靜養可以卻之斯乃切中病情蓋此恙多由憂愁思慮傷於心脾血液不生日漸煎熬肝火彌熾腎水益枯五臟之陰既竭六腑之陽安得獨足於是稿在上而為噎稿在下而為膈譬之江河阻塞而餉道不通有仰食不獲而待命矣此時而浚其流不若疏其源然後水從天際而下飛爇立送復循故道也故患膈噎者欲噓既稿之血液而復生之莫若屏七情絶嗜好遠幃幕心似已灰木身如不繫舟奴枯禪老寂而後靜能勝動水升火降津液漸行庶出約有常長享天命誰謂治膈之大丹不取諸身而足哉舍此而欲他求惟有養血生津開鬱理氣佐以降火或一法也李絳兵部手集用人參三兩取汁入粟米雞子白薤白煮粥與啖取其潤滑而通陽明最稱神效至王太僕以食剎即出食入反出分有火無火之別尤當參而調之畢竟此疾多得於憂患之人而安逸者未嘗有則知藥石之不勝病也夏審矣地髓煎治血枯便燥結生地黃一斤鹿角膠二兩四錢生薑八錢絞汁白蜜二合酒四合紫蘇子四錢酒研文武火煮地黃成膏去滓即以酒研蘇子入煎一二十沸下膠膠化下薑汁蜜再煎候稠瓦器盛之酒化下大半夏湯治胃反嘔吐痰盛者半夏五錢人參三錢白蜜二錢水二鍾和蜜揚之百遍煎服和胃湯人參一錢半黃連六分土炒當歸一錢黃芩七分土炒白芍藥一錢酒炒茯神一錢石菖蒲五分神麯七分半夏七分枳實麩炒四分紅花三分蘇子一錢五分用陳壁土研細攪入長流水澄清煎藥入薑汁白蜜少許童便一二匙和服腫脹論經曰諸氣膹郁皆屬於肺諸濕腫滿昏屬於脾又曰諸腹脹大敲之如鼓皆屬於熱蓋氣鬱則生濕濕鬱則生熱濕熱相搏肺失清肅之令則水不行而為腫脾失健運之司則谷不磨而為脹甚且清陽不走上竅濁陰不走下竅天地閉塞金不平木土不制水由是肚大青筋臍突背平足心平五臟之陰越出於外六腑之陽反擾於內斯時而不亟瀉其陽則陰欲入而陽拒之陽欲出而陰閉之則陰陽愈乖而腫脹益甚譬之洪水泛濫不事疏鑿乃欲以土實之則愈堤防而愈泛溢此必然之勢也子和出立浚川禹功等法非不峻烈可畏然不有蕩滌之則水何由而行所蓄者何由而泄陰陽失位者何由而復奠厥居乎余每見從事溫補者一逢腫脹輒進六君子金匱腎氣等豈不純正通達卒至腫脹愈甚迄無成功及遇草澤醫每以大攻大瀉藥投之反恆奏績於俄頃然後以參調之以補濟之善其後圖乃可萬全雖然此為實熱者言也若老人久病後及腎元虧損者病從陰而發不從陽而入前法又不可施氣喘脈弱喜溫惡寒則金匱腎氣之用桂附以牛膝車前為引一則三焦為決瀆之官水道所出一則腎為胃關開竅二陰誰謂補中不帶瀉哉學者擴而充之可也一傳鼓脹方第一服黑醜二錢半生半熟沉香五分共為細末酒調送第二服陳皮青皮五加皮茯苓皮大腹皮萊蔔子蘇子韭子葶藶子車前子各一錢琥珀沉香各五分黑醜六分半生半熟朴硝三分共為細末酒調送第三服檳榔厚朴益智仁木通澤瀉白芍藥芫花各一錢沉香琥珀各五分朴硝三分黑醜六分半生半熟共為細末酒調送舟車神祐丸去一切水濕痰飲甘遂大戟芫花各一兩俱醋炒大黃二兩黑牽牛取頭末青皮陳皮木香檳榔各五錢輕粉一錢為末水丸椒目大空心服五丸日三服痞悶者多服反煩滿宜初服二丸每服加一丸快利為度戴人每令病者先服百餘粒繼以浚川等藥投之五更當下種種病出輕者一二度重者五六度方愈藥雖峻急為效極神弱者當依河間漸攻進實者從戴人治之大聖浚川散大黃煨牽牛取頭末郁李仁各一兩木香芒硝各三錢甘遂五分每服三錢薑汁調下戴人每言導水丸必用禹功散繼之舟車丸必用浚川散繼之神芎導水丸黃芩一兩黃連川芎薄荷各五錢大黃二兩滑石黑醜取頭末各四兩為末水丸有血積者加桂五錢禹餘糧丸蛇含石三兩鐵銚盛燒通紅鉗取出傾入醋中候冷取出研極細禹餘糧石三兩針砂五兩淘淨炒乾用醋二鍾同餘糧銚內煮乾更用銚並藥燒紅傾淨磚地上候冷研極細羌活川芎木香茯苓牛膝酒浸桂心白豆蔻大茴香蓬朮炒附子炮炮薑京三稜炒青皮白蒺藜焙研去刺當歸酒浸各五錢共為末入前三味拌勻蒸餅丸如桐子大食前白湯下三十丸至五十丸前三味非甘遂芫花之比又有各藥扶持虛人老人亦可服也是忌鹽一毫入口發疾愈甚服藥後即於小便內旋去不動臟腑每日三服更以溫補藥助之金匱腎氣丸治脾腎虛腰重腳腫小便不利或肚腹腫脹四肢浮腫喘急痰盛已成蠱症其效如神此症多因脾胃虛弱治失其宜元氣復傷而變症者非此藥不能救白茯苓三兩附子五錢制牛膝桂澤瀉車前子山萸肉山藥牡丹皮各一兩熟地黃四兩上為末和地黃加煉蜜丸如梧子每服三錢空心米飲下積聚論越人謂五臟為積六腑為聚積屬陰故靜聚屬陽故動靜則易伏而動則易散也然有所徵驗於外謂之癥假物而成謂之瘕痞塞不快謂之痞藏於幽闢謂之癖或云癥主食而瘕主血痞主氣而癖主痰四者分而言之可合而言之亦無不可惟在療之者察其臟腑之陰陽部分之高下氣血之多寡新久之淺深元氣之厚薄或十攻而一補或半攻而半補或十補而勿一攻握一定之算然後能取決於必勝也近時士材立初中末三法未嘗不善而余則尤有商焉積聚之生也以漸匪朝伊夕之故使苟元氣充臟腑調分布周列何隙可容其蹯踞令積聚實逼處此妨礙於升降往來惟其萌於有漸始尚不覺日以益大漸至猖狂而不可遏斯時緩攻之邪不去峻攻之邪亦不去即去矣而邪之聚者復散而變他症蓋攻積之藥必由臟腑腸胃而後達病所其清純之氣有不傷乎余立一法以攻積丸纍纍加用倍入人參湯監之貧者以白朮膏代之必使元氣勝乎邪氣而邪自無容留地否則專補元氣復其健運之常則所積者所聚者將不攻而自走又必須其人善自珍攝愛護生命而後可與施此術也苟不然者亦終無如何矣攻積丸人參京三稜醋煮蓬朮醋煮菟絲子酒煮桃仁當歸香附醋煮黃連土炒青皮醋炒枳實麩炒茯苓半夏各一兩炮薑五錢澤瀉七錢肉桂一兩不見火上為末神麯為丸濃煎人參湯下每服二錢不拘時服一肝之積曰肥氣左脅下如覆杯嘔逆脅痛引小腹宜扶脾抑肝逍遙散加連制吳茱萸醋製鱉甲青皮撫芎桃仁以破其血一肺之積曰息奔右脅下如覆杯氣逆背痛喘咳宜人參茯苓廣皮蘇子款冬花半夏旋覆花桔梗炙甘草兼脾弱六君子以補其母一心之積曰伏梁起臍上大如臂上至心下煩心用人參川連遠志菖蒲茯神肉桂柏子仁丹參乾薑一脾之積曰痞氣在胃脘大如覆杯痞塞吐瀉不為肌膚用四君子湯加麩炒枳實山楂炮薑藿香黃連蓬朮神麯麥芽一腎之積曰奔豚稜於少腹上至心若豚狀上下無時久則骨痿少氣宜安腎丸地黃膏子丸八味丸或茯苓肉桂澤瀉苦楝子杜仲玄胡索香附茴香桃仁安腎丸肉桂桃仁烏頭各一分白蒺藜巴戟山藥茯苓白朮石斛肉蓯蓉萆薢補骨脂各三分蜜丸每服三錢鹽湯下地黃膏子丸血竭沉香木香廣朮泡玄胡索人參蛤蚧當歸川芎白朮土炒續斷酒炒川楝子麩炒全蠍茴香柴胡沒藥青皮吳茱萸桂以上分兩無定數隨症加減用為末地黃膏子丸如梧子大空心溫酒下二十丸日加一丸至三十丸痿痹痹之與痿二者近似而實不同蓋痹者從外而入經謂風寒濕三氣雜至合而為痹是也痿者自內而出經謂諸痿皆生於肺熱是也痹從外入則風寒濕之三氣由皮膚而筋骨而臟腑其留皮膚間者易已其留連筋骨間者疼久其入臟者殆然風寒濕之中又分風勝為行痹則走注疼痛風自火出也濕勝為著痹則重著而關節不利也寒勝為痛痹則周身疼痛無已時也三者之邪既以雜合而至即以雜合治之又云痛屬火腫屬濕尤須察其所勝而散風之中間以清火除濕之內間以養血理氣之中間以豁痰丹溪不一其治殆深得病情者與雖然此未入於五臟也若久而不已內舍五臟則喘嘔上氣尻腫脊蜷筋急肢懈諸症見焉則邪已侵入陰分而非復風寒濕之可驅除也矣經所以即繼之曰陰氣者靜則神藏躁則消亡雖不言及治法而已明示陰氣將欲消亡不可復躁動之而當靜養之則所存一線之陰氣不幾危且殆哉且又曰飲食自倍腸胃乃傷又明示患痹者須薄滋味以飲食居處為其病本故也若痿則不然當其發也非有風寒濕之三氣為患而惟一本於肺熱又不獨一肺熱而心肝脾胃四臟之氣亦皆熱而上熏於肺肺由是葉焦而生痿躄原其由來皆因於思想無窮所求不得或入房太甚宗筋弛縱或遠行勞役坐臥濕地種種侵犯五臟之陰日耗五臟之熱日熾於是而為脈痿為筋痿為肉痿骨痿而肺失治節之令矣然治之獨取陽明又何也陽明總宗筋之會主束骨而利機關為五臟六腑之海合衝脈而滲灌溪谷又屬於帶脈而絡於督脈蓋陽明屬燥金喜潤手太陰屬兌金惡燥明乎此則知治痿之法以潤燥為第一義試以天時觀之秋令主燥則草木黃落地坼風徑非假雨以潤之則亢旱可虞所以五臟之痿不同未有不因精血虧損而得非此痹症有風寒濕之雜合也故以治痿之法治痹則初終不同以治痹之法治痿則斷乎其不可孰謂痹之與痿可一視之哉按余向患行痹每過勞及飲酒便肢節腫痛屈伸不利手臂痛用威靈仙當歸秦艽酒芩枳殼生地陳皮乾葛茯苓甘草足脛痛加牛膝木瓜米仁黃柏蒼朮投一二劑即減以之治諸患痹者有紅腫甚入連翹花粉痛甚入羌活獨活便閉加桃仁紅花出入加減亦罔不效至戊申初春二人患此痛不可忍用前法足能伸縮獨手臂拳攣不開周身大痛異常非人撫摩便不能安如此者四五旬尋愈余自二月中旬亦構此疾其痛倍甚諸藥罕應惟玄武膏瘥妥痛至五十日肌肉盡去日飲粥數盞若進人參葷菜則反劇一友以木通湯進服之腹中㽱悶小便不利大便反瀉當晚昏昏默默氣與俱脫矣越二日手足拘攣有死無生會一友原梅曹子先數日詣余商定膏脂藥以痛傷精血用蓯蓉枸杞當歸生地遠志茯神棗仁石斛麥冬五味桂圓肉煎就入玄武膏收貯此時幸已煎成四五日矣亟索飲之連進三四盞筋脈頓舒其痛稍定又煎三料每日清晨飲一大盞自後飲食倍增閲月而起坐又閲月而起立又閲月而始步肌肉方長後進八味加蓯蓉為丸調理半載余乃痊此雖周痹症而以痿法治向使不與峻補焉能有更生之日哉嗣後永不再發虎潛丸龜板黃柏各四兩知母熟地黃各二錢牛膝三兩半芍藥一兩半鎖陽虎骨酥炙當歸各一兩陳皮七錢半乾薑五錢為末灑糊丸加附子更妙蠲痹飲秦艽一錢酒芩一錢羌活六分蒼朮七分酒柏一錢獨活八分威靈仙一錢酒炒木瓜一錢米仁一錢紅花三分當歸一錢桃仁七粒研枳殼一錢加薑三片水煎消症聞之一毫竅中皆有生氣所云生氣者則津液也皮毛得之以潤肌肉得之以滑筋骨得之以柔血脈得之以和其所以充周一身者固無乎不至也然以含而不露者為生氣出而不反者為死氣故東坡謂涕淚汗溺皆咸而惟舌下廉泉則甘故藏而不竭以灌溉於五臟六腑則何上中下三消之有然從何而生從何而發源乎或曰腎主五液則生之者腎也上焦如霧中焦如漚下焦如瀆則發之者三焦也而不知越人所謂腎間動氣者是乃五臟六腑之本十二經脈之根呼吸之門三焦之原一名守邪之神是氣之動則上而蒸津液肺得之而不渴胃得之而不飢膀胱得之而氣化惟真火衰而真水竭則不能上輸於肺而肺反欲借救於水矣不能中養於胃而胃反欲藉助於食矣不能下調膀胱而膀胱反欲擾動於精府矣於是引飲無度多食肌虛小便如膏皆水火之不能相濟乃至此將至自焚而死矣故治之者急宜壯水之主以鎮陽光兼進生脈散滋其化源此大法也而尤恐寒水不能上達立齋以大料六味內肉桂一兩益水中之火使之蒸動而上布所謂地氣上為云天氣降為雨而後甘霖沛遍生氣盈宇矣又何必分肺消膈消腎消紛紛求治為哉總之津液者人之所賴以生一日而不可竭者人亦何苦自焦自煩百計以竭之逮竭矣而假資放藥餌又不窺其原本譬之樹之滋膏既竭欲灌其枯萎而復生之不亦難之難哉上消麥門冬湯人參一錢麥門冬一錢葛粉一錢炙甘草三分五味子九粒知母一錢天花粉一錢原蠶繭三個水煎服中消黃耆湯黃耆二錢人參二錢石膏二錢煨熱炙甘草三分知母一錢粳米一撮竹葉五片水煎下消六味湯懷熟地三錢牡丹皮一錢澤瀉一錢山茱肉一錢半山藥一錢半茯苓一錢牛膝一錢半車前子一錢半水煎火衰加肉桂五味喘論嘗慨天地人三才也天地一日夜凡二息則亙古不弊人一日夜凡一萬三千五百息則度百歲乃去何若是之相懸哉蓋天地之氣合而人之氣分天地之於人又未始須臾而離彼春之溫為夏之熱彼秋之忿為冬之怒人在氣交中一呼則以天之氣而接人之氣一吸則以人之氣而接天之氣所謂天食人以五氣是也況呼出心與肺在上為陽吸入腎與肝在下為陰脾居中州而調之故徐而不迫則合其一萬三千五百息之常度也若有所勞倦則氣耗而喘出於肺有所憂慮則氣結而喘出於心有所飢飽則氣餒而喘出於脾有所暴怒則氣逆而喘出於肝有所縱欲則氣竭而喘出於腎故在脾肺者益其氣氣得補而喘自止在腎肝者滋其陰陰得返而喘自定雖有痰喘水喘火喘及六淫之邪為患最多亦不過標者其暫而本者宜固也試觀之天地有時而怒濤有時而晦冥有時而奔潰有時而崩陷其暴疾之可畏實同乎喘而終古不壞者不失其潮汐之常而以清以寧者如故也而人之患喘者使其清升濁降不改故常即至諸邪交侵亦安足慮哉如余治喘證多矣未有若儒者錢曾一室人庚戌秋患喘二旬余始延治比至聞聲如痰哮按脈則微促心肺腎肝壅逆而上痛不可忍上膈則實下腹則空檢方藥消痰降氣無遺用余因謂曰此陰虛發喘因喘而陰將絶矣約以六味湯加杜仲阿膠連進二十劑可愈否則不救當晚即進一劑覺胸膈痛遂止閲旦視之謂曰此藥不勝病亟取煎劑余坐進之連飲二盞胸次覺寬遂命以一日三劑由是喘定索粥五臟安和得保其生可見天地間之理固有至正不易者而豈容泛泛哉一丙午季秋幼兒患肺風痰喘因避熱乘涼所致痰喘四五日胸骨俱高消痰降喘藥俱不效延郡中曹子叔明視之曰此雖天熱而肺則受寒也以麻黃三分杏仁五粒桔梗枳殼廣皮荊防前胡之屬進一劑而得汗喘稍定余以貝母栝蔞霜連飲之以保破殘之肺獲安向非叔明見之精切則喘何由而定哉因録之以鳴感且以示後之同患者三拗湯治寒湍麻黃一錢杏仁十粒甘草三分薑三片水煎蘇子栝蔞湯治痰火發喘蘇子研桑白皮蜜炒川貝母去心研栝蔞霜各一錢杜仲一錢鹽水炒茯苓一錢廣皮一錢前胡一錢桔梗一錢甘草三分炙薑一片水煎熱甚加黃芩二冬湯治肺火而喘天門冬一錢半去心麥門冬一錢去心款冬花一錢紫菀茸一錢桔梗一錢甘草三分廣陳皮一錢川貝母一錢百合一錢馬兜苓一錢阿膠一錢水煎半夏湯治水逆而喘半夏一錢茯苓一錢炙甘草三分桑白皮一錢廣皮一錢澤瀉七分白朮一錢薑棗水煎仲景用木防己湯木防己二錢石膏二錢桂枝一錢人參二錢水煎腳氣昌黎謂軟腳病江南之人常常見之則西北希有蓋東方濱海傍水魚鹽之地其民食魚嗜咸令人熱中南方地下水土弱霧露所聚其民嗜酸食胕病則攣痹此則濕與熱合而成病也然濕者類水喜就下而熱往從之注於足脛則赤腫而疼乃妨步履甚則逆而上攻嘔惡不食作寒熱而似外感俗謂之腳氣傷寒大可嗤也夫寒傷經絡從足走頭故頭疼惡寒而名傷寒濕從下受害皮肉筋骨故紅腫疼重而成腳氣一天一淵如風馬牛之不相及也然有從內而感則酒濕乳酪之所致從外而入則風雨霧露之所侵不從內不從外而得則肥壯人氣之所及或濕痰下注或陰火下流種種不一而要以祛濕熱為主養血涼血次之舒筋除燥次之使不辨其方宜不別其居處不觀其勇怯不調其氣血而概以二妙投之恐不克副其名也將若何蒼朮除濕湯茅山蒼朮一錢泔制黃柏七分酒炒生地一錢宣木瓜一錢米仁二錢牛膝一錢當歸一錢獨活七分廣皮八分茯苓一錢燈芯一握生薑一片水煎飲酒人加葛根澤瀉各一錢或加漢防己白朮湯治氣血虧損足脛疼痛白朮一錢土炒人參一錢茯苓一錢牛膝一錢黃柏一錢蒼朮七分泔制當歸一錢白芍藥一錢酒炒木瓜一錢柴胡五分廣皮一錢棗二枚薑一片水煎丹溪婦人足脛痛用紅花牛膝俱酒洗生地黃柏蒼朮南星龍膽草川芎水煎服又治腳軟筋痛用牛膝二兩白芍藥一兩半龜板酒炙柏板酒炒各一兩知母炒甘草各五錢為末酒糊丸二妙丸蒼朮二兩米泔浸炒黃柏二兩酒炒為末神麯糊丸換腿丸治足三陰經為風寒暑濕之氣所乘發為攣痹緩縱或上攻胸背下注腳膝疼痛發熱行步艱辛薏苡仁南星石楠葉石斛檳榔萆薢酒拌牛膝酒浸羌活防風木瓜各四兩黃耆蜜炙當歸酒拌明天麻續斷酒炒各一兩右為末酒糊丸如桐子大每服五十丸鹽湯下閉症人之九竅陽七陰二皆五臟主之而六腑亡有然清陽出上竅濁陰走下竅則有形無形之別今腎既開竅於耳何以復開竅於二陰哉或曰膀胱者州都之官津液藏焉氣化則能出矣三焦者決瀆之官水道出焉膀胱乃腎之腑三焦為命門之使故隸之也小腸者受盛之官化物出焉大腸者傳道之官變化出焉腎為胃關下部法地故隸之也況肺主通調水道下輸膀胱則是又隸於手太陰矣脾主消磨五穀倉廩所司則是又隸於足太陰矣又何以獨主於腎也不知北方黑色開竅於二陰入通於腎者蓋陰竅不侔於陽竅五臟主藏而不瀉故走空竅而無形為精明之府六腑主瀉而不藏故走濁竅而有形為傳化之路究竟與腎何與殆化之者陽而所以化之者則陰無陰則陽無以化腎主五液是也試觀之腎虛之人小便必淋瀝大便則燥結又有腎泄遺尿之候益信腎之主二便也彰彰矣而小便閉又甚於大便閉者大便止苦精血虧損艱澀之患小便則脹悶不堪氣不化而形壞矣然則治之者專主於腎與不專主於腎與曰因腎虛而致者治其腎因他臟而致者治他臟陰陽者變化之父母生殺之本始上有病下取之下有病上取之或實或虛或熱或寒老少異病久暫異候緩急異宜神而明之存乎其人是可與知者道也一老人年七旬酒後不謹患小便閉及旬日點滴不通少腹脹滿連至腰胯坐臥不可始延治按其脈或促或結參伍不調檢其藥則五苓八正六一補中腎氣遍嘗罔應余因思虞天民用地膚草自然汁治百藥不應者曾驗即令其童採取之時值初夏其草尚嫩遂收以搗汁因以己意用鹽炒川萆薢一兩水煎共汁飲之以其能去膀胱宿水故也試嘗之小便湧決如泉晝夜不止其腹漸平但陰囊為前醫所熏赤腫如斗延吾郡瘍科療之用砭法出水逾日復作又延余治余曰小便不利一劑取效此囊癰之兆當以六十劑約兩月全愈老人曰日服二劑何如余曰則一月愈遂以炒黑龍膽草柴胡山梔當歸芍藥熟地茯苓澤瀉牛膝丹皮之屬瀉肝補陰果日消一日如期而痊一老人年六旬因幼年曾參禪習危坐運氣法得小便閉症比時士材笠澤兩先生以金匱腎氣丸投之不受反覺悶絶者三日及晚年來每至冬至前一日小便遂閉極力攻出解血塊如蜆肉狀頃之復閉三日不通則悶絶不醒余曰此少腹有瘀滯極力欲解則氣反不化故上攻而暈余以人參三錢琥珀一錢五分牛膝一錢五分丹皮一錢車前子二錢升麻五分且攻且補一降一升用之取效以後屢發投此無不神應若用他藥便沒幹涉疝論聞之男子之外腎猶女子之兩乳皆隸厥陰而司陽明此靈樞分配十二支也厥陰者肝也主筋而陽明主宗筋之會猶女子乳頭屬肝而乳房屬胃也蓋女子類陰故血主之男子類陽故氣主之此疝之為患所以攻衝脹滿而疼痛時作名曰疝氣然肝火下注則患左丸肝性急速故痛勝於腫脾濕下流則患右丸脾性緩慢故腫勝於痛又有外寒鬱熱者氣不宣通者腎陰不足者瘴癘所中者勞倦所傷者先天稟成者所因多端未有不本厥陰一經而述類象形如荔枝橘核茴香棠球之屬以類而推在血分則桃仁玄胡在氣分則枳實青皮寒則烏頭熱則梔子濕則蒼朮以燥之氣則香附以理之虛則葫蘆巴以溫之然此則散於外腎者也若結聚於膀胱左右攻衝時作為患心腹則又非前藥之所能療須察其所因虛實令患者戒馳驅除惱怒絶房事靜以調之俟以歲月乃可安痊否則歸咎於藥餌多見其不知諒也梔子湯治疝氣或左或右疼痛腫大梔子一錢炒黑山楂二錢橘核一錢荔枝核一錢澤瀉一錢枳實一錢歸尾一錢茯苓一錢小茴香一錢鹽水焙柴胡七分薑水煎蒼朮湯治濕氣鬱熱睪丸腫痛蒼朮一錢泔制葛根一錢山梔一錢炒黑茯苓一錢澤瀉一錢廣皮一錢山楂二錢燈芯一握薑一片水煎腎氣方茴香補骨脂吳茱萸各五錢葫蘆巴七錢半木香三錢半為末籮卜搗汁丸鹽湯下疝痛方山楂炒四兩枳核炒茴香炒山梔炒各二兩柴胡牡丹皮桃仁炒各一兩吳茱萸炒五錢八角茴香炒一兩上為末酒糊丸桐子大每服五十丸空心鹽湯下㿗疝方南星山楂蒼朮各二兩白芷半夏枳核神麯各一兩海藻昆布各五錢玄明粉吳茱萸各二錢為末酒糊丸治疝痛作腹內塊痛方三稜莪朮醋煮炒曲薑黃南星各一兩山楂二兩木香沉香香附各三錢黃連五錢茱制萊蔔子桃仁山梔枳核炒各半兩為末薑汁浸蒸餅和丸丹溪治疝劫藥用烏頭細切炒梔子仁炒黑為末或加或減白湯丸關格關格一症上則格而不入下則閉而不通乃陰陽偏勝之候亦陰陽離絶之證也陽偏勝則上逆逆之久則陰從之上逆故水漿不受煩躁不寧陰從之故出而不返有升無降陰陽於是乎離絶頭汗出而四肢冷脈無而死矣不然丹溪謂上竅通則下竅之水出焉此何以上愈通而下愈不出也然素問云無陽則陰無以生無陰則陽無以化今陽偏勝而陰往從之則有陽無陰灼然可知經又曰上焦主納下焦主出又曰三焦者決瀆之官水道出焉今上不納而下不出則三焦之火竭盡無餘求其頭無汗而陽不上越肢不冷而陰不下絶其可得乎扁鵲謂不得盡其命而死後腎謂九死一生之候誠難乎其為治矣余獨思陰絶陽絶誠不可療使當其未竭絶之際而欲得一挽回之法非上有以回其陽下有以挽其陰烏克有濟因悟仲景白通湯用薑附純陽之藥恐其陽上絶而以人尿豬膽純陰之味引之恐其陰下絶使陰陽協於和而後已斯則治法之善者也及節庵擴而充之立回陽返本湯亦陰陽相濟欲底於平加黃連臘茶以降火薑附為反佐而以人參五味復其津液元氣使不致於離絶則又法外之法也嘉言出立黃連進退湯酌其陰陽之偏而進退補救之又從事於八味湯復其陰陽之根以立其命可謂思窮而路絶矣學者誠於此而會通焉則關格一症庶乎出萬死於一生濟無窮之夭枉矣按格之吐逆與凡吐逆之不同蓋凡吐逆則小便利陽氣得以下榮陰氣尚能留戀則不至於上脫矣關之小便不通與凡小便不通之不同蓋凡小便不利則上不吐逆陰氣縱不能化陽氣尚未離絶則不至於下脫矣惟格則陰絶於上故投熱藥而彌熾須以陰藥濟之則不捍格關則陽絶於下故投陰藥而厥逆須以陽藥挽之則能氣化此陰陽俱病須以陰陽相濟之藥救之乃玄妙之門也試驗小便不通必小腹脹悶不堪惟關症則但有急而欲解之狀未嘗脹悶可知陽氣耗而陰氣併為之竭矣此時嘔逆甚而胸滿或痛亦陰氣上竄之故初非有實邪也且腎主二便又主水火今氣不下納根將絶矣八味丸導火歸元而能復真陰非又要著也哉黃連進退湯川黃連薑汁炒炮薑半夏川牛膝鹽水炒白芍酒炒各一錢人參錢半大棗肉三枚童便小半杯水煎如陽虛肢冷加熟附子一錢減連五分陰虛躁渴加麥門冬一錢去半夏白通湯蔥白二莖熟附子三錢乾薑錢半水煎加人尿豬膽汁回陽返本湯見陰症論
