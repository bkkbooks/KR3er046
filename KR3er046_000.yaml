front:
  text: 序予始識懷子抱奇時方治帖括自後天下苦兵革生齒半瘡痍予愧出而為吏未能蘇疾苦振窮厄及退居鄉曲知懷子隱於醫以自全生活人無算嗟乎不為相則為醫士君子利物濟民有志者當如是矣然而周官之於醫也歲有考月有稽以其治療之多驗與否定上中下之目非如後世之人自以為長桑而漫無准量者也夫古今方伎匪一惟醫則屬之修短之數利害攸寄有人曰我善用兵兵不必孫吳而勝之數少敗之數多矣有人曰我善用藥藥不必盧扁而生之徒三死之徒七矣軒皇涿鹿之戰開兵法之祖乃素問一書實為千古萬年續命之經天道好生而惡殺聖人以藥濟兵之窮愚者乃姑妄試之而刀圭竟為不祥之器學醫人費可不為寒心哉語云習方三年無可醫之病醫病三年無可用之方此言良醫別有慧悟非必局於紙上陳言也懷子則曰長沙易水諸大家著書立言發所未發以詔後人皆大醫王慈照軟語方不可執法亦不可廢第其中若者從若者違爭在絲髮之間必能直追所見自言其所當然庶免史公疾多道少之譏而治者稱至繁變莫傷寒若故往往難之懷子則出之以易管令人約而可循迄於雜症女科爰悉舉其平昔已試之法剴切詳盡著為醫徹吾知其於生人之道真可告無罪於天下譬之為民牧者確有治譜可傳稱為眾母無愧耳嘉慶戊辰季春青浦述庵王昶題序懷子抱奇氏少治儒術壯歲棄去㠯家學濟世幾三十年功大溥頃之又㠯為施諸利濟不若垂之於言功益大溥爰著傷寒醫徹一書勒成一家言自余雜症㠯次舉遂貽顧子使討論之願子乃言曰嗟夫古之君子皆有神明之學上窮下際外察五運五氣之感內洞三陰三陽五會之蘊蓋有不待切脈望色聽聲㠯至寫形莫不曉見生死故其治人也合表裡有餘不足順逆之法參其人動靜與息相應其道至於聞病之陽論得其陰聞病之陰論得其陽此至人之事儒生學士非所可與僕中年來有志斯役會人事閒之忽忽不竟學然竊見世人所害莫亟於傷寒而其變為甚當漢中世有仲景氏㠯神功聞而所治多冬月犯邪病在巨陽率用麻黃取效間立附子救里不數數然也厥後劉河間氏風行北地矣切其大指亦瀉伐之功百溫平之功一是二公者略相若竊獨疑虛實嫌疑之辨尚鐍而未啟何也至東垣李氏出始發明兩感分別內傷之因繇是釋表不事而建義補中後之作者方悟升陽導火能救人於垂亡而執例誤投者往往不治李氏之功在內經豈小哉今抱奇氏於諸家本末詳哉言之其為書也於所患探其受者何陽何陰或似是而非也必有條也於所治策其施者何標何本或患同而治異也必有別也昔賢未發者補之今人沿謬者正之取所當療治多疑難而已效者據證案末可不謂體理燦然博而有要哉其勤至矣僕因是有感焉向嘗遊京師意公卿大夫輻輳之地必有國工若仲氏李氏翱翔其中比同舍生犯疾延某診視輒進大陷胸湯越再宿結胸而逝夫某者京師謂之良醫所以致令譽繇此道也乃一施之南人同舍生則死斯固誤下之咎或亦南北異稟治北者不可移而之南乎然不然也抑因是又有感焉憶兒童時我郡多名家所主治者盪滌而已以人參立方什不得一勉而少用輒問曰服參否也而服者亦什不得一今天下則毋論老幼苟有疾必參參不已必附非是則言草木之汁不奏效也計相去六十餘年耳生民脆薄日㠯甚視六十年前龐眉皓髮之侶終身不進參附者若太古然豈天地元氣薄而不收人生其時雖大補而尚憂不足耶然不然也夫抱奇氏居中央斯量地氣之剛柔和物化斯相古今之厚薄既升仲氏之堂旋入東垣之室兼而濟之各存其是其書具在儻所謂參其人動靜而與息相應將在乎此神而明之豈伊異人與僕私喜鄙言之有徵矣時嘉慶十三年在戊辰八月朔日同邑年家眷弟顧開雍拜手撰並書
