body:
  text: 凡例一傷寒頭緒最繁予盡削去獨舉大綱曉暢厥義而條貫自達一傷寒向重表裡而虛實為尤要先哲已代明之茲編特委曲詳盡欲臨症者慎焉一是書專論傷寒每引他症以相較蓋他症既明則不混於傷寒而無妄治之失矣一凡先哲要旨間取一二以備參閱蓋不敢私秘欲公好於吾黨也一醫案僅舉一二就正有道匪敢矜其所得效步邯鄲務期有裨於大義而已一是集坦易簡直然歷二十餘載揣摩經驗凡幾易稿始就俟有識者採擇焉一雜症另附取其明備約於至當不出先賢圍範而亦不囿於圍範有取之左右逢源之樂故並載之一婦人科凡調經胎前產後最費調攝得其指歸仍易拾芥茲編獨約而該簡而明參閱之自悉一原方備載以便參考有可遵守者有宜變通者在臨時裁酌斷不應膠執以違病機反致遺害也一醫學與他藝不同毋論貴賤為性命所倚托非小可事也必立心貴謹處行欲方見聞期博體驗惟精庶足無愧故並致篇末以告同志云
