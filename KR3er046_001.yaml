body:
  text: 卷之一傷寒傷寒論經曰人之傷於寒也則為病熱余始讀而疑之謂既傷於寒何以反病熱乎蓋寒者天之陰氣也熱者人之陽氣也天以陰氣侵人則拘急而畏寒人以陽氣被郁則蒸冒而發熱然邪氣既盛正氣不能拒之而出須以辛溫之藥助之使邪從汗解而愈此發表之所由設也重則麻黃次則羌活又次則紫蘇皆當因其輕重而施之中病即止毋使過劑過則邪氣既去正氣反虛種種變遷不易枚舉蓋汗者身之液也始由寒閉腠理無從發越故藉汗以疏通令氣和平斯已今發之太過則人身之津液既耗於外必竭於內無論汗多亡陽而胃腑燥竭腎陰消亡煩渴祕結等症總由一汗所致諸謂其可泛視乎故余嘗謂治傷寒法不可不汗不可輕汗不可大汗不可再汗不可誤汗明乎此者庶入仲景之室而免文伯之恐也一太陽受冬月嚴寒頭疼壯熱畏寒拘急脈緊盛而無汗者仲景用麻黃二錢桂枝一錢甘草五分杏仁八粒生薑三片棗一枚水煎名麻黃湯治冬月正傷寒此不可不汗也一前症雖具或感非時暴寒不可與麻黃湯用羌活紫蘇防風荊芥葛根廣皮川芎甘草等量症加減此不可大汗也一前症雖具或元氣素弱或向有雜病及産後痘後失血後兼勞倦內傷並犯房欲者果又冒寒方與荊防蘇葛甘草陳皮隨症加減微解其表若不因寒而發熱者只治其本此不可輕汗也一前症雖具曾經發表出汗不可復用發散蓋邪既卻矣而又汗之能不傷正氣乎此不可再汗也一凡惡寒發熱雜症皆有即一瘡一癤亦復如是豈可不審何證所致概用發散如余治一婦惡寒發熱脈得洪數詢之乃左乳腫痛余竟治其乳腫痛頓消寒熱亦止舉一可例其餘此不可誤汗也余觀近時風尚凡病家醫士及旁觀者一發寒熱動以傷寒首戒每必曰曾汗否曾下否使汗之下之而斃縱無憾也如不汗不下而痊猶未愜志焉此生民之厄運未俗之波靡也失哲代起而痛發之相沿不覺可勝悼哉余習見勞倦陰虛雜症胎前産後暑病等妄發汗而死者不可勝計不得不深致焉兩感論傷寒一經有一經之症則有一經之治或傷於陽或傷於陰固不同也經何以言兩感哉傷寒有並病矣如雲太陽未已復過陽明或少陽並之已盡則入里未盡猶在表是陽與陽並也烏知陰不與陰並耶有合病矣如雲太陽陽明齊病陽明少陽齊病或三陽合病則自下利是陽與陽合也烏知陰不與陰合耶有傳經矣如雲一日太陽受之二日陽明受之三日少陽受之四日太陰受之五日少陰受之六日厥陰受之然有始終只在一經者有傳一二經而止者有越經而傳者有過經不解者是由陽傳入陰也若陰出之陽則愈矣有直中矣三陰受邪始終不發熱乃不從陽經傳入是陰自受病也則與陽不相侔矣若此者俱不可謂之兩感而所謂兩感者則一陰一陽同受病也如雲太陽與少陰俱病則頭痛口乾而煩滿陽明與太陰俱病則腹滿身熱不欲食譫語少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人雖然三陽之頭疼身熱耳聾感於寒者則誠有之三陰之煩滿譫語囊縮則是傳經熱證若初感於寒則固未之或見也且傳經熱證與兩感之證既已相同何以於傳經者曰熱雖甚不死於兩感者曰必不免於死余不能無辨焉蓋傳經者由三陽入三陰始終發熱乃脈與證相合者也兩感者則一陰一陽外受寒為表實內受寒為裡虛必脈證不相合者也如嗣真云太陽症得少陰脈少陰症反發熱之例差足以當之故豫嘗謂傳經之邪感之者多實故不即犯三陰而無慮其為甚兩感之邪受之者必虛故即兼及三陰而觸之即不免經雖不言虛實而雖甚必不免之辭不可充而見之哉若嗣真注兩感篇則依文配釋求之病情終不相符故豫以嗣真太陽少陰之例推之於陽明太陰少陽厥陰當無不然又何疑之有附嗣真少陰症似太陽太陽脈似少陰不同論蓋太陽病脈似少陰少陰病證似太陽所以謂之反而治當異也今深究其旨均自脈沉發熱以其有頭疼故為太陽病脈當浮今反脈不浮而沉者以裡虛久寒正氣衰微所致今身體疼痛故宜救里使正氣內強逼邪外出而乾薑生附亦能出汗而解假若里不虛寒則見脈浮而正屬太陽麻黃證也均自脈沉發熱以其無頭疼故名少陰病當無熱今反寒邪在表但皮膚鬱閉而為熱如在裡則外必無熱故用麻黃細辛以發表間之熱附子以溫少陰之經假使寒邪惟在裡當見吐利厥逆等症而正屬少陰四逆湯證也以此觀之表邪浮淺發熱之反尤輕正氣衰微脈沉之反為重此四逆為劑不為不重於麻黃附子細辛湯也可見熟附配麻黃發中有補生附配乾薑補中有發所謂太陽少陰脈沉發熱雖同而受病有無頭疼與用藥自別故並言之耳若誤治之其死必矣按嗣真云太陽症頭疼身熱是太陽感寒也脈當浮而反沉是少陰脈又非少陰感寒乎用四逆湯治少陰救里為急不慮太陽之邪不出也又云少陰症脈沉是少陰感寒也不應熱而反發熱是太陽症又非太陽感寒乎用麻黃附子細辛湯兼治太陽以發表熱不慮少陰之經不溫也雖然太陽症而脈浮復兼吐利將獨治太陽乎少陰脈沉而發熱不兼太陽則又當專主少陰矣不可不知由此推之如陽明身熱潮熱而脈微弱下利四肢厥冷則又是太陰矣寧獨主陽明也乎不得不參附子理中等湯救太陰之裡也少陽寒熱往來而脈細蛔厥煩躁腹疼則又是厥陰矣寧獨主少陽也乎不得不參吳茱萸等湯救厥陰之逆也蓋陽症陽脈易辨也陽症陰脈症假脈真也又有症假而脈亦假者如陰極發躁欲投水中脈來鼓指重按全無內真寒而外假熱也更有脈澀肢冷嘔逆便祕伏熱於中水極似火火極亦似水也凡此者又豈可與兩感同論哉要之治其本者百不一失治其標者百不一得臨症者慎旃四逆湯附子二錢甘草乾薑各一錢五分水煎服麻黃附子細辛湯麻黃細辛各二錢附子一錢水煎服理中湯人參白朮乾薑各一錢甘草八分水煎服腹痛甚加附子寒而吐者加生薑小便不利加茯苓腎氣動者去朮吳茱萸湯吳茱萸生薑各三錢人參一錢水鍾半棗一枚煎七分服太陽論經曰巨陽者諸陽之屬也其脈連於風府故為諸陽主氣也又曰傷寒一日巨陽受之頭項痛腰脊強以其經從頭項下肩膊挾脊抵腰中其所統者大其所循者遠故易以犯犯之則惡寒發熱獨甚於他經仲景以麻黃湯發之此有是太陽症用是太陽藥也若在陽明則熱多而寒少無是症矣在少陽則寒往而熱來亦無是症矣傳入三陰則有熱而無寒更無是症矣故惟太陽一經寒獨甚脈獨緊汗獨無未傳陽明則口不渴未傳少陽則耳不聾仲景用麻黃湯為太陽之正治固非易老九味羌活湯之所能代也若苟非太陽而陽明則用葛根湯非太陽而少陽則用柴胡湯均非麻黃湯之可假借也雖然太陽一經非獨冬時嚴寒能觸犯之而四時寒邪皆能犯之如犯之而身果寒脈果緊其症具在即四時皆用麻黃可也如犯之而寒不甚緊不盛其症雖具即冬時不用麻黃可也況作勞辛苦之人及本元虧損之後而偶冒寒邪脈緊少力者又當從權以治不必執用麻黃可也蓋以麻黃驍悍之性攻邪固易損正不難一誤投之為變不測可不慎乎按麻黃湯為太陽經正藥余所以諄諄慎之者蓋非其時非其經非其人之質足以當之鮮不為害請勿輕試為天下幸甚治驗一友積勞後感寒發熱醫者不審以麻黃湯進目赤鼻衄痰中帶血繼以小柴胡湯舌乾乏津余診之脈來虛數無力乃勞倦而兼陰虛候也誤投熱藥能不動血而竭其液耶連進地黃湯三劑血止而神尚未清用生脈散及歸脾湯去耆朮投之神雖安而舌仍不生津豫曰腎主五液而肺為生化之源滋陰益氣兩不見效何也余熟思之乃悟麻黃性不內守服之而竟無汗徒傷其陰口鼻見血而藥性終未發泄故津液不行豫仍以生脈散固其本用葛根陳皮引之遂得微汗舌果津生後以歸脾湯六味丸而痊一醫者素自矜負秋月感寒自以麻黃湯二劑飲之目赤唇焦裸體不顧遂成壞症一藥客感冒風寒自謂知藥竟以麻黃五錢服之吐血不止而斃此二症雖進黃連解毒犀角地黃湯終不挽回大可駭也麻黃湯麻黃二錢桂枝一錢甘草五分杏仁八粒加薑棗水煎九味羌活湯羌活防風蒼朮各一錢甘草白芷川芎生地黃黃芩各一錢五分細辛七分加薑棗水煎陽明少陽論經曰二日陽明受之陽明主肉其脈挾鼻絡於目故身熱目疼而鼻乾不得臥也三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾夫同是受寒不日一日獨日二日三日者蓋傳經之邪居多而自感者少自感則寒傳經則熱仲景用葛根湯小柴胡湯主二經之病節庵一曰解肌一曰和解又謂不從標本從乎中治固知非若太陽汗之而愈也學者其可執乎然二經亦有自感者如陽明為邪首面大腫少陽為邪耳前後腫此不從太陽傳入而發熱與傷寒無異東垣用普濟消毒飲子及鼠黏子湯治之蓋陽明主燥少陽主火非比太陽屬寒水之司故治各不同也按寒邪入里未有不傳陽明乃陽明腑病非陽明之經也陽明者胃也胃為水穀之海一受寒邪則水穀不行為熱為渴為脹滿甚則譫語狂言皆其邪也治之者不可過汗以竭其液一也不可早下以傷其陰二也不可寒涼以阻其化三也宜以葛根平胃加減調之若少陽一經屬木有火為嘔為聲為寒熱往來則以小柴胡湯為主女子臨經即謂熱入血室甚則譫語加生地丹皮乃至正之法也尤不可汗下一陽明傳變至多治之貴乎得宜寒則凝而食不化熱則燥而液愈亡故止渴用葛粉以鼓舞胃氣勝於花粉知母平胃用厚朴以溫中州非比木香豆蔻如在上用桔梗枳殼在下用枳實青皮而甘草調中陳皮理氣山楂萊蔔消滯之類雖極平和實至當不易之常理也然有飲食伏於中而不顯於脈症者有脈症似乎飲食而實非飲食為患乃中氣虛所致則又當細問其病因察其脈色舌苔按其胸腹有無痛處大便曾解不解或補或瀉出一定之見以療之方為得耳葛根湯葛根一錢半麻黃一錢桂枝芍藥甘草各六分加薑棗水煎此方治太陽無汗惡風太陽陽明合病如陽明腑病不可概用小柴胡湯柴胡二錢黃芩人參半夏各一錢甘草五分加薑棗水煎服加味小柴胡湯即前方加生地丹皮各一錢普濟消毒飲子黃芩酒炒黃連各八分焙人參橘紅玄參甘草生用連翹牛蒡子炒研桔梗柴胡殭蠶炒薄荷各五分板藍根馬屁勃升麻各二分水煎服便祕酒煨大黃一錢鼠黏子湯牛蒡子焙研枳殼甘草炙柴胡連翹黃芩桔梗各一錢薄荷葉二錢水煎三陰論經言六經而即繼之曰三陰三陽五臟六腑皆受病此何以說也余請以三陰概之可乎傷寒傳入三陰已寒變為熱矣蓋太陰者脾也其經布胃絡嗌故邪入之則腹滿而嗌乾然經既屬脾經病則脾亦病脾主消磨亦失其職況布於胃則食不化而腹滿絡於嗌則熱傷陰而嗌乾且但曰滿則邪猶在中焦未可遽下故腹滿平以厚朴陳皮嗌乾和以葛根枳桔此雖治太陰之經實即治陽明之腑也少陰者腎也其經絡肺系舌本故邪入之則口燥舌乾而渴然經雖屬腎土旺則水必虧腎為胃關亦失傳化況絡於肺則水不升而作渴繫於舌則津益亡而口燥此時邪熱已深仲景所謂忽下以存津液故實則大小承氣下之虛則六味地黃潤之此雖治少陰之經亦即治足陽明兼手太陽手陽明之腑也厥陰者肝也其經循陰器而絡於咽故邪入之則煩滿而囊縮厥陰者陰之盡也經雖屬肝此時胃邪下陷陽亢陰渴腎水既虧肝火彌熾蓄熱不解則煩而且滿陰氣已極則囊縮少泄如果大便未下急與下之下後不解即與黃連解毒之類宣散蓄熱庶或有生此雖治厥陰之經實即治五臟六腑俱受之病也不然或謂邪入於臟或謂邪入於腑又為藏物之臟紛紛不已曷與正之按三陰邪熱皆從三陽傳入而陽明失治尤多始而過汗以竭其液繼而過下以損其陰液者氣之餘也陰者血之屬也氣血既損則煩滿燥渴等症作矣況無陽則陰無以生無陰則陽無以化三陰既虧則腐熟傳道化物之司愈失其職仲景欲急下以存津液豈無有窺其微者耶養葵先生出直以六味補水挽其源而治之矣三焦論內經傳入三陰止曰可泄而已仲景以下字易之立大小調胃三承氣湯後人遵而用之一汗之後輒爾遽下遺人夭殃者多矣不知仲景分痞滿燥實堅有上中下三焦氣血水穀之別不精求其理則其法不可得而施也何以言之上焦者氣分也主納而不出病則不能主納矣於是為痞在上者因而越之然有可吐者有不可吐者有吐後不減者須枳桔陳皮之屬泄上焦之氣則得矣中焦者主腐熟水穀者也病則不能主腐熟矣於是為滿腸胃為市無物不受宜各隨其所受而消之磨之加以苦溫等藥是泄中焦法也下焦者陰分也主出而不納病則不能主出矣於是為燥實堅積蘊熱既久津液必亡不能傳導須以蕩滌之劑下之斯愈矣由是觀之則上中下三焦自有淺深次第有治上焦而中焦得快者或治中焦而下焦得通者斷未有不泄上中二焦而遽用承氣以下下焦之理也觀其曰邪在中焦不用枳實厚朴恐傷上焦元氣以甘草和中名曰調胃豈芒硝大黃獨不傷元氣乎又豈甘草一味所能調之乎觀其曰上焦受傷則痞而實去芒硝名小承氣謂不傷下焦真陰豈枳實厚朴大黃果不伐其根本乎觀其又曰三焦俱傷痞滿燥實堅俱全用大承氣湯將謂上不傷元氣下不伐真陰乎又豈可一概浪投者乎必須以手按病人自胸至少腹果有硬處手不可近不得已而施之可耳雖然其間有至理存焉人之所藉以有生者命門也其所以稟命而運行者三焦也命門為生氣之原一名守邪之神三焦者出氣以溫肌肉充皮膚故寒邪侵犯獨賴此火以御之使不得深入肌膚即發壯熱而出納腐熟之司則不能如平人令矣所以傷寒獨不可食食亦不化正謂邪熱不殺穀也宜用甘苦溫之藥助之方可奈何反用苦寒以伐其生氣哉否則此火一衰寒邪直犯則為純陰症矣豈能發熱乎按豫一日讀東垣脾胃論其詮解黃耆謂除躁熱肌熱之聖藥又云溫肉分益皮毛實腠理以益元氣而補三焦也似乎勞倦發熱亦本之三焦則余以傷寒發熱歸於三焦益非無據然內傷不能食而可食傷寒獨不可食何歟一則本氣自病利用補一則客氣來乘利用攻也附時珍三焦辨時珍曰三焦者元氣之別使命門者三焦之本原蓋一原一委也命門指所居之府而名為藏精系胞之物三焦指分治之部而名為出納腐熱之司蓋一以體名一以用名其體非脂非肉白膜裹之在七節之旁兩腎之間二繫著脊下通二腎上通心肺貫屬於腦為生命之原相火之主精氣之府人物皆有之生人生物皆由此出胡桃仁頗類其壯而外皮水汁皆青黑能入北方通命門利三焦愚按即胰脂也聯絡臟腑充周一身皆藉此謂胃承氣湯大黃六錢酒洗芒硝四錢甘草一錢水煎小承氣湯大黃四錢厚朴二錢炒枳實一錢炒水煎大承氣湯大黃五錢厚朴二錢炒枳實一錢炒芒硝四錢水煎陰證論陰寒一症向謂寒邪直中便爾四肢厥逆陽氣頓竭身如被杖腹中絞痛下利清穀脈微欲絶急投四逆理中輩以溫之猶恐不及竊思人之一身有衛氣營氣宗氣元氣春升之氣水穀之氣種種護持發源於三焦命門以為生生之用者也何寒邪一犯輒爾深入至此不知此非外中之寒乃本身無火命門真原早已衰絶即不受寒而陰慘之象已具於身中偶或觸之而遂至是也或以為陽氣暴絶或以為生冷內傷或以為大寒侵犯皆言其標而不言其本所以仲景取方止曰救里意可知矣況此症生氣索然變異頃刻非薑桂參附不足回垂絶之元陽猶得藉口於外中也哉一少陰下利清穀手足厥逆脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯生附子一錢炙甘草一錢乾薑一錢五分溫服面赤加蔥腹痛加芍藥嘔加生薑咽痛加桔梗利止脈不出加人參一傷寒已發汗不解反惡寒者虛也仲景用白芍藥三錢炙甘草三錢炮附子二錢補之黃耆建中湯亦可用一傷寒下後又發其汗晝日煩躁不得眠夜而安靜不嘔不渴無表症脈沉微身無大熱者乾薑附子湯溫之一傷寒陰盛格陽其人必躁熱而不飲水脈沉手足厥逆者是此症也孫兆用霹靂散附子一枚燒存性為末蜜水調服節庵用回陽返本湯更勝李東垣治馮翰林侄陰盛格陽傷寒面紅目赤煩渴引飲脈來七八至但按之則散用姜附湯加人參投入兩服之得汗而愈此則神聖之妙也一夾陰傷寒先因欲事後感寒邪陽衰陰盛六脈沉伏小腹絞痛四肢逆冷嘔吐清水不假此藥無以回陽人參炮姜各一兩生附子一枚破作八片水煎分服脈出身溫而愈吳綬曰附子乃陰症要藥凡傷寒傳變三陰及中寒夾陰雖身大熱而脈沉者必用之或厥冷腹痛脈沉細甚則唇青囊縮者急須用之有退陰回陽之力起死回生之功近世陰症傷寒往往疑似不敢用附子直待陰極陽竭而用之已遲矣且夾陰傷寒內外皆陰陽氣頓衰必須急用人參健脈以益其元佐以附子溫經散寒拾此不用將何以救之按陰寒之症為害迅速余所以詳列之者蓋欲臨是症者加意焉而不敢忽也通脈四逆湯四逆湯加甘草一倍乾薑附子湯乾薑二錢附子三錢水煎服回陽反本湯熟附子乾薑甘草人參麥門冬五味子臘茶陳皮面戴陽者下虛也加蔥七莖黃連少許用澄清泥漿水煎臨服入蜜五匙頓冷飲之黃耆建中湯黃耆蜜炙一錢五分芍藥二錢炒肉桂一錢去皮甘草五分炙加薑棗水煎去渣入餳一大匙煎一沸服若大便溏利或嘔者不用餳參附湯人參半兩附子炮去皮臍一兩分作三服姜水煎陰虛論夫陰寒者腎中之真火衰也陰虛者胃中之真水虧也真火衰則有寒而無熱真水虧則有熱而無寒經曰陰虛則發熱是也世或不察見其發熱動曰傷寒舛誤悖謬莫可言狀殊不知與傷寒二字絶不相干試診其脈則不緊而數不實而虛驗其症或頭目眩暈或引衣倦臥或腰腿痠疼或渴喜熱飲身雖熱而未嘗惡寒不喜食而未嘗脹滿詢其因非酒色過縱必大勞大病後不能謹欲乃致此急與六味地黃湯大劑飲之則熱退而病卻矣或畏寒口渴則用七味湯足冷脈弱則與八味湯或有畏其泥膈而不敢輕嘗者蓋不知六味八味等湯皆是腎經本藥直達下焦使果陰虛急藉以益水補火必不可缺必不可緩之劑更何疑之有治驗一人年五旬得發熱症已曾服藥七八日矣比豫診之脈來虛數目赤唇焦舌腫大無津余曰此腎陰水衰之候也宜進地黃湯彼家猶豫復延醫者曰脈虛甚矣乃所用藥則芩連梔粉清火之劑余曰若服此而津生所不待言服此而更甚則非此藥所能療也及服之愈甚始信豫言遂進地黃湯一劑覺少寐而舌和二劑而津果生後與生脈散相間服之得痊一人年五旬余素不謹欲冒寒發熱他醫曾與解散及余視之則脈微細面色通紅目赤唇焦舌黑而枯豫曰此真陰衰竭水火兩虧宜以八味湯加五味子峻補方可其家雖信未肯輕投余曰不用此藥則無救矣急延吾友唐子松聲驗之何如比至診之謂余曰此八味湯加五味子候也其言若合符節遂取而進服之果舌有微津連劑焦枯頓釋又加人參調理而安後不守禁半載後犯房戒用他藥以殞一徽商年二十八病後不謹發熱彼家以過啖厚味故復醫者投小柴胡湯三劑體倦腰胯痛不能轉側余診之脈微弱曰此女勞復也以七味湯加五味杜仲連進二劑即能轉側又數劑兼人參而痊六味地黃湯懷熟地三錢山茱萸一錢五分去核茯苓一錢淮山藥一錢五分炒牡丹皮一錢澤瀉一錢水煎八味地黃湯即前方加熟附肉桂各五分去附子名七味湯內傷論內傷一門東垣先生辨之詳矣或勞役無節或飢飽失時或思慮過度皆足傷其中氣而發熱焉此與傷寒亦絶不相干而治之者輒藉口而妄治真大可嘆矣診其脈不辨其氣口弦大無力也察其症頭疼不辨其時作時止也惡寒不辨其得就溫暖即解也發熱不辨其四肢乏力無氣以動也不食不辨其口淡無味也惡風不辨其惟惡些小賊風也喘急不辨其氣耗而乏也不寐不辨其心血不足也神昏不辨其神氣浮越也及用藥又烏信東垣補中益氣湯可止頭疼可除寒熱可進飲食可定喘促烏信濟生歸脾湯可益心神可調榮血身雖大熱而投之輒應其神妙有如是乎彼猶且揚揚驕人曰此太陽症也此陽明少陽症也汗之不愈表未解也下之不愈里未清也直至敗壞而醫者病者終不覺悟尚忍言哉尚忍言哉但東垣補中益氣湯其加減法最詳獨兼外感者則慎用黃耆兼停滯者則漸進參朮惟在用之得宜耳按內傷症必自汗必體倦必唇口淡白必飲食無味必脈大無力縱使發熱即與補中倘兼風食則先與解散而後補之若驟補則邪反熾而難為療矣此又不可不慎也補中益氣湯人參黃耆蜜炙白朮土炒各一錢五分甘草炙五分當歸一錢陳皮五分柴胡升麻各三分加薑棗水煎空心午前服歸脾湯人參白朮土炒白茯神黃耆蜜炙棗仁炒研各二錢遠志肉甘草湯泡淨焙當歸各一錢木香甘草炙各五分龍眼肉二錢加薑棗水煎服表症論傷寒之用表藥固其常也而余獨鰓鰓慎之何歟蓋藥性有剛柔人質有厚薄喜用之則昌不喜用之則危匪細故也即以麻黃論味輕而浮長於驅寒者也而失之太熱羌活獨活利關節為最勝也而失之過燥如太陰之蒼朮陽明之白芷厥陰之川芎吳茱萸少陰之細辛太陽之藁本氣味辛烈亦復如是故仲景立麻黃湯潤以杏仁和以甘草果足敵麻黃桂枝之辛熱乎易老九味羌活湯匯諸燥味以黃芩生地監之寡不勝衆又豈制方之善者乎余獨不然漫立一方以平易易之紫蘇味之辛溫者也足以去寒防風荊芥味之辛散者也足以去風柴胡性升能除表熱葛根性潤長於解肌廣皮辛苦能散能降甘桔味甘合以生薑辛甘發散如是而寒有不除風有不解者乎如是而有耗其津液損其真陰亡其元陽者乎若果脈緊無汗則加麻黃羌活脈細濕勝則用蒼朮獨活如吳茱細辛白芷藁本之屬倘或對症暫投則可否則感冒輕者稟質薄者及病後勞後産後酒色後即惡寒發熱豈可一概不審而漫執古方以恣浪投者邪即豫所定之方亦未必中肯綮也紫蘇飲紫蘇一錢五分防風荊芥柴胡葛根廣皮桔梗各一錢甘草炙三分山楂一錢五分加生薑三片水煎頭痛加川芎五分夾食加厚朴一錢薑製枳殼一錢麩炒如咳嗽去柴胡加前胡一錢按此方雖平易虛者猶不能當慎勿泛用多用得汗即止里症論傷寒傳裡發熱口乾胸滿煩躁甚則譫語揭衣皆裡實也攻之無疑又何慎焉不知攻裡之法宜緩不宜速宜平不宜峻宜專不宜雜宜升不宜降宜潤不宜燥何以言之飲食入胃消之者脾腐之者中焦易易者惟一為所阻而藉藥以化之則不能朝飲夕效部分有上中下用藥有深淺次第如邪在上中二焦而遽下之成結胸痞氣是也所謂宜緩不宜速也人之所籍以生者胃氣耳既為風寒飲食所傷而復藥以克之是重傷也惟用辛溫苦平之劑令其克化足矣非比大積大聚必得蓬朮大黃等峻厲以蕩之庶胃氣不大壞而完復可俟也所謂宜平不宜峻也既傷於食必審何物受傷何藥能制如山楂制肉萊蔔制面與豆陳皮製蛋杏仁制粉葛根制酒茗制穀氣之類一物一治用的為君以他藥佐之庶易見功不然泛投取應豈可得乎所謂宜專不宜雜也凡物之理有升必有降若降令太過則壅塞而不行胃氣喜升葛根能鼓舞之膽氣欲升柴胡能條達之而後加以內消之藥則升降之道得而物易以化矣所謂宜升不宜降也大腸主津小腸主液腎為胃關又主五液其所以能變化傳導者賴此耳若辛熱躁烈之藥有以竭之則煩躁斑黃譫妄之所由作也如平胃散中厚朴苦溫者也同以葛根則潤青皮枳實苦而下降也緩以甘桔則不峻楂肉味酸能調五味而化油膩廣皮枳殼能理氣而快膈若婦人多怒加香附以調之故傷寒里藥發表在前汗液外泄不可又用蒼朮木香草果豆蔻之屬復竭其液也觀其燥結獨用膽汁蜜導又可知矣所謂宜潤不宜燥也枳朴湯枳殼麩炒厚朴薑汁炒桔梗柴胡廣皮各一錢山楂葛根各一錢五分甘草二分炙加砂仁生薑水煎如寒未除加紫蘇一錢傷面加卜子一錢邪在下加青皮枳實各一錢去枳殼服四五劑邪已變化如未大便用豬膽或蜜煎導之按上表里二法最為穩當惟不竭其津液也豈待清火而後愈乎蓋寒涼一早食便不消其熱愈熾所謂點沸不如抽薪也熱症論傷寒熱症煩躁口乾耳聾目昏唇焦舌赤甚則發斑發黃譫語狂妄皆火為之芩連梔柏大黃之屬非正治之藥乎然而未可以驟也如太陽表未解而脈浮數火鬱則宜發之也少陽寒熱嘔而口苦木鬱則宜達之也陽明胃實而熱者上鬱則宜奪之也惟邪熱已深蓄而不解脈洪且數長而有力上焦涼膈散中焦白虎湯三焦黃連解毒湯虛煩梔子豆豉湯斑毒三黃石膏湯發黃茵陳梔子湯導赤散皆治火之劑也殊不知有虛火實火之分上焦虛渴生脈散中焦血虛發熱症類白虎當歸補血湯下焦真水已竭屢清不解六味地黃湯仲景恐腎水乾急下以存津液何不亟亟滋陰尚恐不及反用承氣以下之乎余每治傷寒發熱不止脈來虛數大便或行或結口燥咽乾耳聾目瞀胸中覺飢無所脹滿即股六味地黃大劑飲之無不應手獲效真百發百中之神劑也若以芩連梔柏大苦大寒反傷真氣趙氏所謂以有形之水沃無形之火適足以傷生耳安見其有濟也按清火有直折從治升散甘緩壯水諸法須看其形色脈候虛實及進寒涼而彌甚者不可不知變計也東垣升陽散火內經導火歸元固有采其微者矣涼膈散大黃朴硝甘草黃芩山梔薄荷各二兩連翹四兩各為末每服五七錢水煎服白虎湯石膏知母各三錢甘草五分炙粳米半合水煎服黃連解毒湯黃連黃芩黃柏梔子各等分水煎梔子豆豉湯肥梔子四枚香豉五錢水二鍾煎梔子一鍾入豉煎至七分去渣服三黃石膏湯黃連黃芩大黃石膏水煎茵陳梔子湯茵陳三錢山梔大黃各二錢水煎導赤散生地黃木通甘草炙各一錢為末每服一錢竹葉湯調服升陽散火湯升麻獨活羌活防風柴胡葛根人參甘草白芍藥水煎生脈散人參二錢麥門冬一錢半五味子三分杵水煎當歸補血湯黃耆六錢蜜炙當歸四錢水煎舌論凡看傷寒傳變首辨舌色則寒熱虛實之理昭然可見如口之渴與不渴津之有亡枯潤色之紅赤淡白苔之黃白焦黑刺之多少或易刮或刮不去易生腫之大小厚薄伸縮之難易飲之喜熱喜冷皆不可不細審也仲景云邪在表不渴傳裡則渴直中三陰則口不渴蓄血者口亦不渴此渴與不渴之宜辨也汗多則液亡舌乾燥熱妄投舌亦干濕家氣不化舌亦干熱甚則津枯陰竭津亦枯此津之有無枯潤宜辨也心火旺則舌色赤脾氣虛則舌淡白此色之紅赤淡白宜辨也胸中有寒則苔白而滑有食則苔黃熱甚則苔黑腎水竭則苔亦焦黑此苔之黃白焦黑宜辨也邪熱淺則刺少深則刺多真陰衰亦刺多又刺易刮者可治刮不去易生者難治此刺之多少難易宜辨也濕熱甚則舌腫大腎液亡則舌亦腫大若干且厚語不清者難治此腫之大小厚薄宜辨也舌雖干易伸如常者可治舌縮不能伸不能言者不治此伸縮之難易宜辨也實渴則喜冷飲恣而無厭虛渴則喜熱飲少與即止此飲之寒熱多少宜辨也以上分別最宜詳細而其尤要者在兼脈與症而察其虛實施其補瀉他不具論只如舌黑焦枯或腫或刺群工視之不辨而知其熱症非黃連解毒則大小承氣下之也殊不知脈虛數或微細胸腹無脹滿舌雖黑雖焦枯雖腫雖生刺乃真水衰竭不能制火惟以六味地黃大劑飲之虛寒加桂附五味子則焦黑腫刺渙若冰釋若芩連花粉愈投愈甚此豫所屢見而親信其必然者也又嘗治二人入水發熱濕氣大勝舌乾無津與平胃散加葛根飲之舌遂生津乃知脾胃受濕則氣不化津無以生用蒼朮以燥其濕則氣化而津生耳治驗一婦人發熱旬余舌乾生刺診其脈微細而軟按其胸腹無苦豫曰此過用克伐而胃氣虛也急進米飲俟三日胃氣當復枯者可潤而刺自去矣且聞藥則嘔若復攻之死在旦夕其母從之遂以米飲進覺甘美而嘔止舌稍和三日而津果生原醫者來視猶囑曰未可與米湯尚宜消導真所謂盲人騎瞎馬半夜臨深池此輩是也一柴客往上海取帳勞役而過啖遂發寒熱及歸醫與消導藥三劑舌乾而不得臥胸中如芒刺比余診之脈細而數豫曰此得之勞後使內非關食邪也與六味湯二劑頓愈附金鏡録辨舌黑治法曾禧治鄭汝東妹壻患傷寒得黑舌謂當用附子理中湯人咸驚駭遂止亦莫能療困甚曾往視之謂用前藥猶有生理其家拼從之數劑而愈金臺姜夢輝患傷寒亦得此舌手足厥冷厄逆不止衆猶作火治幾至危殆判院吳仁齊用附子理中湯而愈立齊曰舌黑之症有火極似水者即林學士所謂薪為黑炭之意也宜涼膈散之類以瀉其陽有水來剋火者即曾醫士所療之人是也宜理中湯以消陰翳夫有是病必用是藥附子療寒其效可數奈何世皆以為必不可用之藥寧視人之死而不救不亦哀哉至於火極似水之症用藥得宜效應不異不可便謂為百無一治而棄之也平胃散蒼朮米泔浸透切炒厚朴薑汁炒陳皮各一錢甘草炙四分水煎附子理中湯人參白朮土炒甘草炙附子炮乾薑炒各等分水煎結胸論結胸痞氣二者皆曰下早而成但有輕重之分實無陰陽之別仲景以大小陷胸及瀉心湯主之余不能不致疑其間也夫既曰下之早則邪或在表或在上皆未可遽下者也未可下而下之則邪氣反結於胸中有痛有不痛或痞滿而不快也試思所下之藥必大黃芒硝峻厲等味苟失其宜則外邪內陷而不復出中氣下陷而不復運故為結為痞豈有誤下乃結因結復下之理乎然則仲景大小陷胸等湯何為而設也仲景云大結胸手不可按用大黃芒硝入甘遂末名大陷胸湯乃蕩滌之劑恐為失下者立小結胸用黃連半夏加栝蔞實名小陷胸湯乃痰熱為患又豈曰下早所致乎水結胸半夏茯苓湯入薑汁乃水停心下也心下痞腹鳴下利半夏瀉心湯人參半夏乾薑甘草大棗因中氣傷也同黃連黃芩或熱猶未解乎若然則結胸何法以治之曰邪氣尚實仍與內消中氣傷殘只應溫補理中湯加枳實主之或藿香半夏甘草人參加炒枳實隨症施之可耳斷無復下陷胸之法也大陷胸湯大黃四錢芒硝三錢甘遂末二分水煎入甘遂末調服小陷胸湯黃連一錢五分半夏三錢栝蔞實二錢水煎服半夏茯苓湯半夏四錢白茯苓二錢五分水煎入薑汁服半夏瀉心湯人參半夏乾薑甘草黃芩各一錢黃連五分加姜五片棗五枚水煎服枳實理中湯枳實麩炒乾薑人參白朮茯苓甘草各等分水煎服或為末蜜丸彈子大熱湯化下連進二三服厚朴半夏甘草人參湯厚朴半夏各一錢甘草人參各五分姜五片水煎發狂譫語狂者陽明邪熱所發有實無虛也譫語則虛實參半焉鄭聲則虛多而實少矣何以言之陽明多氣多血邪又乘焉則亢陽無制上亂神明躁擾狂越不可名狀故為大實大熱也聖惠方用大黃五兩醋炒微赤為散以臘雪水五升煎如膏每服五匙冷水下蓋取其駿快之性定祻亂以致太平非此不能譫語者亦屬胃邪所致然有熱入血室或蓄血停痰鬱結驚恐種種不一則虛實參之鄭聲者止將一事一物重復諄諄乃因心有所寄情有所偏兼以火邪則虛多而實少矣昔攖寧生治一人發狂視人為鬼其脈纍纍如薏苡子且喘且摶曰此得之陽明胃實以三化湯三四下之愈此陽明發狂也治一女患心疾狂歌痛哭裸裎詈罵問之則瞪視默默脈沉堅而結曰得之憂憤沉鬱食與痰交積胸中湧之皆積痰裹血復與火劑清上膈此兼郁痰而狂也橘泉翁治吳檢討子年十八眩暈狂亂醫以為中寒已而四肢厥逆欲自投火中有欲用烏附回陽者翁曰此心脾火盛陽明內實非熱藥可療以瀉火解毒三劑得減此兼火而狂也汪石山治一婦三十餘忽病狂言披髮裸形不知羞惡其脈浮緩而濡曰此必忍飢或勞倦傷胃而然耳經曰二陽之病發心脾二陽者胃與大腸也忍飢過勞胃傷而火動矣延及心脾則心所藏之神脾所藏之意皆為擾亂失所依歸安得不狂此陽明虛也法當補之遂用獨參湯加竹瀝飲之痊此因內傷而狂也壺仙翁治發狂譫語歌笑不倫手足厥逆身冷而掌有汗兩手脈沉滑有力曰陽勝拒陰火極而伏反兼勝已之化亢則害承乃制也熱勝血菀故發狂譫語火性炎上故歌笑不倫陽極則反故身冷厥逆泄其血則火除抑其陽則神寧乃用桃仁承氣湯下血數升益以黃連竹瀝石膏之劑大汗而解此兼血而狂也要知狂為危候醫者到此未便措手輒曰下之豈知有如是變幻吾故表而出之丹溪治一少年秋初熱病口渴而妄語兩顴火赤醫作大熱治翁診之脈弱而遲告曰此作勞後病溫惟當服補劑自已今六脈時見搏手必涼藥所致竟以附子湯啜之應手而瘥又治憲幕傅氏子病妄語時若有所見翁切其脈告曰此病痰也然脈虛弦而沉數蓋得之當暑飲醉又大驚傅曰然嘗夏因勞而甚渴恣飲梅水一二升又連得驚數次遂病翁以治痰補虛之劑處之浹旬愈此二症又譫妄之異者並載附焉二化湯厚朴薑汁炒大黃枳實麩炒羌活各三錢水煎服獨參湯人參不拘多少分兩隨症拍破水煎服桃仁承氣湯桃仁肉桂甘草各一錢大黃二錢半芒硝一錢半水煎服蓄血蓄血一症治之非難而辨之為難辨之非難而辨之之早為難也當其發作時與外感無異醫者從而治之竟不得愈何故蓋血病而氣不病也其人或勞倦或跌撲或閃挫或鬱怒皆足以阻其血而停蓄成瘀蓄之久必發而寒熱乃作節庵謂表邪當汗不汗熱毒內積所致則未必然也又曰凡見眼閉目紅神昏語短眩冒健忘煩躁漱水驚狂譫語鼻衄吐紅背冷足寒四肢厥逆胸腹急滿大便黑小便數皆瘀血症雖有多般不必悉具但見一二便作血症主張此言最為得之非節庵心體熟識烏能辨此治之維何實者桃仁承氣湯加肉桂虛者六味地黃湯加肉桂蓋瘀血死血也寒則凝熱則行自然之理又或用破血理氣之藥而效者又或用犀角地黃湯治上焦抵當丸治下焦總之下盡黑物則愈爾按蓄血症面色削瘦白而無神四肢無力遍身發熱用他藥不效者必是此症以小柴胡湯加丹皮生地澤蘭鉤藤治之甚則加桃仁紅花如血去多而中氣寒者以理中湯加歸芍調之治驗一徽商年十八從遠歸當晚忽暈倒遍體俱冷醫一作火治一作痰治俱不效余診之脈虛而芤動則眩暈不能起坐忽吐出紫血豫曰此瘀血症也下出為順用人參二錢肉桂一錢澤蘭二錢丹皮當歸廣皮各一錢一劑而血下行三劑而身漸暖數劑乃痊一男子發熱面白無神脈得微澀欲絶大便黑時頭眩余曰此瘀血症而脈如此何敢攻之連進地黃湯四劑覺安甚又加桂四劑所去瘀血不計但口乾舌燥加五味子四劑又下瘀血腹中安舒而脈與舌猶故痰中見血以門冬貝母生地丹皮等漸愈蓋此症兼內傷元氣賴溫補而效肺經未免受克故以保肺收攻和血導瘀湯澤蘭一錢五分牡丹皮一錢當歸尾一錢陳皮一錢鉤藤鉤一錢懷生地一錢桃仁七粒研紫厚朴七分薑製炙甘草三分紅花五分加生薑一片水煎甚者加蘇木虛者去桃仁紅花乾薑湯治去血而嘔逆肢冷炮姜一錢茯苓一錢炙甘草三分當歸一錢澤蘭一錢廣陳皮一錢半夏一錢鉤藤一錢五分大棗二枚水煎犀角地黃湯犀角一錢生地黃四錢牡丹皮一錢芍藥一錢水煎抵當湯水蛭虻蟲桃仁各十枚大黃八錢水煎發癍癍者陽明胃經邪熱所化不發於表而發於里不發於初而發於後故陽明當汗不汗當下不下不當下而下其蓄熱皆能成癍點有大小稀密色有紅淡紫黑或隱或現或易出易收或不易出不易收總以熱之微甚為毒之輕重無論粗者為癍細者為疹稀少為蚊跡必須葛根托透為主若仲景治赤癍用阿膠大青湯豆豉為君主發而大青阿膠甘草乃解毒化熱者也治溫毒發癍嘔逆用黑膏生地倍豉又加豬膏純於解毒入雄黃麝香為使則又兼乎發者也學者雖不可執其方得此意而通之則癍之宜托與化治法從可推矣余治一婦夏月飲火酒發癍面赤煩熱診其脈絶無豫曰此火鬱而熱極用梔子豆豉湯加葛根厚朴黃連清之癍大出而脈遂見矣又一人傷寒過經不解遍體黑癍唇口焦枯脈大便結以三黃石膏湯飲之痊又一婦熱入血室後發癍點以小柴胡湯加生地丹皮獲愈又一友嗜烟酒常腹痛嘔逆身發大塊余以枳殼厚朴等平其濕熱逾日忽變頭粒成癍用解毒涼血而安凡此皆火熱之變也至於胃邪未清而發癍者尤多必脹悶不堪則當內消為主不可驟進寒涼恐癍不出而邪反結也如癍既出而熱不甚無火症則又不必化而自愈切勿更投涼藥以傷之學者其可執乎乾葛厚朴湯治胃實胸膈脹滿身發紅點脈大有力不可服涼藥葛根厚朴薑製枳殼麩炒陳皮桔梗各一錢山楂一錢半甘草三分煩躁加豆豉實滿加萊蔔子加姜水煎阿膠大青湯治赤癍大青阿膠甘草各一錢豆豉三錢水煎黑膏治溫毒發癍嘔逆使毒從皮中出生地黃二兩六錢好豉一兩六錢豬膏十兩合露煎之令三分減一絞去渣入雄黃麝香如豆大攪和分三服忌蕪荑陽毒升麻湯治陽毒赤癍狂言吐膿血升麻一錢五分犀角磨射干黃芩人參甘草各八分水煎入犀角汁服玄參升麻湯治咽痛發癍玄參升麻各一錢五分甘草八分水煎服白虎人參湯一名化癍湯治赤癍口燥煩渴中暍知母石膏各三錢人參甘草各一錢粳米一撮水煎發疹附疹者太陰肺經風熱所致與癍絶不相同而治法亦異蓋疹之發也乘於時氣無論長幼男女傳染不一或呼瘄子或稱麻子吳俗則為之痧總名曰疹乃另一種非癍疹之疹也其形密似針頭其色淡若桃花頭面愈多者佳以肺位至高也上見咳嚏下見泄瀉以肺與大腸為表裡也宜辛涼不宜溫熱以兌為燥勝也宜辛散不宜苦寒以肺主皮毛也溫之則火爍金而毒不解寒之則熱內伏而邪不化總以荊防薄荷大力葛根前桔之屬發透為主使毒盡出皮膚而鮮內攻之患最為上策冬月大寒不易出者稍加麻黃夏月大熱不易解者宜入連翹胃氣弱以米飲助之邪不在胃也中氣實以枳朴平之暫假則易也至孕婦發痘而胎不宜墮者痘喜內實也發疹而胎不自固者疹喜內虛也然欲安之而卒不可得又何故蓋胞系於腎金為之母今發疹則肺家之血盡出於外腎經絶生化之源而無以自養故胎必墮而罕留也又豈得與癍同日語哉且癍以二三日之間即化為輕疹以六七日之內漸沒為安則又殊矣按憶自己丑及壬辰癸巳疹症大行無論長幼闔境相沿比余診之則咳嗽噴嚏泄瀉甚至目紅鼻衄咽痛聲啞衆咸作癍治豫曰此皆屬肺經症乃疹而非癍也考之方書獨於幼科準繩得之猶未愜意內弟孫子大起專幼科性嗜學乃出朱惠民傳心録示余余讀之見其方法井井治驗昭昭豫遵而行之百不爽一任其變幻而總以發透為主其間有停食者有失血者有胎孕者略為加減或兼消兼清而孕未有不墮者孕墮而疹未有不愈者余於是時莫不應手取效又豈敢忘其所自哉姑識之治驗一女子食麵停滯而疹甚稠密余先與托疹胸膈脹滿加卜子厚朴而胸始寬疹亦透但能食者多而此其百一耳一男人發疹因服涼藥腹痛泄瀉疹色淡白余與白茯苓炙甘草厚朴陳皮葛根桔梗薄荷煨姜二劑腹痛止而疹紅綻乃愈一男子夏令發疹幼科加麻黃羌活鼻衄不止咽痛聲啞豫與玄參連翹甘桔鼠黏薄荷等清涼而安蓋疹不慮其多而慮其伏伏則喘急鼻扇甚則成疳痢勞瘵多至不救更有一人之身而二三發者乃時氣所感非比痘症終生一次不可不知荊防飲防風荊芥鼠黏子焙研前胡桔梗蘇薄荷陳皮葛根各一錢甘草二分山楂肉一錢五分加生薑一片芫荽一撮無則用子如發透去荊防胸膈不寬加枳朴痰多加蘇子瀉甚去鼠黏咽痛加射干火毒加玄參腹痛加茯苓厚朴二劑後去荊防加薄荷一錢枳殼一錢一疹本肺經世俗動以羌活太陽藥燥之一失也其害則為咽痛煩躁尤輕又以石膏湯寒其胃一失也其害則變異頃刻立致其死含冤者可不大畏哉發黃夫雜症之發黃多由於濕傷寒之發黃多由於熱濕則黃色暗而熱則黃色明也濕則酒面魚腥之所化故脹滿而不甚渴熱則辛散燥烈之所致故煩躁而不自寧治之者亦不可一例而施也脹滿者平胃散為主加以清水之劑煩躁者梔子豆豉湯為要佐以生津之味如干葛知母門冬花粉皆所以滋陰也山梔黃連黃芩黃柏皆所以抑陽也蒼朮秦艽茯苓車前皆所以除濕也至於食疸則枳實萊蔔之類必不可缺酒疸則解酲五苓之中又所急需女勞疸雖有礬石砂石散不如地黃湯易生地入車前牛膝尤勝陰黃四肢冷脈微附子理中湯加茵陳此先賢微妙之法也又有蓄血發黃桃亡承氣湯止治其血而黃自退也蓋此症受補者少而不受補者多不渴者易療而渴者難療久而不愈中滿腹脹便成不治之候矣茵陳梔子湯治發黃小便赤茵陳二錢梔子一錢炒黃連一錢車前子一錢炒澤瀉一錢枳殼一錢廣陳皮一錢乾葛一錢燈芯生薑水煎或加秦艽豆豉花粉知母平胃散治濕鬱發黃蒼朮一錢米泔制厚朴一錢薑汁炒廣皮一錢甘草三分山梔一錢炒茵陳二錢秦艽一錢茯苓一錢生地一錢葛根一錢燈芯生薑水煎枳實湯治食疸枳實一錢五分陳神麯一錢炒萊蔔子一錢五分炒研青皮一錢豆豉一錢茵陳一錢廣皮一錢山梔一錢炒黃芩一錢厚朴一錢薑製姜一片水煎吐蛔蛔者依胃為養贊助化物之需故古方欲其安而不欲其動用炮姜理中湯加川椒烏梅所謂聞酸則靜見苦則安也吳綬謂蛔厥卻緣多飢節庵謂妄發厥陰汗胃冷蛔上又謂吐蛔雖大熱勿犯寒涼則蛔厥之用溫中也必矣及閲仲景烏梅丸烏梅為君人參附子細辛桂枝蜀椒當歸為佐而柏皮之外又加黃連乃倍乾薑豈寒因熱用熱因寒用法乎乃余見一婦煩熱嘔酸脈數吐蛔欲投茱制黃連薑汁炒梔方可奈醫者執用溫藥隨飲隨斃益信仲景烏梅丸倍黃連早已開示後學一大法門而習俗罕究也又治二婦食傷脹滿不堪蛔竄十餘不止氣口脈有力竟投枳朴等溫中內消而愈蓋失飢與傷飽又不可執一者乎要之蛔在平人宜有不宜無宜少不宜多濕熱甚蛔蟲滋長發胃脘痛吐出則少愈若胃敗吐蛔色黑且腐併成族來者在不治例理中湯人參白朮土炒乾薑炮各一錢甘草八分烏梅肉二個川椒十粒水煎烏梅丸治蛔厥烏梅七十五個人參附子炮柏皮桂枝細辛各一兩五錢乾薑二兩五錢炮黃連四兩蜀椒當歸各一兩十味各搗末以苦酒漬烏梅一宿去核飯上蒸之飯熟搗梅成泥和勻諸藥蜜丸梧子大米飲下十丸漸加至二十丸忌生冷滑物枳實湯治胸滿右關脈有力吐蛔不止枳實麩炒紫厚朴薑製廣皮各一錢山楂一錢半柴胡七分萊蔔子炒研一錢炒熟砂仁末五分生薑一片水煎清中湯治脈數嘔酸黃水煩躁吐蛔山梔炒半夏各一錢黃連七分茯苓廣皮各一錢炙甘草三分竹茹一錢川椒十粒生薑一片水煎厥症陰陽二厥節庵辨之詳矣但寒厥易辨而熱厥易忽以其脈俱微細四肢俱冷則有以認熱為寒者矣但寒厥腹疼而瀉熱厥腹或疼而不瀉寒厥則喜熱飲熱厥則喜冷飲寒厥喜暖與日火光熱厥畏熱而不喜明寒厥投熱藥或捍格而移時即安熱厥服香燥而嘔逆彌甚餘一日初秋冒暑飲食未化即便吐逆少頃氣上壅四肢漸冷語言難布及按脈則細微自思吐之太甚故氣逆不下當晚以鐵鏽水磨下覺少平次日又出外不避暑逾日復作一友教以沉香磨服氣不下若見日光與火便覺厭極且終夜危坐不能安寢余乃思曰此火逆衝上四肢故冷是熱厥也命取黑山梔三錢冷水調下當飲便安復治一女子下痢艱迫四肢冷脈微細一醫欲用理中加茱萸治余曰此火邪內伏非寒也竟以山梔芍藥黃連木香等而愈況傷寒熱厥從傳經來寒厥從直中來又甚不侔者乎按二厥之外有氣厥者五志過極氣鬱不伸脈必沉伏婦人多見之蘇合香丸烏藥順氣選用有痰厥者體肥痰盛氣壅脈滑宜導痰湯二陳湯虛者倍加人參有食厥者發之必暴飲食不化填塞中焦上部有脈下部無脈鹽湯探吐最妙法也有大吐血後或産後去血過多陽無所附自汗手足冷宜益氣獨參湯理中湯之類有真氣虛寒者參附湯八味湯益火之原以消陰翳痓症痓之為言痙也痙直而不柔和也凡病至此實危且迫仲景以有汗無汗分剛與柔尤當以失汗過汗分實與虛可也如雲太陽中風重感寒濕則成痓蓋濕傷筋則拘攣寒入骨則強直小續命湯有汗去麻黃無汗去附子治之此因邪氣盛而筋脈為之不利也如雲大發濕家汗則成痓蓋濕流肢節大發其汗則濕氣復襲而侵之筋脈重傷關節不利宜秦艽等舒筋利濕以和之如雲發産後病後失血瘡家汗則成痓蓋氣血既虧復耗其液則筋脈失所滋養而角弓反張之症見乃氣血大損故也立齊以十全大補參附歸脾腎氣等湯隨症選用實有卓見若作風治則失之矣小續命湯麻黃去節人參去蘆黃芩芍藥酒炒甘草炙川芎杏仁去皮尖炒防己官桂各一兩防風一兩半附子炮去皮臍五錢每服五錢姜五片水煎服剛痓去附子柔痓減麻黃秦艽升麻湯升麻葛根甘草炙芍藥炒人參各五錢秦艽白芷防風桂枝各三錢每服一兩蔥白三莖水煎十全大補湯肉桂去皮甘草炙芍藥炒黃耆蜜炙當歸酒淨川芎人參去蘆白朮土炒茯苓熟地黃各等分每服六錢姜三片棗二枚水煎人參養榮湯白芍藥一錢五分酒炒人參黃耆蜜炙白朮土炒炙甘草陳皮桂心當歸各一錢熟地黃五味子杵茯苓各七分遠志肉五分薑棗水煎汗下不解夫汗之不解者謂汗出不徹也汗出不徹則脈緊惡寒而表症仍在尤宜汗之者也然有汗愈出而愈不解者如汗出而肢冷陽氣衰也汗出而脈躁陰氣竭也汗出而煩滿胃液干也所謂汗所當汗而不解者失之不及者少失之太過者多也汗所不當汗而不解者則認症不的非因他證則屬虛候也凡此者均謂之不解而症既懸絶則治亦異珠豈可以其汗出不為汗衰而復汗之一逆再逆以夭人命乎下之不解者謂下之而腹滿如故身熱如故尤宜下之者也然有愈下而愈不解者如結胸痞滿下利等症使復下之則既已失下而不可復下之必也使不下之則痞結不去邪氣在而正氣虛也差治者調其元氣而佐以除邪不善治者惟求盡劑不顧人命此時而議清議攻議補俱在所難惟以升陽益胃兼消兼和庶或冀其萬一不然則所云不解者終不解矣自利夫三陰之中寒則下利清穀仲景用理中姜附湯三陽合病則自下利仲景以太陽少陽用黃芩湯少陽陽明用承氣湯蓋少陽則火鬱而陽明則上郁也雖然三陽邪猶在表何遽自利以邪鬱而不伸則為飧泄也故宜以升發之劑揚之不得遽以黃芩承氣抑之可耳然又有表邪未解而早投下劑則邪因而下陷有表邪未清而早用寒涼則水因而旁及均不可謂協熱而又清之則邪愈不出而食愈不化矣惟當進升發內消輕緩之劑瀉上中之邪而下焦自實矣倘果脈數身熱而下利逼迫火性急速方可用芩芍緩中清火而以枳朴甘草陳皮佐之加柴葛上升乃至當之法今人不審所因一遇下利舍溫中而外輒日協熱將何以治之而得效也黃芩厚朴湯治協熱下利黃芩一錢五分白芍藥炒厚朴薑製枳殼炒廣陳皮葛根各一錢甘草五分炙柴胡七分加姜一片水煎四氣論風寒暑濕四氣為病加燥火而六焉則不得概以傷寒混治也蓋寒傷經絡足太陽經主之風傷皮毛手太陰經主之而寒亦有傷肺風亦能犯太陽總之以辛溫者治寒辛涼者治風其大較也然麻黃雖熱體輕反能入肺故有三拗湯以瀉肺邪桂枝辛甘性熱反可祛寒故入麻黃湯以調營衛然世俗相沿每用桂枝治風不若以荊防為當蓋肺屬金畏熱嘗見投桂枝者往往口鼻見紅及咽痛等候也抑寒傷形暑傷氣傷形者邪有餘則宜散傷氣者正不足則宜補故均有發熱而自汗氣喘體倦虛煩及面垢前板齒燥泄瀉種種不同若兼感寒則無是證矣宜以十味香薷清暑益氣大順散分別以治豈得混於寒哉寒傷經絡身熱而痛濕傷筋骨身重而痛但濕流肢節或腰腳脈必細或緩兼寒則拘攣兼熱則腫赤甚為嘔逆為煩滿宜以羌活勝濕湯蒼朮平胃散分內外治之則又與寒迥別也至於燥火二症且甚懸絶者乎按寒與風異治者蓋寒無汗而風有汗也寒與暑異治者寒欲發汗而暑欲止汗也寒與濕異治者寒從汗解而濕不可大汗也寒與燥火異治者燥宜潤得風藥而愈烈火宜降得風藥而彌熾也荊防湯治傷風咳嗽防風荊芥前胡桔梗廣皮枳殼各一錢甘草三分生薑一片水煎三拗湯治肺風痰喘初起無汗者麻黃不去節杏仁不去尖甘草不炙各等分生薑水煎參蘇飲治肺寒咳嗽人參紫蘇前胡桔梗陳皮枳殼葛根半夏茯苓甘草各等分木香磨入一分棗一枚姜一片水煎香薷飲治一切暑毒霍亂吐瀉香薷三錢茯苓白扁豆炒厚朴薑製甘草各一錢水煎服加黃連名黃連香薷飲十味香薷散治伏暑身體倦怠神昏頭重吐瀉等症香藿一兩人參陳皮白朮土炒茯苓甘草炙木瓜厚朴薑製扁豆炒黃耆各半兩炙每服一兩水煎冷服大順散治納涼太過飲冷太多脾胃受寒霍亂吐瀉水穀不入臟腑不調此舍時從症之劑也甘草二兩乾薑杏仁去皮尖肉桂去皮各四兩上先將甘草炙熟次入乾薑同炒令姜裂又入杏仁同炒令杏仁不作聲為度後入肉桂為末每服二錢井花水調下沸湯點服亦得清暑益氣湯蒼朮錢半米泔浸炒黃耆蜜炙升麻各一錢人參白朮土炒當歸陳皮神麯炒澤瀉各五分乾葛青皮甘草炙黃柏麥冬各三分五味子九粒杵水煎服羌活勝濕湯羌活獨活藁本川芎防風各一錢甘草蔓荊子各三分水煎平胃散茅朮米泔浸炒厚朴薑汁炒陳皮各一錢甘草三分炙水煎夾食夾氣世俗有夾食夾氣夾驚夾痰而亦加以傷寒之名者夫既曰食氣痰驚則宜從四者以治又何復云傷寒為也或者曰因有是四者而復感寒故云夾也何以見之如脈實而脹滿者食也應發熱而亦有惡寒者如脈沉而不快者氣也不應發熱而亦有發熱者如脈弦而作嘔者驚也不應寒熱而亦有寒熱往來者脈滑而喘逆者痰也不應寒熱而亦有寒熱大作者以其兼寒也故謂之夾也亦宜殊不知因乎食者消其食而寒自止因乎氣者下其氣而熱自退因乎驚者溫其膽而寒熱自已因乎痰者化其痰而寒熱頓除初不必沾沾於傷寒而亦將解其表而後治之也耶如養葵先生有云凡雜症有發熱者皆有頭疼項強目痛鼻乾脅痛口苦等症何必拘為傷寒局傷寒方以治之也夫見是諸症尚有不因傷寒者況不見諸症而欲強附以傷寒則誠不可解者也厚朴湯治因食厚朴薑製枳殼麩焙廣皮各一錢山楂二錢卜子一錢焙研甘草三分炙柴胡七分葛根一錢加熟砂仁末七分姜一片水煎順氣飲治因氣木香五分烏藥陳皮枳殼炒茯苓各一錢甘草三分炙柴胡五分桔梗一錢香附一錢便制加熟砂仁末一錢姜一片水煎溫膽湯治因驚半夏枳實竹茹茯苓各一錢甘草三分炙廣皮一錢鉤藤鉤二錢加棗一枚姜一片水煎二陳湯治因痰蘇子一錢半焙研半夏茯苓陳皮杜仲各一錢鹽水炒甘草三分炙前胡桔梗各一錢杏仁一錢湯泡去皮尖加姜一片水煎如有火加栝蔞霜附壞症凡傷寒時疫不問陰陽老幼妊婦誤服藥餌困重垂死脈沉伏不省人事七日以後皆可服之百不失一此名奪命散又名復脈湯人參一兩水二鍾緊火煎一鍾以井水浸冷服之少頃鼻梁有汗出脈復立瘥蘇韜光侍郎云用此救數十人出王璆百一選方附遺毒凡傷寒遺毒發於耳之前後及項下腫硬用見腫消草生白芨生白蘞生大黃生大薊根野苧麻根搗成餅入芒硝一錢和貼留頭干即易之若加金線重樓及山茨菰尤妙出傷寒蘊要
