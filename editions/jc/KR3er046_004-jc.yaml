body:
  text: 卷之四女科調經論經曰女子二七天癸至任脈通太衝脈盛月事以時下七七任脈虛太衝脈衰少天癸竭地道不通靈樞曰婦人有餘於氣不足於血月下數脫血任沖並傷又曰二陽之病發心脾有不得隱曲女子不月其傳為風消為息賁者不治由是觀之天癸者天一所生之水也月事者月屬陰其盈虧應潮汐猶女子之月信也任沖二脈皆起於會陰為經脈之海故女子月事以三經主之經何以言二陽之病發心脾則女子不月蓋二陽者乃指足陽明而非手陽明足陽明者胃也心為之母脾為之助胃乃水穀之海病則飲食少衰而水穀不榮以女子心思偏執心不生血而月事衰少心火偏盛而月事暴下脾不統血而月事過多脾陰不足而月事早絕皆謂之不月先期過期血崩經閉不以時下也其傳為風消者風屬肝木病善怒木有餘則脾益不足故肌肉消瘦其傳為息賁者土不生金心火乘之故肺氣喘促而為不治之候也明乎此而知天癸者先天所稟之血脈而衝任為之蓄泄心脾者後天所生之血脈而陽明為之灌溉故先天不足者滋其腎陰後天不足者調其心脾其理雖殊而實一致治法有能外之者哉一婦人多思慮損傷於脾月水過多歸脾湯主之兼鬱火先期而至加柴胡山梔牡丹皮一婦人多怒傷肝經水或前或後或發寒熱或內熱口苦脈弦數小柴胡湯加當歸香附如月水衰少四物湯加香附續斷月水過多四物湯加香附阿膠白朮茯苓一婦人勞役所傷面黃唇白四肢乏力經水過多或暴下不止補中益氣湯加阿膠珠炮薑炭五味子經水衰少十全大補湯八珍湯人參養榮湯一婦人陰虛火動稟賦素弱或骨蒸煩熱用加味逍遙散間進六味丸或八珍湯加秦艽條芩香附阿膠之屬一婦人氣滯血凝經水過期至則腹痛乃下焦有寒也四物湯加吳茱萸桃仁肉桂牛膝澤蘭香附一婦人肥盛多痰經行過多六君子湯加歸芍阿膠或腰痛八珍湯加杜仲山茱肉一婦人虛寒脾不統血補中益氣湯加姜附山茱肉兼進八味丸加五味子或八珍湯加阿膠蘄艾一婦人心火熾甚煩熱脈數經水過多加味歸脾湯加麥門冬或清心蓮子飲加山梔一婦人臨經感冒風寒參蘇飲加減寒熱往來名熱入血室小柴胡湯加丹皮生地脈不數加當歸香附兼停食仍與內消一婦人臨經感氣經反凝滯逍遙散加木香廣皮香附去白朮或入撫芎一婦人臨經因飲冷水凝結不行平胃散加芎歸如久而不行少腹脹痛四物湯加肉桂牛膝茯苓廣皮一婦人受暑熱經水過多清暑益氣湯虛者生脈散實者香薷飲一婦人飲食不運或失飢傷飽血暴下崩先理中氣使食轉化後與補脾一婦人血虛有火月經耗損漸至不通日漸羸瘦而生潮熱慎毋以毒藥通之宜用柏子仁丸澤蘭湯一婦人去血過多惡寒發熱作渴煩躁用人參二兩棗十枚水煎服一師尼寡婦室女乍寒乍熱肝脈弦長而出魚際用生地黃丸附時珍月經辨李時珍曰女人之經一月一行其常也或先或後或通或塞其病也復有變常而古人並未言及者不可不知有行期只吐血衄血或眼耳出血者是謂逆行有三月一行者是謂居經俗名按季有一年一行者是謂避年有一生不行而受胎者是謂暗經有受胎之後月月行經而產子者是謂盛胎俗名垢胎有受胎數月血忽大下而胎不隕者是謂漏胎此雖以氣血有餘不足言而亦異於常矣女子二七天癸至七七天癸絕其常也有女年十二十三而產子如楮記室所載平江蘇達卿女十二受孕者有婦年五十六十而產子如遼史所載亟普妻生二男一女者此又異常之尤者也業醫者之於此類恐亦宜留心焉歸脾湯人參白朮土炒茯神黃耆蜜炙棗仁炒研各二錢遠志甘草湯淨焙當歸各一錢木香甘草炙各五分龍眼肉七枚薑棗水煎加柴胡山梔牡丹皮名加味歸脾湯逍遙散白朮土炒茯苓當歸白芍藥酒炒柴胡各一錢炙甘草三分姜水煎加山梔牡丹皮名加味逍遙散八珍湯人參白朮土炒熟地黃當歸茯苓各一錢白芍藥酒炒一錢川芎五分炙甘草三分薑棗水煎四物湯當歸一錢熟地黃一錢白芍藥酒炒一錢川芎五分水煎六君子湯人參白朮土炒茯苓半夏陳皮各一錢炙甘草三分薑棗水煎清心蓮子飲黃芩人參麥門冬蓮肉柴胡地骨皮車前子焙各一錢水煎柏子仁丸柏子仁焙研牛膝酒拌卷柏各半兩澤蘭續斷酒炒各二兩熟地黃三兩為末入地黃膏丸桐子大每服三十丸空心米飲下澤蘭湯澤蘭三兩當歸酒拌一兩白芍藥酒炒一兩甘草五錢為粗末每服五錢水煎服生地黃丸生地黃一兩酒拌杵膏秦艽黃芩柴胡各五錢赤芍藥一兩上為細末入地黃膏加煉蜜少許糊丸每服三十丸烏梅湯下日進二服帶症論張子和曰十二經與奇經七脈皆上下周流惟帶脈起少腹之側季脅之下環身一周絡腰而過如束帶之狀而衝任二脈循腹脅夾臍旁傳流於氣衝屬於帶脈絡於督脈衝任督三脈同起而異行一源而三歧皆絡帶脈因諸經上下往來遺熱於帶脈之間客熱鬱抑白物滿溢隨溲而下綿綿不絕是為白帶資生經載一婦患帶下有為灸氣海未效次灸帶脈穴在兩脅季肋下一寸八分有鬼附耳云昨日灸亦好只灸我不著今灸著我我去矣遂愈劉宗厚曰帶下多本於陰虛陽竭營氣不升經脈凝澀衛氣下陷精氣積滯於下焦奇經之分蘊釀而成以帶脈為病得名亦以病形而名白者屬氣赤者屬血多因醉飽房勞服食燥熱所至亦有濕痰流注下焦者腎肝陰淫濕勝者或驚恐而木乘土位濁液下流或思慕無窮發為筋痿所謂二陽之病發心脾也或余經濕熱屈滯於少腹之下或下元虛冷子宮濕淫治之之法或下或吐或發中兼補補中類利燥中兼升發潤中兼溫養或溫補或收澀諸例不同亦病機之活法也帶下一症素問歸於任脈明堂歸於帶脈二穴子和擴而充之以帶為約束諸脈而會合衝任督諸經鬱熱淫溢皆由帶脈滲漏而下可謂原委燦然矣而宗厚則本陰虛陽竭及諸病機治法至詳且悉比之丹溪專重濕痰子和單主濕熱則懸絕也然男子遺精之外有赤白濁女子崩漏之外有赤白帶而帶獨重於濁者以女子七情偏勝抑鬱為多綿綿而下無休止也須察其五臟之偏甚所感之虛實或清或補或升提下陷大抵虛多而實少熱多而寒者亦不乏也故子和所論者尋其原而宗厚所列者盡其變至立齋以帶分五色則又推廣言之耳一崩帶向以崩為肝虛有火而血不能藏帶為脾虛有濕而氣不能攝然帶症而面青脈弦多鬱怒者能不調其肝乎崩症而面黃脈弱多倦怠者能不補其脾乎則又在於臨病變通矣一帶症元氣虛者補中益氣湯歸脾湯加酒炒椿根皮最妙真陰虧者六味地黃湯加酥炙鹿茸兼肝火加味逍遙散入椿皮或八珍湯加椿皮作丸亦勝內熱者加黃芩香附半產者入杜仲阿膠一帶證肥人多因氣虛有痰瘦人多因血虛有火未有不從調補而愈者若專主痰火則失之矣每見久而不止去之過多必致少腹重墜而痛肌肉消瘦虛症畢見骨脈為枯矣以是知帶之為物精血所攝所云濕熱者乃言現症之標而實本衝任帶所至焉可不求其原而治之哉治驗一儒者內室素患帶下時作時止後因過勞帶遂不止腹重墜疼痛異常余以補中益氣湯加肉蓯蓉山茱肉杜仲牡蠣粉數劑得減後以八珍丸加蓯蓉杜仲椿根皮調理而愈一女子帶下半載肌肉憔瘦余以補中益氣湯加酒炒椿根皮三四十劑以六味地黃丸相間服之帶遂止而肌肉亦長乃愈補中益氣湯人參一錢半黃耆蜜炙一錢白朮土炒一錢半甘草炙三分當歸一錢陳皮八分柴胡三分升麻三分薑棗水煎加椿根皮一錢半酒炒腰痛加杜仲山茱肉肉蓯蓉頭風加藁本白芷各三分濕熱加蒼朮黃柏各五分澤瀉七分妊娠論女子之有娠也構精於腎受先天之氣以成資養於脾依後天之氣以長則是腎與脾者為始終生成之本也而治之者獨不專重二經必始於清火而終於理氣則胎氣得安而母氣得健者此何以故殊不知天非此火不能生萬物人非此火不能有生蓋男女構精俱藉此命門之火種於無形之先而精血聚合結於有形之後此雖腎陰為主而衝任厥陰之脈皆資養於胞而其火獨上衝而逆所以女子重身嘔惡阻味月事不以下蓋衝脈之血海衰而胞絡之火熾任脈之宗氣弱而陽明亦不能獨旺素問所謂諸逆衝上皆屬於火又曰少火生氣壯火食氣故當百日之內亟亟補土而食反不下往往清火平逆而反得安也迨四五月來飲食漸入母氣日衰母氣既衰則不能約束於胎而胎氣寢大必需白朮健母之氣條芩益子之陰加以陳皮利其氣而胎始得安又如子煩者心火也子嗽者肺火也子懸者肝火也子腫者脾火也均宜麥冬條芩桑皮紫菀生地知母之類隨症選用未有不從內熱所致進而七八月母氣愈弱母血亦虧又必須八珍兼補氣血及阿膠條芩陳皮香附縮砂之屬且固且利則母氣健旺而胎雖長約束有制蓋母之氣血有以運之則不致胎氣滋大母反不得展舒也迄九十月矣此時氣血必欲補而胎氣又必欲利蓋氣血不補無以為生育之藉而胎氣不利未免有難產之虞故丹溪謂八九個月內服達生散數貼甚好蓋達生散中用大腹皮為君使氣疏達於母腹之中運行於胞胎之外又以紫蘇陳皮佐之參朮歸芍補而不滯有熱則加黃芩煩躁則入生地滋養陰血始終不為火所銷鑠而分娩之時猶有慮其不易產者吾未之聞即或受胎以及彌月間有外邪乘襲七情所傷當分輕重緩急以固胎為主兼以解利隨症施治內經所謂有故無殞亦無殞也若無故而誅伐之又豈有不殞者哉一妊娠惡食客曰阻惡經云女子重身百日惡味且妊娠一二月足厥陰少陽脈養之厥陰少陽屬木有火善嘔婦人性又易怒肝木有餘者多肝欲收故喜食酸物丹溪治一婦嘔逆不止服參朮反甚以抑青丸投之遂平蓋此意也一方用藿香厚朴茯苓炙甘草廣皮竹茹有熱加黃芩山梔血虛加當歸芍藥氣虛加人參白朮或均入半夏俗謂礙胎蓋千金方每用之及湯泡油焙亦可一妊娠三四月手少陰太陽脈養之少陰太陽屬火丹溪曰火能消物造化自然故有三四月而墮胎者必於滋補中兼清火有患子懸者胎上搶心用條芩香附末各二錢調服即安一妊娠五六月足太陰陽明脈養之太陰陽明屬土胎盜脾氣以自養則土益虛束胎丸為安胎聖藥也血虛加歸芍氣虛加人參茯苓甘草漏胎加阿膠一妊娠七八月手太陰陽明脈養之太陰陽明屬金主氣八珍湯加黃芩阿膠杜仲之類或入紫蘇陳皮以利其氣一妊娠九十月足少陰太陽脈養之此時受氣將足宜預服達生散及獨參湯補助真氣胎自易產人參補肺氣金生水而少陰益得力矣一妊娠子煩用麥冬知母茯苓黃芩子腫用五皮飲加白朮車前條芩枳殼隨症加減子嗽用門冬紫菀桑皮知母桔梗竹茹有血加阿膠其外感嗽者仍與解利一妊娠外感瘧痢嘔吐泄瀉俱用常法但不可峻利及損胎氣耳一妊娠七情所傷及飢飽勞役仍用補中歸脾逍遙等湯加減施治一妊娠轉胞小便不利用升提兼補氣血如肝經鬱熱小柴胡湯加山梔生地木通如子宮下脫亦屬肝火兼升兼清乃效一婦人素有虛寒即懷娠不可寒涼者仍須溫補或過服寒涼恣啖生冷而成病者亦須以熱藥挽之不得拘於常例也半夏湯治妊娠阻惡不食半夏一錢湯泡七次茯苓一錢紫厚朴五分薑製炙甘草三分廣皮一錢內熱條芩一錢胃寒藿香一錢或加人參一錢竹茹一團姜三片熟砂仁末七分水煎束胎丸白朮條芩廣皮各等分為末水發丸虛者人參湯下多怒者砂仁湯下知母湯治子煩知母一錢麥門冬一錢竹茹一團廣皮七分炙甘草三分茯苓一錢燈芯二十根姜一片水煎紫菀湯治子嗽紫菀茸一錢桑白皮一錢桔梗七分麥門冬一錢前胡六分茯苓一錢廣陳皮七分炙甘草三分阿膠珠一錢姜一片水煎黃芩湯治子懸黃芩香附便制各等分為末水調二錢服大腹皮湯治子腫大腹皮一錢五分桑白皮蜜炒一錢生薑皮五分茯苓皮一錢半廣陳皮一錢白朮土炒一錢條芩七分車前子二錢焙研木瓜七分大棗二枚水煎八珍湯六七八月用此養胎人參一錢白朮一錢土炒條芩一錢阿膠二錢蛤粉炒廣皮一錢當歸一錢杜仲一錢鹽水炒白芍藥一錢酒炒茯苓一錢炙甘草三分撫芎三分香附一錢酒炒加砂仁末五分姜一片水煎達生散大腹皮三錢人參陳皮各半錢白朮土炒當歸各一錢白芍藥一錢酒炒炙甘草三分紫蘇五分白朮土炒當歸各一錢上作一服入青蔥五葉黃楊腦七個或加枳殼砂仁以水煎食後服於八九個月內服十數帖甚得力夏月加黃芩春月加川芎氣虛加參朮氣實倍香附陳皮血虛加當歸熟地形實倍紫蘇性急加黃芩有熱加生地有痰加半夏食積加山楂別有他症以意消息抑青丸連黃四兩為末蒸餅糊丸服小產論婦人正產猶瓜粟之熟脫乃候至而氣足半產如草木之催殘乃枝萎則實落蓋一順而一逆也順則不計月之足否總無礙於經絡逆則無問月之多寡均有傷於經絡何以言之如妊娠一二月足厥陰少陽脈養之三四月手少陰太陽脈養之五六月足太陰陽明脈養之七八月手太陰陽明脈養之九月足少陰脈養之十月則受氣足而生矣苟女子性不善調動靜違和既不遵乎胎教乃輕率而躁妄以致半產漏下或三四月而墮者則傷手少陰太陽後至二經而必復墮五六月而墮者則傷足太陰陽明後至二經而必復墜甚且三四次五六次而終不成孕者有之故凡遇半產者必需兼補氣血加阿膠香附調養於被傷之餘預固於復孕之日使至其所傷之經而不墮則不患復墮矣且當其欲墮時有因暴怒而傷有因閃挫而損或先見紅而胎未移尚可固而安者或腹疼甚而小腹墜不可挽而留者有小產後去血過多元氣虛脫而肢冷脈微用大溫補而愈者有小產後去之不盡腹尚疼痛而琳瀝未止兼破惡血而痊者種種不一或補或瀉尤宜斟酌而不可忽耳一小產有一二月而墮者俗以為過期腹痛凝結而下殊不知足厥陰少陽受傷而孕不固也治者宜膠艾八珍之類補之不可誤認為凝經也一小產年壯氣盛跌撲而傷宜先去瘀而後補之質弱經傷屢墮而下即當大補氣血而兼以去瘀可也一小產下血不止用補氣養血湯心腹疼痛用補血定痛湯一胎氣不固時常小產宜預服安榮湯加人參以固胎元治驗一儒者內室初秋小產去血過多大汗如雨肢泠脈微以人參理中湯倍參加黃耆歸芍連進二三劑四肢漸暖汗止脈出繼以人參調理而安一女子小產腹中大痛治者誤行溫補而愈甚用補血定痛湯復下瘀滯腹痛遂減膠艾湯阿膠一兩蛤粉炒成珠艾葉半兩水煎服補氣養血湯人參黃耆蜜炙白朮土炒當歸白芍藥酒炒阿膠珠香附各一錢酒炒艾葉川芎炙甘草各五分青皮砂仁各七分水煎補血定痛湯白芍藥當歸熟地川芎各一錢玄胡索七分桃仁泥紅花各三分香附青皮澤蘭牡丹皮各五分水煎安榮湯當歸白芍熟地川芎阿膠香附白朮黃芩縮砂糯米桑寄生各等分水煎大產論婦人易產由於氣血之強則兒身之轉也捷難產由於氣血之弱則兒身之轉也滯捷則子安而母亦安滯則子危而母亦危故善治者必扶元氣而調血次之疏利又次之蓋女人懷娠十月雖藉五臟之陰六腑之陽十二經脈養成而足其實則元氣載之舉之也且胞系於腎肺為之母子虛則補其母陽生陰長氣旺則期未及者能安期既及者能送故當彌月必需大進人參而臨期為尤要抑兒之居母腹朝夕與俱寢食與共入息與處加以數月之久譬如持重物而遠行雖有勇者我知其力怯而氣懦矣世或不察輒畏人參不敢服謂補助胎氣恐其娠大難產不知氣旺則胎有所束而展舒便氣弱則胎無所制而傳送艱徒用葵子滑石脫穎等取其滑而利遇氣血盛旺者亦可氣血衰弱者有不反耗其氣乎故臨盆時多服人參佐以芎歸杜仲茯苓陳皮等則庶乎其易產矣一孕婦只腹痛未產也連腰痛甚者將產也蓋腎候於腰胞系於腎故也一分娩難產及胞衣不下等宜預服無憂散一妊娠因跌僕子死腹中惡露妄行疼痛不已口噤欲絕用芎歸湯一分娩交骨不開至五七日不下垂死者用加味芎歸湯神效婦人年長初孕及素難產者宜預備服無憂散當歸川芎白芍藥各七分木香甘草各五分炒枳殼乳香各一錢血餘灰四分為末分二服水煎去渣用芎歸湯當歸一兩酒洗川芎七錢分四服水煎將干投酒盞半煎五七沸溫服若子死腹中立便逐下若腹痛隨止子母俱安又治臨產難生胞衣不下及產後血暈不省惡露不止身熱頭疼一切等症加味芎歸湯川芎當歸各一兩血餘一握燒灰存性龜板一個酥炙為末每一兩水煎俟人行五里許立下蓋此方覺難產及雖產兒不易下者即須服之有挽全保救之功余曾屢試神效幸廣傳之年長初產及久患難產者為天下幸甚產後論新產之後丹溪謂大補氣血雖有他症以末治之其說甚善然此謂惡露下盡而言則可惡露未盡而言則不可也妊娠十月依經而養其精粹則為孕育其滓穢則為惡露分娩之日年壯氣旺惡露易行以六七日為期者有之雜病相侵或為阻滯以一二十日未盡者有之多產氣弱時行時止以一月淋瀝者有之故其為患也兩脅作疼少腹脹滿兒枕成塊寒熱時作甚至心神恍惚發嘔不食敗血流經等候其害不一故產後首重於此其自行者所不待言一或有阻而致他病或因他病而致凝阻必須芎歸益母楂肉去瘀為主而佐以他藥無論虛實皆不可缺而參耆補氣之藥切勿早投恐惡露上攻變異頃刻若去血過多惡露已盡腹無疼痛硬滿之處半月一月以來但見虛候又須大補氣血兼溫暖藥以復其生氣則又何疑之有哉一產後惡露不下少腹疼痛用芎歸益母楂肉香附陳皮玄胡索或加桃仁紅花丹皮五靈脂腰痛加杜仲續斷外感加紫蘇嘔惡加藿香半夏茯苓甘草砂仁生薑一產後惡露少去用四物湯加牛膝山楂杜仲益母茯苓陳皮香附一產後惡露未盡脾氣又虛破血則礙脾補脾則礙血用二陳湯入川芎益母香附木香少加炒當歸或倍入車前子一產後惡露未止血虛發熱四物湯加炮姜肉桂茯苓甘草廣皮杜仲續斷一產後脾虛不進飲食或浮腫用白朮茯苓炙甘草炮姜入芎歸益母陳皮一產後心神恍惚用遠志茯神棗仁丹參木香及芎歸益母杜仲甘草一產後外感頭痛身熱用荊防紫蘇川芎陳皮香附山楂仍入當歸茯苓一產後停食或因臨產不化用厚朴枳殼陳皮山楂青皮香附萊菔子木香等以輕重加減仍入芎歸益母紅花一產後瘧疾或因胎前所致用白朮茯苓甘草陳皮半夏加芎歸益母山楂一產後痢疾或因胎前所致用當歸芍藥川芎木香肉桂白朮茯苓炙甘草廣陳皮阿膠一產後諸症惡露未盡必須遵以上法萬無一誤但寒涼之藥切不可用恐伐其生生之氣也一產後惡露已透凡有雜症隨病制宜血氣虧損或發寒熱十全大補湯補中益氣湯怔忡驚悸自汗不寐歸脾湯中氣虛寒飲食不進六君子加炮姜益智或人參附子理中湯血虛大便難八珍湯加杜仲續斷或六味湯加蓯蓉牛膝一胎前脈洪大滑疾為順微小澀滯為逆產後脈虛軟柔弱為順弦大急疾為逆故胎前宜清熱而亦有用溫藥者病之變也產後宜溫補而亦有用涼潤者亦病之變也治者守其常而達其變則病無遁情矣一丹溪云雖有他症以末治之非不治也如實症多則瀉中帶補虛症多則補中帶瀉如此則正氣不脫而邪氣不熾矣此用藥之權衡也益母草湯產後惡露未盡腹疼痛者益母草一錢五分當歸一錢杜仲一錢鹽水炒牛膝一錢川芎五分丹皮一錢香附一錢醋炒茯苓一錢山楂一錢半廣皮一錢炒熟砂仁末一錢姜一片水煎甚者加桃仁延胡紅花黑神散治產後發熱惡露不下黑豆三錢黑姜一錢牛膝二錢當歸一錢川芎五分熟地二錢水煎加味六君子湯治產後中氣大虛惡露不下人參一錢白朮一錢土炒肉桂一錢牛膝一錢半茯苓一錢炙甘草三分半夏一錢廣皮一錢益母草二錢砂仁末七分姜一片水煎遠志湯治產後心神恍惚惡露未盡遠志肉一錢棗仁一錢半茯神一錢丹參一錢石菖蒲五分牛膝一錢半廣皮一錢杜仲一錢益母草一錢半桂圓肉五枚姜一片水煎黃耆補氣湯治產後去血過多自汗體倦黃耆一錢半蜜炙人參二錢白朮一錢半土炒當歸一錢芍藥一錢炙甘草三分茯苓一錢肉桂五分附子五分制棗二枚煨姜一片貝母湯治產後內熱咳嗽心神不寧川貝母一錢半茯苓一錢車前子一錢半當歸一錢炙甘草三分廣陳皮七分遠志肉一錢棗仁一錢鉤藤鉤一錢牡丹皮七分桂圓肉五枚燈芯一握八珍湯治產後氣血兩虛四肢乏力人參一錢白朮一錢土炒茯苓一錢炙甘草三分川芎五分熟地一錢當歸一錢白芍藥一錢酒炒杜仲一錢鹽水炒川續斷一錢酒炒棗二枚姜一片水煎八味湯治產後陰虛發喘氣上逆者懷熟地三錢山茱肉二錢肉桂五分熟附子五分牡丹皮一錢山藥二錢川牛膝一錢半茯苓一錢澤瀉一錢水煎如汗出不止兼進生脈散續產後論產後之症變怪百出要不越乎虛實實則瘀血凝滯虛則去血過多凝滯者攻之無難去多者挽之匪易此人參之可用不可用判若天淵也然有元氣大虛而惡血未盡則以四君子入芎歸肉桂益母或去朮倍參加二陳一以補中氣一以通血脈庶有當乎矧且其因多端不易枚舉有胎前受病而發有坐草過艱而致有雜病相侵而作有本質柔弱而得如胎前飲食停留而產後不化或感冒發熱而產後彌甚或瘧痢太乏而產後益虛或祈望得子而不育滋戚或產女已多而中情鮮悅或茹葷太早而寒熱頓作或起居驟聚而外邪干侵或驚恐偶得而心神欠寧或惱怒不謹而肝氣怫鬱凡此數者毋論惡血之凝與不凝皆足為產後之累且男性急速產母受病恆少女性陰滯產母受病恆多元氣強壯產母受病易愈元氣素虛產母受病難療如余內子戊戌年得雙胎產以前自五月至彌月形體削瘦日進參三錢可納穀半盞若缺參一日食便不入臨產旬日日進參兩許果易產而安產後亦經無恙及甲辰春復得一子胎前未曾服參產後大虛二旬外忽面青多怒時昏暈不醒脈得純弦而細飲食不入余知其真氣已衰心脾既失所養肝木從而凌肆即以歸脾湯入參五錢熟附一錢投數劑屢止屢發益參至一兩附二錢亦如故再加參五錢附三錢其勢猶未定乃益參至二兩附四錢怒始解昏暈不作以後參附漸減調理兩月餘而愈余始嘆人參之功回元氣於無何有之鄉亦能調臟氣於大不平之日若使此症臨於病家焉肯親信而服參不輟有如是耶余故論產後而實舉以告云一女子產後八朝醫妄以滾痰丸進遂上嘔下泄晝夜不止吳門周子云來療之投參八錢加赤石脂禹餘糧嘔泄俱止後其家又有一生產者醫作外感治面赤氣喘肢冷脈弱乃延余診云來亦至余見其中氣空虛欲以歸脾入炮姜與之云來曰先補陰後補陽何如余曰火氣即浮斂之有何不可遂以六味湯入肉桂遠志棗仁氣漸平脈漸出余辭歸忽復厥逆復延余余以他往不及云來用人參四錢附子八分進之向安因托吾友松聲唐子復與云來商溫補而愈但因年少氣血偶衰病雖痊後發痔漏用滋陰降火每致纏綿觀此知用藥之不可輕也一女子胎前發瘧面色痿黃余以六君子連進瘧未止而產產而瘧愈甚惡露少行一友進以炮姜腹中大痛惡血不下余用延胡芎歸益母山楂陳皮一劑痛止血行再以六君子倍白朮不數劑脾氣漸旺瘧乃止一女子產後去血過多乃發寒熱肢冷脈微余以八珍湯入姜附一劑而寒熱止數劑而食進神旺遂得霍然一女子產後以不遂願兼怒而戚惡露未透身發寒熱自汗如雨時見譫妄余以遠志茯神棗仁木香杜仲當歸益母連進而汗止但譫妄未除以前藥入牛膝炮姜下積血一塊崑山鄭氏至商加萎蕤四錢貝母二錢車前一錢又三劑而神安繼以調理而痊一女子產後發腫加之喘滿但惡露絕不下與消腫藥不效用五靈脂延胡索桃仁澤蘭紅花牛膝惡露大下喘止腫退後用調補而愈一女子胎前腹痛坐臥不寧至夜半氣息淹淹脈遂歇止胎亦不動余慮其胎氣已損急服無憂散一劑痛稍止胎未動以芎歸湯當歸一兩川芎五錢血餘二錢頓煎飲之脈遂現胎遽動繼用獨參湯無憂散相間服之乃產而安一女子素有病余慮其難產令預備加味芎歸湯及產時胎果下而不遽下穩婆告急無措矣余令急煎前藥與之未及半時即得產矣此皆余所親驗者先哲立方抑何神哉五大病心嘗聞之有所云天心者仰而觀之浩浩焉邈邈焉天之大不可測也而何從見其心素問曰南方赤色入通於心則疑以離為天之心矣心果若是之虛且明乎子思作中庸首揭天命之謂性而子輿氏則曰盡其心者知其性也知其性則知天矣則是又以天心即人心矣可見心之為物存者其誠而發者其明也忠者其體而怒者其用也若易誠而妄則心之病一易明而昧則心之病二易忠而欺則心之病三易恕而忍則心之病四試思天之所以貴乎人與人之所殊乎物者非此心乎存之為君子去之則異類苟或不克操之任其出入而莫知其鄉將何以立於天壞間耶蓋天理者人之所以為心也惟在攝之正之公之平之以之立身以之垂後無不由於此中人蓋可忽乎哉肝喜怒者情之常使必有喜而無怒則矯矣雖然人情貴於坦適尤貴於安和苟乘一時之忤執一己之偏則未有不悔於事後者經曰肝者將軍之官其病善怒毋論乖違謀慮傷於拂鬱尤可言也憤亂機務敗於經緯不可言也故古來大怒必出於大忍則有濟輕怒必出於不忍則多暌任情一往不審從違者婦寺之見也從容不迫按節而動者大度之舉也是以器識宏遠之流見天下無可怒之事見天下無可嫉之人及其怒且嫉也如天之雷霆然偶一發焉而天下莫不懾服者有以畏其不測也然則人之喜怒不常者其亦可以自反矣脾今夫塊然者地耳萬物於焉資生賴大氣以舉之也所謂具坤靜之德而有乾健之運耶於人則脾應之而其要有三一主飲食人一日不再食則飢陰之五宮生在五味陰之五宮傷在五味所云傷者非不及之足患而太過之足患亦不特太過之足患而不節之足患惟養生者慎之至云高梁之變饒生大疔可畏夫一主四肢出作入息人之常也思邈謂運樞不壞流水不腐每見安享之人筋骨恆柔辛勤之人筋骨恆強第不堪過竭耳一主思慮事不廢思凡經營猷業鮮不從思中來殆心之精華而運於脾者使或竭於無益之鄉而不留意正大之規雖窮神竭慮曷貴焉嗟嗟吾人止此身耳佛印有云三十年功名富貴過眼成空何不猛與一刀割斷余謂三十年功名富貴過眼成空何不猛與垂不朽業否則大負此心思也矣肺古人嗇氣如持至寶何若是之甚哉孟子曰我善養吾浩然之氣夫是氣也善養之則塞天地配道義不善養之則自餒而已矣素問云一息不運則機緘窮一毫不續則穹壞判浮屠之言曰一氣不至何處安身立命由是知氣之所繫大矣而肺實主之肺者相傅之官治節出焉治而出之以節可見相傅之度雍容不迫無所事於囂張矣及觀希夷先生收視返聽葆神毓精而終日齁齁惟默運於一息之中乃能壽敝天地無有終時今人縱不能師一二奈何多言損氣外而所以暴殄之者慮無不至盍亦反而思諸腎凡人有切於己者無不珍恤而獨至精至要之所反不之恤者色是也男子二八精通八八精絕言其常也以欲竭其精以耗散其真言其妄也殊不知此真陰賦於先天則有盈怯資於後天則有薄厚矧且情欲交攻勞役並侵益少損多豈堪供無窮之耗哉故無病者嗜之而成病有病者犯之而致死東坡謂傷生之事非一而好色者必亡也至逐聲伎干非分敗德喪簡失業亡家為神人所誅隱曲難問者尤不可言即或稟賦過度奉養素豐足以樂而忘倦胡不將此精力立德立功立言以垂來茲乃耗於無用之地而為快哉則亦不思之甚矣醫箴療醫醫之為道所繫非偶人之寄也以死生我之任也以陰隲天下之至重惟命一旦委付於我則調劑之補瀉性味之寒溫草木之良毒投之當則僕者起骨者肉夭者堅奪造化之權而不是過否則見不審識不精稍或舛誤有所害於人者即有所害於己人之父母妻子與我無異非病之必不可挽而命數有盡我忍聽其哀號也哉故醫之臨病勝於臨敵運籌幃幄之中決勝千里之外良將是也存乎呼吸之間而遠退二豎之舍良醫是也察色不可不精審聲不可不詳持脈不可不靜辨症不可不細既責其有又責其無既求其始又慮其後既達其常又通其變必使有濟無損有利無害慊於己而無怨於人庶陰德可積冥譴可逃矣噫難言哉心術醫本仁術也見人疾苦則起悲憫伊之屬望既殷非我救之而誰哉臣棐董先生恆謂余曰凡療疾藥救固遲丹救亦緩惟心救最靈要非藥與丹之緩也苟中心不切則視之易忽而審之不精安能得病之本末握而擒之使必從我算而無遁情惟心之既摯則危亡之際痛癢攸關彼父母妻子所不及憂者而我代憂之彼患人所不及計者而我代計之甚至睡思夢覺莫非設身伊地或垂亡而拯之或慮變而防之謀深思遠視一病而又虞一病之起奏一效而更覺效之難憑攻之時即為守地守之時復為攻謀一片婆心無少寧息天地可鑑鬼神可通而靈明生焉每見時流擇術不精自恃炫耀乘人之危取人之財不顧人命惟思利己為身計則得矣其如冥報後報何返而思之有不通身汗下者非夫也品行夫醫必自愛自重而後可臨大病而足托蓋我之學術優而審病確則彼之託於我者何事而我之受於彼者何為而敢易易出之故凡希媚諂容不邀而赴以求悅於人者其術固止於此也或可治小疾而不可治大疾或可療常病而不能療變病其以輕為重以重致危者多矣噫天下之人以性命相委而徒博此便習為哉雖然醫亦非以是驕人也蓋我所見者惟此病之若而已我所憂者唯去此病之苦而已將救病之未遑奚暇為苟容之計希幸之圖哉且醫之為道無論富貴貧賤閨閫有疾必藉手焉端方者視之縱有隱曲必求詳而始已而患者亦直告之無憚庶幾病得其真投治獲濟故品行不可不嚴也明理夫醫理之無盡猶之儒業第文之不工費其紙醫之不工費其人大相越也蓋古來生知者一二人然炎帝之於百草嘗而後知軒轅之於經絡問而始悉所謂上竅天紀下極地理中知人事使非有以窮之極之而能知之哉後此名流遞出無不根究理道參物類而儘性命而後以術鳴當時名垂奕祀況下此者智不及古人而不窮搜博覽罕所見於中輒以人命自司其不僨潰者幾希故昔賢云讀十年書無病不可療更讀十年書無病可療知言哉應機凡病可以意料也而不可以意逆料則任彼之情形逆則執己之臆見有如素實者而有一時之虛則暫理其虛素虛者而有一時之實則微解其實此機之從緩者也實症而攻之過甚宜峻補以挽之虛症而補之太驟宜平劑以調之此機之從急者也熱者清之及半即止繼以益陰寒者熱之大半即安繼以調和此機之從權者也實症久而似虛其中有實不任受補虛症發而似實其原本虛不任受克此機之從經者也病在上下取之陽根於陰病在下上取之陰從於陽此機之從本者也表症見本質雖虛猶解其表里症見元氣縱弱猶攻其里此機之從標者也況乎病之來也無方而我之應之也亦無方千變而出之以萬慮有能遁其情者無之決擇夫醫有不忍之心者而後可以言仁有不忍而能忍之心者而後可以言明蓋仁所以處己而明所以服物凡病之必不可救者而我從而救之必有所見於中而驗於昔究之終不如我欲者亦勢之無如何也與其無如何寧決擇之矣然其所以不決之故有二一則溺於親愛不忍遽舍則百計以營之思一慮之或得從而腹悱者有焉一則規以厚利不肯遽斷則巧言以彌之冀僥倖於偶獲從而召謗者有焉故危篤之候見之既確則決之宜早利與愛可勿問也至有不明脈理不審源流而妄斷吉凶者此庸陋之習不足與於決擇之數者又烏得托之以鳴高哉
