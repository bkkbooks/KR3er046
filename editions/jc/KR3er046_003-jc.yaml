body:
  text: 卷之三雜症頭風凡頭痛之候感於六淫者其發各以時惟頭風發不以時或月計或歲計虛則愈頻獨可異者素問云當先風一日則痛甚不可出內至其風曰則少愈夫痛既以風而作何先風反甚風日反愈乎蓋礎潤而雨月暈而風凡氣機之動每先形於所感在天為風者在人為肝肝者風木之臟而血藏焉惟血虛則發熱熱甚則生風一經感召而病機之躍躍欲動者則從少陽之火以上頭角故頭風先患左半者以此然木邪凌土脾胃受克頭痛甚者必作嘔乃由少陽入陽明則侵及於右半者以此可見頭風之疾乃本肝經而作腎水不能生肝木肝木來乘脾土惟以補中益氣調中益氣使清陽上升入黃柏以降陰火土生金金平木水制火東垣先生深察病機立方神應非後人所幾及於此見一班云若漫作風治去之不啻千里希其效也得乎一大寒犯腦頭痛齒亦痛用補中益氣湯加麻黃附子細辛一頭痛耳鳴九竅不利腸胃之所生用調中益氣湯一挾熱頭痛煩躁不寧用茶調散一痰厥頭痛因誤服疏風脾胃虛損頭旋吐痰身重肢冷頭苦痛如裂者用半夏白朮天麻湯一頭痛巔疾下虛上實過在足少陰巨陽用黑錫丹一眉稜骨痛風熱痰氣上攻者用選奇湯調中益氣湯升麻柴胡黃柏酒炒川芎甘草各三分炙蒼朮泔制人參陳皮各七分黃耆蜜炙當歸蔓荊子各一錢焙研水煎畏寒甚加細辛三分茶調散黃芩酒浸炒二兩川芎一兩白芷五錢荊芥四錢薄荷細茶各三錢為細未每服三錢茶送下巔頂及腦痛加細辛藁本蔓荊子各三錢半夏白朮天麻湯半夏麥芽各錢半乾薑三分白朮土炒神麯各一錢炒黃柏二分酒炒人參蒼朮米泔制天麻煨黃耆蜜炙陳皮澤瀉茯苓各五分水煎黑錫丹沉香附子制葫蘆巴肉桂各五分茴香焙補骨脂木香金鈴子肉豆蔻黑錫硫黃與黑錫結砂各一兩為末研勻酒煮面和丸梧子大陰乾每服五錢空心姜鹽湯送下一方有陽起石五錢巴戟一兩選奇湯防風羌活各三錢黃芩一錢酒炒甘草三錢夏生冬炙每服三錢水煎熱服頭眩經言諸風掉眩皆屬肝木則眩者風之所作而肝之所主河間則責於火火炎上而動搖也丹溪則責於痰痰流動而沖溢也然治火併治痰而眩如故者何耶良緣火之有餘本於水之不足則壯水之主錢氏六味丸加鹿茸是也痰之所發由於水之上泛則益火之原仲景腎氣丸補而逐之是也使根本堅實即枝葉扶蘇孰得而震撼之哉其次則莫如培土木剋土而實藉土以自栽有如思慮太過則調以歸脾勞役不節則益以補中使心火寧而不盜母氣肺金旺而化源益滋更入杜仲枸杞山茱萸之屬上病下取則鮮有不安者也蓋眩為中之始基中為眩之究竟其所以致此者未有不戕賊真陰而得則又何容諱耶一體虛之人外感六淫內傷七情皆能眩暈當以脈證別之一氣虛者乃清氣不能上升或汗多亡陽而致當升陽補氣血虛者乃亡血過多陽無所附而然當益陰補血此皆不足之症也痰涎郁遏者宜開痰導郁重則吐下風火所動者宜清上降火外感四氣散邪為主此皆有餘之症也劉宗厚辨之頗詳要之素無病而忽眩者當於有餘中求之素不足而眩者當於先後天分之不得以氣血該也本事川芎散治肝風眩暈山茱萸一兩小川芎人參山藥茯神甘菊花各半兩為末每服二錢酒調下鉤藤散治肝火頭暈兼有痰者鉤藤陳皮麥門冬半夏茯神甘菊花人參防風白茯苓各半兩甘草一錢石膏一兩每服四錢姜七片水煎許學士二方用意頗微不可忽視鼻淵鼻淵一名腦淵以鼻之竅上通腦戶腦為髓海猶天之星宿海奔流到底骨中之髓發源於此故髓減則骨空頭傾視深精神將奪矣李瀕湖云鼻氣通於天天者頭也肺也肺開竅於鼻而陽明胃脈環鼻而上行腦為元神之府而鼻為命門之竅人之中氣不足清陽不升則頭為之傾九竅為之不利然肺主皮毛形寒飲冷則傷肺治者但見其標不求其本往往喜於解散散之過則始流清涕者繼成獨涕漸而腥穢黃赤間雜皆由滲開腦戶日積月累而至尫羸矣使非參耆益其陽麥冬五味斂其陰佐以辛荑透其竅腦戶何由而固耶虛寒少入細辛內熱監以山梔又須六味丸加鹿茸枸杞等下填腎陰則精足者髓自充尚何漏卮之足云補中益氣湯黃耆一錢半蜜水炒人參白朮炒土當歸麥冬各一錢去心廣皮七分柴胡炙甘草升麻辛荑山梔各三分炒黑五味子九粒杵薑棗水煎補腦丸治鼻淵久不愈者神效人參麥門冬去心茯苓杜仲鹽水炒肉蓯蓉酒淨山藥飯上蒸切熟地黃山茱肉各二兩黃耆蜜水炒枸杞子菟絲子各三兩鹿茸酒漿微炙切片五味子各一兩為末另搗蓯蓉枸杞熟地麥冬略添煉蜜和丸如桐子每服四錢白滾湯下耳病陰陽之用互合成體有如陽竅七奇數也而五臟開之則主受陰竅二偶數也而六腑輸之則主化然陽竅中心肺為陰中之陽則口鼻之氣升降往來無形而之有形矣腎肝為陰中之陰則耳目之竅虛實交參有形而之無形矣故五色則目收之五味則舌辨之五臭則鼻吸之五音則耳納之然目之光猶外發木中有火也耳之聰惟內受水性潤下也恆見腎氣足者耳中之墨充塞而聽愈聰腎氣虛者耳中空竅無礙而聽愈背明乎此理可見少陰之氣藏於耳中而其外蔽者則少陽之風火擾亂相扇驅其外邪斯得矣若夫腎氣不充少陰之脈不至惟峻補真陰入以鎮墜之品則氣不上亂復其司聽之職則虛而能受如空谷之音響應立赴矣不知者妄以外導法欲令氣通則陰內陽外豈能越出而失其常經乎或又曰心開竅於舌寄竅於耳凡用心過度火為之擾然鳴則有之聾則未也究之心腎不交水不升故火不降耳至痰火為患耳如蟬鳴降氣則痰下益水則火息亦不越攝氣歸元之旨也一色欲損腎六味丸入杜仲牛膝沉香黃柏枸杞磁石一耳中乾結耳鳴而聾柴胡聰耳湯一上焦熱耳鳴而聾及出膿汁蔓荊子散耳痛生瘡黍黏子湯一停耳耳中有膿用桑螵蛸炒入六味丸柴胡聰耳湯連翹四錢柴胡三錢炙甘草當歸人參各一錢水蛭五分炒虻蟲三個去殼足炒麝香少許上除後三味別研外作一服加生薑三片水煎去渣入三味末再煎食遠服蔓荊子散甘菊蔓荊子桑白皮麥門冬生地赤茯苓赤芍藥前胡各一錢炙甘草升麻木通各三分薑棗水煎黍黏子湯昆布蘇木生甘草蒲黃龍膽草各二分黍黏子連翹生地炙甘草當歸黃芩黃連各三分柴胡黃耆各四分桔梗一錢半桃仁三個去皮尖紅花少許水煎六味丸懷熟地八兩山茱萸淮山藥各四兩牡丹皮澤瀉茯苓各三兩磁石一兩醋煅七次沉香五錢牛膝杜仲鹽水炒枸杞子各二兩黃柏一兩鹽水炒為末添煉蜜糊丸每服三錢青鹽湯下目病凡竅各司其一而唯目則五臟之精華皆上注焉其瞳子則水之晶而火之用也黑膏者木之脂白膏者金之液木火金水合聚其彩重重裹之而神乃外發故其光之所射無遠不照無微不察猶天之有日月也然人但知其發之用在木火金水而不知其藏之妙獨在於土土無光者也而上下眼胞則主之以司開闔故晝則開而屬陽夜則闔而屬陰有陰之闔正以濟陽之用木火金水皆藏於土中乃發露而不窮此造化之巧本於能藏也試觀之木膏入土年久成珀銅坑在土空青乃生井中水則澄澈石中火則光焰無在不藉土為用東垣云五臟六腑之精氣皆稟受於脾土貫於目脾者諸陰之首目者血脈之宗脾虛則五臟之精氣皆失所司不能歸明於目矣苟心煩事冗飲食失節勞役過度則百脈沸騰復感外邪而諸病生焉善治者必理脾胃養血安神而驅風清火治標之法可暫而不可常者若夫色欲損腎則腎肝之陰真水真火不可一日而缺尤急宜講求者也一目疾感風寒脈浮洪或緊宜發散後加甘菊蒺藜決明枳殼涼血生地丹皮一日疾紅赤不畏風寒脈數疾者用甘菊蒺藜決明山梔酒芩酒連當歸枳殼一眼胞浮腫防風通聖散主之微腫而虛用蟬殼茯苓決明山藥木通麥冬或加白朮一目疾有星翳用蒺藜木賊決明穀精當歸生地蔓荊子青葙子一眼目昏花視物不明因思慮者歸脾湯勞倦者補中益氣湯鬱怒者加味逍遙散腎水不足滋陰腎氣丸真火不足濟陰地黃丸或八味丸加沙苑蒺藜枸杞子一瞳神散大用遠志茯神棗仁人參枸杞山藥五味一肝腎氣虛兩目昏暗視物不明用加減駐景丸一雀盲至夜則目不見用補中益氣湯加枸杞子山茱肉山藥一沿眶爛眼用甘菊白芷各二錢朴硝五錢杏仁十七粒膽礬三分羌活一錢水二鍾煎一鍾淨洗神應一東垣治飲食勞役所傷視物昏花用益氣聰明湯一婁全善治目珠疼至夜尤甚及點苦寒藥反疼者用夏枯草四兩香附末二兩甘草四錢清茶調服二錢良效防風通聖散防風川芎當歸薄荷芍藥大黃炒麻黃連翹芒硝各五錢石膏黃芩桔梗各一兩滑石六兩山梔荊芥白朮各一兩土炒甘草二兩為末每服二錢姜水煎服滋陰腎氣丸熟地黃三兩生地黃四兩牡丹皮當歸山茱肉山藥柴胡五味子各五錢澤瀉茯苓各二兩五錢為末蜜丸每服三錢淡鹽湯下濟陰地黃丸五味子麥門冬當歸身熟地黃肉蓯蓉山茱肉乾山藥枸杞子甘菊花巴戟肉各等分為末蜜丸每服三錢白湯下加減駐景丸菟絲子半斤酒製當歸熟地黃各五兩車前子焙五味子枸杞子各二兩楮實子川椒炒各一兩為末蜜丸每服三錢溫酒下益氣聰明湯人參黃耆蜜水炒炙甘草各五錢升麻葛根各三錢蔓荊子錢半焙研芍藥酒炒黃柏各一錢每服三錢水煎口病中央黃色入通於脾開竅於口胃脈挾口環唇大腸脈還出挾口厥陰脈下頰裡環唇內又皆統之於脾矣獨其邪之所侵火熱則赤木乘則青氣虛則白火極似水則焦黑水極似火則裂坼一寒一熱判若天淵胃熱脈洪責於心火內熾脾虛脈弱本於陰寒上逼清胃涼膈所以徹熱附子理中所以溫里今人一見唇焦便指為熱不知中氣虛寒飲食不進中焦失守無根之火逼而上浮若以寒涼投之則火愈不歸而食愈不進惟人參理中溫其中氣火奠厥位而唇口坼裂如久旱逢霖立時潤澤矣至乃舌為心苗脾之絡連舌本散舌下腎之脈亦系舌本傷寒家驗舌苔以焦黑為胃熱為水枯則本此若別口味之辛甘鹹苦酸以察五臟之熱尤其顯白者則各以其臟治之斯善耳要之二陽之病發心脾火土子母相關豈淺鮮哉一口病實熱脈洪數有力者用清胃湯一口病飲食不進脈微細軟弱者用人參理中湯或歸脾湯加炮姜一謀慮不決上為口糜用逍遙散或升陽散火湯大腸移熱用秦艽升麻湯清胃傷治胃火血燥唇裂或為繭唇或牙齦潰爛作痛黃連炒生地黃升麻各一錢當歸一錢二分牡丹皮八分水煎齒病五行之用無在不彰天一生水水之凝者為石其至堅者為金而石可礱物金能斷物在人則齒應之齒者胃之標骨之餘上齦屬胃胃為艮土故止而不動下齦屬大腸大腸主庚金故動而不休齒稟其氣無物不摧此造化之微不可測也腎中有水有火足陽明喜寒畏熱手陽明喜熱畏寒其氣不齊凡齒落動搖主腎齒齦腫潰主胃與大腸其間有風寒乘之濕熱侵之疳蟲蝕之或散或清或盪滌法亦不等然必以寒熱兼濟藥乃有效者何也緣水火不可偏廢一勝則一負土不可燥金不可寒即其所喜所畏可得用藥之權衡如細辛少陰之熱藥也黃柏太陽之寒藥也專用之則各主一病合用之則止牙疼於俄頃凡祛風解熱涼血劑中皆不可缺至真陰虧而水不足元氣傷而火有餘或益水中之火或滋火中之水溯厥原而療之能以常格論哉一東垣治劉經歷之內齒痛不可忍須騎馬外行口吸涼風則痛止至家復作乃濕熱為邪足陽明多血多氣加以膏粱之味助之所致因立方不須騎馬當令風寒之氣生於齒間黃連胡桐淚之苦寒薄荷葉荊芥穗之辛涼四味相合而作風寒之氣治濕熱為主新升麻之苦平行陽明經為使羊䯒骨灰補之為佐麝香少許為引細末擦之痛減半又以調胃承氣去硝加黃連治其本下三兩行痛不復作一齒惡寒熱或蟲疳齦腫出血痛穢皆手足陽明外感風寒內蘊濕熱風寒用荊防湯濕熱用清胃散甚則承氣湯一牙齒動搖脫落本足少陰經用六味丸火衰者八味丸還少丹七情所傷隨症調之一風毒牙痛或大寒所犯用獨活散荊防湯治畏寒畏熱防風荊芥生地枳殼葛根各一錢細辛三分蔓荊子七分焙研黃柏五分酒炒黑水煎清胃湯治齦腫潰爛生地一錢半石膏二錢升麻五分丹皮防風枳殼各一錢水煎下齦甚者加芍藥黃芩涼膈散治胃有實熱大黃酒蒸朴硝甘草山梔炒黑黃芩薄荷各一兩連翹四兩為末每服五七錢水煎獨活散獨活川芎羌活防風各五分細辛荊芥薄荷生地黃各二錢每服五錢水煎丹溪治小兒走馬牙疳床一齊腐爛即死用婦人尿桶中白垢火煅一錢入銅綠三分麝香一分半敷之立效立齋治中氣虧損牙齒作病用補中益氣歸脾二湯加酒炒黑黃柏喉痹龍潛於海雷藏澤中則天以清地以寧耳及其發也陰霾四際光焰燭天天氣閉塞地氣冒明所謂龍雷之火迅不及掩其勢疾暴可畏一至風恬雨霽則無所施其威矣人之喉主天氣咽主地氣為身中之橐籥水穀之道路使無風火相扇則金空而鳴谷虛而納何窒塞之與有惟火發於內風鬱於外水波洶湧而聚為痰在外則喉風纏絡胸膈在內則喉痹壅結兩傍疼痛而食不得入聲不得出旦夕之際危亡可待斯時也而以陰寒藥投之則其勢愈甚而火彌熾痰彌盛矣急須驅風豁痰開通鬱結糾纏頓釋閉塞立開也故喉風殭蠶半夏為君佐以疏理喉痹射干甘桔為主佐以辛涼撤其風而火自息祛其痰而風自寧縱有龍雷之相火安足患乎此治之之要首則探吐次則解散甚而從治嚴用和蜜餞附子片令吮其汁因火不歸元而足冷脈微已成危險之候有不得已而用者一喉痹俗名乳蛾生於兩傍紅紫如錢中黃如豆或左或右曰單左右俱有曰雙嗌以上者可見嗌以下者不可見水穀難下急須點破咯吐之或以鵝翎蘸燈油腳攪吐之一喉痹屬外感者發散藥入射干屬七情所傷者歸脾逍遙去耆術加射干桔梗薄荷開之陰虛火動者六味湯入薄荷一喉痛久不愈甚至潰爛素曾患時瘡者用萆薢散一喉風痰涎壅盛聯布心胸腫大紅赤喘息難舒用巴豆油染紙作捻子點火吹滅取煙透鼻內即時口角流涎並觸患處急服殭蠶散射干湯治喉痹射干一錢防風荊芥桔梗薄荷各一錢大力子錢半焙研廣皮八分甘草三分加燈芯一握生薑一片水煎火甚加玄參天花粉肺虛加川貝母茯苓殭蠶散治喉風殭蠶二錢湯淨半夏防風前胡荊芥桔梗葛根枳殼玄參薄荷各一錢大力子一錢半焙甘草三分生薑一片水煎萆薢散治楊梅喉癬土茯苓別名萆薢五錢當歸金銀花皂角刺米仁各二錢白鮮皮白芷木瓜木通各七分甘草五分水煎瘰癧經云東方實西方虛瀉南方補北方此言治法也而余取以治瘰癧尤不易之法也東方者木也足厥陰肝足少陽膽屬之陰不足則陽有餘肝膽主節筋無血養則火自甚而金不能平木反侮之於是喉之兩傍厥陰少陽經筋之所過則鬱給成核始則一二繼則三五或左或右累累如貫珠久則潰爛膿血淋瀝以致月消而敗矣南方者火也實則瀉其子也如夏枯草連翹黃芩貝母玄參之屬清火消痰使火不得以乘金而金得以平木將少陽之火不復熾矣而厥陰之血從何養乎則補北方是也北方者水也水乃生木乙癸同源肝氣不宜助而肝血宜滋況腎水既旺而不盜金之氣西方不虛東方獨得實乎故瀉南方者治瘰癧之始補北方者救瘰癧之終余因是而悟古人立法之巧非後人所幾及類如斯一瘰癧女子多見之男子間有有血虛內熱所致有鬱怒傷肝而作或感大行暑熱或啖煎炙醇酒熱生痰痰成核初則瀉火消痰開鬱解毒潰則補中益氣滋養腎水庶成者可消而潰者可斂也夏枯草湯夏枯草三錢玄參黃芩土貝母金銀花連翹天花粉薄荷桔梗各一錢甘草節三分燈芯一握水煎鬱怒加香附柴胡鉤藤遠志血虛加當歸白芍藥血熱加生地牡丹皮氣虛者加味歸脾湯入夏枯草或逍遙散加貝母夏枯草飲食不入者四君子湯加廣陳皮香附陳神麯飲酒太過者前方內加葛根澤瀉青皮去香附腎陰不足者六味地黃丸肺症西方白色入通於肺位居於兌為燥金時列於秋為燥令燥者火之餘氣也所藉乎有以潤之而不至於竭其液則清肅下行將天氣降而云物不為之擾矣肺位至高風寒易侵鬱火於中使復加之辛熱則柔脆之金一經消爍有不損壞者乎而肺癰於是乎作矣又主元氣治節一身苟勞動喘乏用而不息將肺氣日促口吐涎沫無氣以動而肺痿於是乎成矣蓋二症者一本外感一本內傷外感者非遽至於癰也良由治療失宜過於解散而以保之潤之為急多有得生者雖破殘之肺可以復完內傷者則因酒色過度酒入氣分色傷陰分辛熱之性既以耗於上又以竭於下日漸月累每成於不自覺久乃痿躄聲嘶肺氣敗壞而不復支使欲噓其既槁而潤之誠難為功孰謂二症可不辨哉一肺癰能食者生賴有胃氣土為金之母也其症咳唾稠痰腥穢如膿黃赤間雜甚則咳出白血白血者肺之葉也手掌乾澀皮膚不澤脈數而疾急以栝蔞仁湯連進數劑或一二十劑未有不愈者余屢治神驗不易僕數一肺痿咳唾涎沫胸中隱痛四肢乏力無氣以動用補中益氣湯去升麻柴胡加阿膠桑皮麥冬五味白芨治驗一男子冬日咳嗽自用發表至春咳出臭痰已七八日矣晝夜不絕脈得細數展側不能手如枯掌但飲食猶進余用栝蔞貝母之屬連進八劑減半又八劑全愈以六味丸調之一人夏月飲火酒患赤痢脈洪數與芍藥湯服之未愈更醫至冬漸變咳嗽臭痰瘍科作肺癰治延至於春日吐紅血盂許上結白沫臭穢異常又經月餘咸謂必死復延余診脈猶洪大帶數見其食雞子連進七八枚無恙余因謂曰可治肺雖壞而胃氣未敗也亦與前湯服十六劑果愈繼以膏子藥調理而痊栝蔞仁湯栝蔞霜米仁各二錢川貝母去心天門冬去心金銀花麥門冬去心百合各錢半甘草節三分桑白皮蜜炙桔梗各一錢水煎久而不斂加白芨阿膠去桑皮寒月加款冬花紫菀夏月加生地牡丹皮若脾虛不食用四君子湯或六君子湯但喘未除者不可驟補真陰不足繼以六味丸加阿膠乳症經云怒則氣上思則氣結上則逆而不下結則聚而不行人之氣血貴於條達則百脈暢遂經絡流通苟或怫鬱則氣阻者血必滯於是隨其經之所屬而為癰腫況乎乳房陽明胃經所司常多氣多血乳頭厥陰肝經所屬常多血少氣女子心性偏執善怒者則發而為癰沉鬱者則漸而成岩癰之為患乳房紅腫寒熱交作宜化毒為主栝蔞忍冬之屬可使立已岩之為病內結成核久乃穿潰宜開鬱為要貝母遠志之類不容少弛若男子則間有不似婦人之習見也陳氏則云微有異者女損肝胃男損肝腎肝虛血燥腎虛精怯血脈不得上行肝筋無以榮養遂結痛腫似亦有見至既潰之後氣血必耗惟以歸脾逍遙人參養榮無間調之又必患者怡情適志寄懷瀟灑則毋論癰症可痊而岩症亦庶幾克安矣倘自恃己性漫不加省縱有神丹亦終無如何也一乳癰惡寒發熱乳房紅腫用橘葉散一乳吹乳房作脹枳殼散乳汁不通膨悶王不留行湯一鬱怒傷肝左乳結核加味逍遙散入貝母金銀花青皮香附思慮傷脾右乳結核加味歸脾湯入貝母金銀花一乳癤潰後不斂人參養榮湯歸脾湯八珍湯調養之餘毒未解入忍冬花一乳岩潰後須前方久服勿輟調和情性若鬱結不舒者不治橘葉散金銀花栝蔞青皮當歸皂針連翹各一錢橘葉十片柴胡七分甘草節三分水煎心思不遂者加遠志貝母枳殼散枳殼木通生地當歸廣皮金銀花各一錢甘草三分鉤藤二錢燈芯一握水煎王不留行湯穿山甲炒麥門冬去心王不留行炒當歸白芍藥酒炒熟地黃茯苓通草各一錢川芎五分甘草三分用豬前蹄煮汁二碗煎藥食遠服之以熱木梳梳其乳房其乳立至蓬朮湯治乳核蓬朮七分醋煮甘草節三分遠志肉甘草制人參金銀花貝母去心研香附醋炒白芍藥酒炒當歸身各一錢水煎麥蘖湯消乳膨麥芽一兩炒研川芎白芍藥酒炒熟地當歸各一錢水煎服外用布緊束兩乳以手揉按乳自消退一方用栝蔞兩個炒熟搗爛酒水各半煎服癰腫初起者立消一方用蒲公英二兩連根帶蒂酒煎服亦效治驗一女子發熱七八日脈數身熱口乾諸醫作傷寒治用發表消導藥其勢益甚延余診之疑其陰血虧損及細叩其有無痛處則曰左乳紅腫作疼余乃笑曰此乳癰症而誤認傷寒焉得不至於此急與米飲兼進栝蔞貝母忍冬茯神遠志鉤藤麥冬甘草生津解毒三劑而愈一女子產後乳癰三四旬余反發寒熱延余診之脈得耎弱氣血二虧用八珍湯數劑始痊脅痛經曰左右者陰陽之道路蓋左屬陰而右屬陽也陰為血而陽為氣也左者肝也肝藏血性浮喜條達而上升有以抑之則不特木鬱而火亦郁故為痛治之宜疏肝清火理血左金兼桃仁紅花鉤藤青皮之屬虛人及季脅下疼者六味湯滋其水以潤之乙癸同源之意亦由房勞所致也右者肺也肺主氣性沉喜清肅而下降有以逆之則肺苦氣上逆而為痛治之宜降氣消痰前桔枳殼陳皮之屬虛人歸脾湯去耆術加延胡主之以補其母若香燥破血之藥非其治也且於中州無礙不可克代與外感無涉不可發散犯之則汗出發喘促其斃矣余每怪時流一遇脅痛不分左右陰陽不彆氣血痰火虛實閃挫之因動稱肝經受病及用藥又以外感法治之致死不悟深可悲憫殊不知脅痛之候治之一逆貽禍甚速即有知者亦守痛無補法害亦相等幸臨症者慎焉王宇泰先生治一人患左脅痛外發紅丹數十顆有投以龍膽瀉肝等湯竟不效先生曰肝性燥苦急宜甘以緩之用單味栝蔞二兩研霜煎飲取其甘緩潤下紅丹可一洗而愈也果如先生言余凡遇左脅疼煩躁面赤脈數痰色綠者每加之輒驗若無痰而陰虧脈虛數汗出無氣以動六味湯加鉤藤屢獲奇效若血凝氣滯以桃仁紅花枳殼醋製青皮香附延胡等或加生地芍藥鉤藤佐之實火左金丸亦可選用一友右脅痛以自知醫用發散藥痛愈甚氣息難布余診其脈則微弱特慮其不受補以單味貝母一兩研細煎湯飲之保其肺氣使清肅下行痛即如失蓋栝蔞色綠入肝有解毒之功貝母色白入肺有保殘之力故治各不同也夫貝母亦能解毒用之以平肝則無濟栝蔞亦能潤肺用之於誤汗則太寒學者不可不知一人患右脅痛凡旬日醫者誤用香燥致不得坐臥又延一友不能治反曰胸中有滯止宜消導若痛止必不可救及服其藥果愈甚病者求死比余適止見其苦慰之曰不難療可一劑而愈病者喜伊兄云痛未可止余怪問其故則曰頃醫者有是言故云余笑曰令弟苦痛不止欲死醫者又苦痛止不治何大相背也檢其藥仍用消導加半夏等燥劑余即取素所歷效自制推氣散加延胡索命煎飲之又適友人楊子武修至余告其故欣然同意少頃病者數日不解帶不轉動忽下榻曰痛愈大半欲解衣而睡矣當晚遂安臥越三日痛雖愈但因前久坐氣不歸原不能安枕余以六味湯加杜仲引氣下行二劑知四劑已繼六味丸調理而康蓋右脅痛者肺氣之逆也以其真陰虧損肺不能歸藏於腎水之中故理肺之後繼以滋陰亦一法耳一人患右脅前岐骨下軟肉處痛醫者用破氣血藥加酒煎投三四劑遂叫號不絕余亦以推氣散加延胡飲之瘥緩但面赤脈數口乾加入生地茯苓去前桔痛稍止又因勞心後加遠志當歸鉤藤杜仲去枳殼乃愈或問之曰病名為何余曰此名閃肭痛肭在臍之旁季脅之前曰何以知之曰膃肭臍乃海狗腎之別稱則肭之命名當在臍與腎之間也若勞倦不節色欲不謹氣血有阻則軟脅前痛宜補而調之勿投燥劑可也疏肝飲治左脅痛柴胡當歸黃連各七分茱制青皮醋炒枳殼麩炒白芍各一錢酒炒川芎紅花各五分桃仁九粒研如泥姜一片水煎如兼痰喘者不用此藥推氣散治右脅痛神應勝原方枳殼麩炒前胡山楂各錢半鉤藤二錢甘草三分廣皮葛根桔梗各一錢中脘痛胃脘近心之分而與脾膜相連故其疼也俗指為心而古則稱脾耳蓋脾之脈貫於胃而為之行其津液故犯賊風虛邪者陽受之飲食不節起居不時者陰受之於是發為中脘痛方書分為九種一曰客寒犯胃一曰寒鬱為熱則新與久之別也一曰痰涎在膈一曰蟲積在中則嘔痰與清水之別也一曰氣一曰食則脹與滿之分也一曰血一曰火則喜熱與寒之分也一曰虛則與實殊者喜手按不可按之分也然此特其大概耳要之胃氣人之所賴而生者依中焦以腐化藉脾氣以消磨一或阻隔失其健運之常則氣血食積痰飲皆得乘之而為患使徒知治標而不探其本將愈攻愈虛雖或少寬於旦夕實則致病於將來以致觸而即發久而彌劇者未必非治之失宜故也故凡療脾疼者脈見耎弱中氣已虛即宜歸脾暫去當歸耆術少加柴胡或兼二陳有食加枳實有寒加炮姜有熱加山梔先固其中氣則痛不致於傷胃脾陰不竭而胃陽有助心君寧而肝不敢乘腎獨能凌乎一舉而諸善備焉若夫治實之法方書具在一客寒犯胃或過食生冷中脘疼痛手足厥逆脈見弦緊用草豆蔻湯一心痛稍久寒鬱為熱煩躁嘔酸面赤脈數者山梔仁湯一痰涎在胸膈嘔逆大痛不可忍脈來洪滑者枳縮二陳湯一蟲痛時作時止口吐清水或如咬狀用川楝子湯一心痛因怒而發心膈脹悶脈沉伏四股冷者木香湯一心痛因麵食堅硬等味過用不化用萊菔子湯一心痛素喜食熱物者瘀血停於胃口也桃仁玄胡湯一中氣不足思慮過度飢飽失時勞役不節者歸脾湯六君子湯草豆蔻湯草豆蔻煨高良薑廣皮陳神麯炒吳茱萸湯泡五分茯苓半夏各一錢炙甘草三分煨姜一片水煎非脈實症寒者勿輕用山梔仁湯山梔炒黑半夏廣皮各一錢竹茹一團木香五分甘草炙三分黃連七分茱制燈芯一握水煎枳縮二陳湯枳實麩炒熟半夏各錢半茯苓砂仁炒熟廣陳皮各一錢炙甘草三分姜三片水煎川楝子湯川楝肉二錢木香七分檳榔熟半夏枳實曲炒廣皮各一錢炙甘草三分生薑水煎入砂糖少許和服木香湯木香香附醋炒青皮廣皮枳實麩炒柴胡蘇梗各一錢炙草三分炒熟砂仁末一錢水煎萊菔子湯萊菔子焙研山楂各錢半厚朴薑製枳實廣皮各一錢蓬朮八分醋製炙甘草三分姜三片水煎桃仁延胡湯桃仁泥十粒木香炮姜各五分炙甘草三分香附醋炒延胡索醋煮廣皮各一錢鉤藤澤蘭各錢半砂仁五分水煎歸脾湯人參石斛鹽水炒遠志內甘草湯淨焙茯神棗仁炒熟研白退術土炒各一錢炮姜木香石菖蒲各五分柴胡炙甘草各三分當歸身七分桂圓肉五枚水煎六君子湯人參半夏白朮土炒茯苓廣皮各一錢鉤藤一錢木香五分甘草炙三分棗二枚姜三片水煎腹痛聞之背為陽心肺主之腹為陰腎肝主之人之初生帶繫於臍通命門屬兩腎為生氣之原此錢氏有灸臍之法而獨享遐齡也蓋腎肝居至陰喜溫惡寒獨賴此真火藏於中而為生生不息之用苟有以撲滅之則有陰無陽外無以御內無以充寒邪直犯委頓呻吟而臍腹絞痛矣即或稟賦厚者真元未衰過傷生冷留滯於中亦能為患而綿綿痛無已時緣氣因寒則凝血因寒則結痰食因寒則阻故腹疼一症大半從寒而熱者間出也至外受炎暑內傷辛熱腹痛則有休止脈必數或促二便閉而煩躁欠寧又彰彰已然而大要尤在乎虛實虛者必寒實者寒熱兼之虛者分水火實者辨氣血食積其間熱因寒用寒因熱用通因通用塞因塞用本緩標急標緩本急又在臨時變通之如仲景用芍藥甘草甲與己合以調腹痛寒則加桂熱則加芩立一標準余可類推後學所宜取法者一腹痛食積停滯脹滿不安用厚朴木香青皮枳殼陳皮山楂甘草砂仁生薑一腹痛受寒絞痛異常或綿綿痛無增減因肉桂木香芍藥甘草當歸廣皮炮薑茯苓一腹痛乍痛乍止或受暑熱或嗜火酒脈數或伏匿投溫藥反劇者用黃芩山梔芍藥甘草廣皮葛根澤瀉一腹痛觸犯穢氣㽲痛不寧作霍亂候用探吐法以霍亂治之一腹痛勞力所傷喜手重按困倦自汗補中益氣湯加木香芍藥一腹痛腰亦痛色欲恐懼疾走所傷六味湯加棗仁杜仲遠志少入柴胡以提之若火衰畏寒以八味湯投之治驗一男子過勞患腹痛醫與破氣藥益甚余按其脈耎細且弱視其形氣倦怠異常竟與補中益氣湯而痊一男子患腹痛五六日矣延余侄視之委頓殊甚檢前所服惟枳樸木香輩毫不減可乃連進八味湯而獲愈少腹痛少腹隸於厥陰厥陰者肝也為陰中之至陰中寒一症少腹絞痛唇青囊縮非桂附吳茱萸不為功肝乃藏血之臟凡閃挫跌撲有所損傷凝結者少用必脹滿而疼小便利大便黑非桃仁澤蘭紅花不為效木曰曲直曲直作酸肝火下流小便頻數少腹拘急或時作疼非山梔鉤藤芍藥不為取然而少腹之中膀胱為之州都故小便不利而脹者當利其小便小便自利而脹者當治其血二症又迥不同也要之足三陰經太陰居上則理中焦少陰厥陰居下則補下焦大抵虛寒者十之七實熱者十之三也女人患此尤多余每以桃仁茱萸一取其破血一取其同氣而調經恆效蓋有所凝滯而然也臨症者辨之一厥陰中寒少腹絞痛煩躁厥逆或嘔用仲景吳茱萸湯一閃挫作痛用柴胡鉤藤當歸丹皮茯苓甘草延胡索之類若困卷甚四物湯加白朮茯苓牛膝鉤藤柴胡杜仲一小腹蓄血小便自利大便色黑桃仁承氣湯如元氣弱者去硝黃減甘草加生地澤蘭紅花丹皮一色欲過度而痛六味湯加杜仲柴胡脈遲弱者加肉桂一濕熱滲注少腹內痛小便淋瀝者用龍膽瀉肝湯一沖疝氣逆上攻少腹左痛用木香川芎山梔吳茱萸枳實青皮小茴香廣皮一膀胱氣不化小便不利而痛五苓散加減一大便秘結少腹脹滿而痛在傷寒脈實用承氣湯老人血虛而秘或病久元氣弱者用滋養陰血如麻仁桃仁杏仁郁李仁之類虛甚六味湯加杜仲牛膝蓯蓉鎖陽一元氣下陷小腹重墮多服補中益氣湯一男婦奔豚氣塊用地黃膏子丸吳茱萸湯吳茱萸湯泡七次生薑人參各一錢棗一枚水煎或入桂附桃仁承氣湯桃仁十個肉桂甘草各一錢大黃二錢半水煎去渣入芒硝一錢五分熱服龍膽瀉肝湯龍膽草酒炒柴胡車前子焙研澤瀉各一錢木通生地黃歸尾黃芩生甘草山梔各五分水煎癰症癰之發也上下內外無處不有然發於清陽之分危者十之八九發於濁陰之分危者十之一二頭為諸陽之會背隸心肺之野以陰乘陽則逆腹乃腸胃之司足為筋骨之用以陽乘陰則從蓋因膏粱之子過服丹石暴烈之性灼耗真陰則水不足以制火直干清分腦項肩背任其糜爛多至於不救者有之辛勤之人疲乏筋骨四氣交侵凝滯經絡則血不足以輔氣流於肢節尻股腰膝隨其阻逆每至於纏綿者有之要之發於腎元者至重以丹石爍腦髓也發於心脾者次之以抑鬱滯經絡也發於筋骨皮肉者又次之以六淫侵肌膚也此毒之有輕重主客之勢使然又何疑哉余因論列諸症而旁及瘍科偶舉一二言之緣不明乎外不足以知內不別其症不足以為治使非熟識而詳辨之其遺害可勝道耶腸癰腹為陰大小腸與之俱乃傳導化物之司何為而成癰良由醉飽入房或過啖生冷勞頓所傷凝而不化因遂發焉其症身皮甲錯汗出惡風小腹滿脈數疾薏苡仁湯牡丹皮栝蔞桃仁破血排膿膿血大下即安若潰而不斂蠟礬丸護膜化毒兼以補劑鮮不愈者治驗一男子歲除過啖荸薺遠行疾走內傷於腎至新節遂發寒振振然其家以傷寒召診往候其脈手不敢出衣被汗泄脈數小腹脹疼余曰此腸癰非傷寒也故頭不疼而汗出脈不緊而腹滿耳投薏苡仁湯果得膿盂許寒熱頓止然未透也翌日復欲下之會伊戚延他醫反用消食作外感治增劇復進以人參遂致不起一女子新產過勞積血未除而成腸癰少腹疼下膿血經月不止有進龍膽瀉肝湯彌甚後以八珍入阿膠用蠟礬丸稍緩服參至二三斤兼地黃丸而愈薏苡仁湯治初起薏苡仁栝蔞仁各三錢牡丹皮桃仁去皮尖各二錢白芍藥一錢水煎蠟礬丸白礬一兩生研黃蠟七錢上將蠟溶化和丸梧子大每服十丸漸加至二十丸熟水送下未破者內消已破者便合每日中服近百粒則有效不惟止痛生肌能防毒氣內攻護膜止瀉托裡化膿之功甚大服至半斤尤佳七賢散治腸癰潰後疼痛淋瀝不已人參茯苓熟地黃山藥山茱肉牡丹皮各一錢黃耆二錢大棗二枚煨姜三片水煎囊癰囊癰者厥陰肝經濕熱所注兼以陰虛而邪襲之也故酖酒色者恆患此蓋肝主疏泄腎主閉藏過飲醇酒厚味則濕熱聚於宗筋而肝者筋之合下注為癰紅腫疼痛治之者宜瀉肝經之濕熱滋腎陰之不足切勿投香燥藥反助其邪甚至潰爛睪丸懸掛如法療之無有不痊治驗一老人素好飲近色一日囊中腫痛瘍科醫作疝治用茴香荔枝等溫藥以火濟火遂叫號不絕身發大熱余以山梔丹皮龍膽草等挽之後兼滋陰尋愈清肝滲濕湯當歸白芍藥生地柴胡龍膽草酒炒澤瀉山梔炒黑各一錢川芎甘草各五分燈芯一握水煎滋陰內托散囊癰不能消者用此托之黃耆當歸白芍藥川芎熟地各錢半皂角針穿山甲澤瀉各五分水煎臀癰臀者足太陽經之所屬太陽一經從足走頭行身之背所統者大風寒暑濕其邪易感何獨於道遠位僻之地氣血之所不及周者而發為癰不知久坐傷肉久立傷骨久行傷筋兼之寒濕外郁內凝遂覺焮腫究之起而不易成成而不易潰潰而不易斂故其初時切戒升托惟欲疏散如羌獨活利其關節當歸茯苓杜仲秦艽續斷等活血通經使不至於壅滯外以蔥熨法導引其氣便可消散非比上中諸部分氣血周到可托可攻臨是症者幸毋好事喜功也治驗一人年五旬體肥嗜酒偶因作勞忽發寒熱尻臀腫疼余先與解散一劑寒熱止而腫未消按其脈則空軟不數余曰氣血雖阻斷不成癰用滋補中佐行經絡藥氣和血行則自散也二旬余果如常行經活血湯羌活獨活當歸牛膝茯苓秦艽各一錢熟地二錢杜仲一錢半鹽水炒紅花五分加生薑一片水煎用二劑後減羌活入酒炒續斷一錢腿癰人之脾主四肢肝主筋腎主骨下部發地三陰主之則腰足是也苟或勞乏罷極傷筋骨皮肉而風寒濕乘間入之則腿中作疼發於肌肉者淺入於筋骨者深使復加以風藥則愈耗其陰進以寒涼則愈傷其氣將至於穿潰而不可支矣故治此患者仍補勿瀉仍溫勿寒仍托勿斂非比上三癰之喜攻喜瀉喜消也如補中益氣湯八珍湯八味丸或入木瓜肉桂杜仲牛膝等引經藥氣血充裕筋骨堅強則易潰易斂也若沾沾於解毒則敗矣治驗一男子素勤苦犯寒濕腿中疼痛半月餘除濕解散藥太過腿腫成癰叫號不絕余因謂曰陳氏云此症從腎經受寒非桂附不能通關節非羌活防風牛膝不能行閉滯非參朮甘草不能使脾氣達四肢非四物紅花不能養血活血令恪守其法而行之果膿潰而痊大防風傷人參二錢防風白朮土炒附子當歸白芍酒炒川芎杜仲鹽水炒黃耆羌活牛膝熟地各一錢甘草五分姜一片水煎按癰屬陽而外發疽屬陰而內陷陽緩而陰危夫人而知之矣然陽症過寒涼則毒不外發而反危陰症能溫托則毒反克化而得緩又夫人而知之矣殊不知治陽症者疏散為上解毒繼之調補繼之勿犯苦寒致令倒戈治陰症者升托為主溫補繼之調養繼之勿過辛熱致令液竭余雖不與是科間嘗參觀其際見有大溫大補乃得膿成易斂若血脈空虛疼痛之久者須氣血兼補佐以養育心神蓋心主血脈脾主肌肉膿血去多必藉資養不可一味熱藥以復耗之是或一道也凡瘡瘍一科競執解毒之名不論其發於何部屬於何經或陰或陽或外感六淫或內傷七情概以解毒為辭即用芩連花粉苦寒藥致令毒不化而邪內伏變異頃刻者有之終不起發者有之故敗毒散中惟人參敗毒散為良不知火鬱發之開之蘊毒托之化之血熱涼之氣虛補之水衰益之火衰溫之種種不同奈何甘蹈苦寒而不悔也人參敗毒散人參茯苓羌活獨活前胡柴胡桔梗枳殼各一錢川芎八分甘草五分水煎挾勞役者倍用人參加當歸芍藥化毒飲子治七情怫鬱而發遠志肉甘草制當歸甘草節五分連翹川貝母去心研金銀花二錢白茯神鉤藤二錢牡丹皮各一錢姜一片水煎或加柴胡木香香附仙方活命飲穿山甲蛤粉炒黃白芷防風赤芍藥沒藥甘草當歸尾乳香貝母天花粉角針陳皮各一錢金銀花三錢酒煎服人參內托散人參錢半黃耆三錢當歸川芎穿山甲白芷廣皮各一錢甘草五分姜一片水煎血虛加熟地白芍藥脾弱加白朮茯苓虛寒加炮姜附子化毒加金銀花加減八味丸治瘡疽發渴神效懷熟地八兩山藥山茱萸各四兩牡丹皮茯苓澤瀉各三兩五味子肉桂各一兩為末地黃和丸薛氏書五味用四兩恐酸收太過也續腫脹論嘗觀腫脹之疾必發喘急而喘病則有腫而不脹脹而不腫者又有先腫而後喘先喘而後腫者病情既殊則治之者何可不為之別耶試究詳之大抵腫脹在脾喘滿在肺脹甚於腫屬肝乘脾腫甚於脹屬腎乘肺故治脹之法先宜平肝肝平則氣調而不中滯次用補脾斂肝土旺則能健運土中瀉木白芍藥酸以收之若過於快氣則中州亦傷而不能復其職矣治腫之法先宜清肺肺清則氣降而不上逆次用淡滲益陰淡滲則能利竅金藏水中生地黃苦以堅之若過於疏泄則有陽無陰而亦不能以化矣然由腫脹而至於喘者則求其腫脹之因而調之不治喘而喘自寧若由喘而至於腫脹者則求其致喘之因而理之不治腫脹而腫脹自愈木火之與金水易而為治比之操刃況乎土位於中四氣昏得乘之也哉善治者必審臟腑所屬而以苦欲補瀉求之庶得乎病之情而不膠於成法也治驗一女人年三旬余得氣喘症身發腫脹他醫療已逾年竟罔效延余診之脈細帶數行動喘乏所服破氣藥無遺余見其腫甚用大腹皮陳皮茯苓澤瀉車前中獨入生地白芍藥牡丹皮以陰濟陽上收其逆氣而下得以化不三劑減半數劑乃愈繼以八珍調之一男子年十六近除得感寒症余與發表消食至新正四日竟愈矣余令之食粥其家過慎止與陳米湯飲至二十日復延治上則發喘下則發腫由足跗至膝上不惟腫其色紅赤可怪及按其脈則微細問其胸覺飢甚與粥飲入口便喘余因謂曰五氣養陽五味養陰今半月餘止用陳久米飲有氣無味陰不濟陽其何能化然兩足通紅奈何余乃謂曰此必過食鹹味咸走血就下隨其水而外發故至此詢之乃因口淡任啖醃菜而然余以為不必治急索飯及葷菜與之半盞竟安病者歡甚少頃又進半盞易以他葷亦安余竟教以如是調理約旬日陰漸旺則陽化而腫自退果然續膈噎論諺云風勞鼓及膈四證一犯即難為療噫病則病矣何遂至於若是耶余請以膈申言之人之身中由咽至胸為上膈由胸至心為中膈由胃至肝為下膈上膈者稟上焦之氣而主納中膈者稟中焦之氣而主腐熟下膈者稟下焦之氣而主出人之所以有生者惟此出納腐熟之司如天之運行不息而地道之生長化收藏寒燠不失其宜乃能順令而布化也苟或太早而失之敦阜則雲雨不施而孤陽濁治水澤為枯矣苟或太澇而失之卑監則沉霾閉塞而凝陰慘淡生氣索竭矣故膈之始也病在上咽嗌不利則食而噎犯於上焦地氣不升天氣不降將成亢旱之兆矣然食猶能強之而使安也繼犯中焦雖食而中脘不下下之而痛稍久則吐痰水胃液不藏肝火乘之則味變而酸脾陰既竭則納而不化天氣愈不降地氣愈不升乃見痞塞之狀矣則食不能強之而使安也繼犯下焦朝餐而夕吐夕餐而朝吐火氣漸消孤陰獨存陰陽不相為濟五臟之液既竭六腑無以資稟升降出納俱廢所云天氣地氣者安在哉乃至絕粒而亡矣然則絡無法以治之耶曰初須別其七情之所偏繼須審其氣血之所竭水火之所勝唯在補其中氣調其怫鬱開其痰氣熱者清之寒者溫之使協於平而又察上中下受病之淺深而為之斟酌焉安見其不可療哉獨所難者患疾之人不知死期將迫而反復煎熬之必至髓竭液亡終不悔悟吾且奈之何也按噎在咽嗌之所膈在心胃之間反則直從下而上矣越人謂心肺在膈上上焦在心下下膈胃上口中焦在胃中脘下焦在臍下內經則以左附上候肝與鬲右附上候脾與胃則鬲之屬心下也明矣余所以推而上之又推而下之非以其形而言乃以其用而言也猶三焦為水穀之道路氣之所終始而所云如霧如漚如瀆者不以其用哉矧內經止言膈而不及噎與反則以膈統上中下又復何疑然妙在與肝為配蓋膈之一症多由鬱怒傷肝而作鬱則為熱日漸煎熬血液枯竭心肺之陽不得通行腸胃之陰不得下停而膈病之所由作患者治者從此求之思過半矣開鬱湯治膈噎初起有火者山梔炒黑陳神麯炒桔梗香附醋炒川貝母去心研茯苓廣皮各一錢撫芎五分姜一片荷葉蒂三個水煎遠志湯第二用遠志肉甘草制茯神白芍藥灑炒熟半夏廣皮各一錢棗仁一錢半人參二錢鉤藤三錢桂圓肉五枚姜一片水煎有熱加山梔寒加炮姜氣加木香燥加丹參柏子仁此中焦藥也若在下焦以八味消息之
